front:
  text: 程序嘗觀三代之治井田為首軍旅次焉治安並千餘載何三代有道之長以其先教養而後攻取也其民安其業樂其居雖有頗牧靡所用之春秋之末至於戰國廢井田繕攻取非戰不善而國胍隨之者先先王之所後而後先王之所先也漢興曹參為之宗臣目見羸秦之𥚟用蓋公之言齊治天下至今宗之故漢祚之長與三代等唯醫亦然人生以氣為主以食為輔形不足者氣補之精不足者味助之食飲寒暑罔有失節而重以熊鳥經伸龍虎啖食小以延年大以輕舉雖有和扁亦無所用之也逮夫勞心膂患陰陽禿而施髢病而求醫孝子操藥以羞慈父其色焦然何治之晚也壬午之秋余偶以公餘失調問醫於朗仲氏朗仲名家子其尊人秉鐸一方門生多顯試為令名介陶狄朗仲國士翩翩嘗有異術疑其為神人所授非當世之所傳也既而手持其師士材氏新所刪補其所自著頤生微論視余余讀其書先經伸而後診視與所為先教養而後攻取者一也於是正衣冠而坐不終日而病去矣士材尊人取甲第為世名臣功在青史而其子少有俊才出其緒餘著論覺世功比良相復不自滿假重為丹鉛廣其流以活後世其功豈可計哉天之福人如以燈取影罔有攸漏其將大兩家之後復垂青史為名臣皆不可知也其以余言為左券云賜進士出身嘉議大夫奉敕整飭蘇松兵備湖廣按察司副使程峋撰項序余閲頤生微論知人有終身之生繫於命有一日之生系乎時制命與時而操其柄生不致死死復回生者系乎醫然則醫豈僅一術哉心生造化手生萬物黃帝所以治天下而使後世生生不息者由此道得也乃生曷言乎頤余嘗讀易至頤卦而得之矣蓋天地間陽嘗饒陰嘗乏而人身中氣易耗血易枯陰陽不節血氣不平而生意絶矣故饒者減之上下二陽以固其氣乏者盈之中間四陰以充其血血不宜閼震動在內氣不宜蹶艮止在外故曰頤頤者養也世醫猥云望聞問切可以治病孰知調五色於榮衛之間頤以養肌也此論不明猶盲而望也和五音於出納之會頤以養聲也此論不明猶聾而聞也通五德於情好之中會五臟於人迎氣口之際頤以養性而養胍也此論不明猶喑啞而問木石而切也頤之為義廣矣大矣安得微者而論之又刪補之夫微非幽隱之謂也既觀其所養復觀其自養二義盡其蘊矣李君念莪之言曰得道之至者靡弗通靡弗通而兼通於醫者乃入神聖卓哉念哉且入羲文之室探周孔之蘊豈特於軒轅內經靈樞素問以及扁鵲倉公華他仲景皇甫士安之論淹貫焉已哉承其流者沈氏朗仲精核融洽而用以投藥如屠垣解牛靡弗奏效誠稱善矣若夫吳氏石虹出其先世家珍並胸中獨得之解而參訂於其間更有未易測者也餘閒居時與石虹對語如挹春風使我和氣周身如望旭旦使我倦魔匿影石虹醫術豈待人之既病而恃藥餌為力哉其於頤生之旨技也而進乎道矣頤之彖傳曰聖人養賢以及萬民之旨哉言乎倘法六四之顛頤與上九之繇頤以攻劑治兵荒以補劑治疾疫俾生意充塞天壤之間所願於刪補之外更進而大焉者也崇禎歲次壬午菊月項煜題於碩園白雪樓中自序夫用兵救亂用藥救生道在應危微之介非神聖不能善中也故兩者均自黃帝發之非黃帝之獨能注精也得道之至者靡弗通靡弗通而兼通於醫者乃入神聖三略云莫不貪強鮮能守微人能守微乃保其生聖人存之以應事機何長生之學偕於殺機之發乎蓋靡弗通而通焉者耳余少治經生言及兩親子俱以藥誤豫又早歲多疴始惕然迫於思而以鄒魯之業兼岐黃家言藥世道之受病而因以通有生之疾似同源而流矣自神廟戊午採輯成是編鐫而懸之肆乃翕然遍走天下嗣後非不究天人參禪玄詢國政未甘擅專門學而攜挾持扶以請一刀圭者日且相迫三吳中遂以長沙氏目相之豫豈敢云靡弗通而通於是抑亦相迫而漸至使然者耶今二十五年以來不無少進階級思一再訂期絲毫不有誤後世而未可輕與語也庚辰秋吳門沈子朗仲翩然來歸一握手而莫逆於心端凝厚藏慷慨浩直而不漫齒頰峩然載道之偉器與語移旦暮鮮弗神領靈樞諸經典瞭然會大意投藥中窾砉然如庖丁遊刃豈特曰吾道西矣而邈然弗可量已於是相與辨幾微參益損躋顛極破偏拘皇皇登於大道以俟百世可以畫一則庶幾其快我隱謝我過焉嗟乎吾道之不孤其有賴於朗仲也乎因再付之剞劂與同事諸君更一改觀倘云知青於藍雖釋其舊本可也已崇禎壬午四月華亭李中梓書于飛映閣
