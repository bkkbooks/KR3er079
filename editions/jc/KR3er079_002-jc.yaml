body:
  text: 卷之二臟腑論第九古之聖醫若見垣若內炤神靈莫測不爽絲毫豈真有異人之目可以洞徹皮毛映見焦腑哉亦惟是望外以知內耳內經臟象諸篇揭臟腑以開來無殊對鑑而學者未別未彰往往托玄微於脈理而昧顯察於當機尚得謂之醫乎經曰皮有分部脈有經紀筋有結絡骨有度量別有分部左右上下陰陽所在病之始終可得而見又曰治之要極無失色脈用之不惑治之大則彼望齊侯之色者望此而已矣後世遂豔傳其奇以為絕世抑孰知顯而可徵有如是乎苟未辨臟腑之故而第曰指下能得之則以色合脈之說其謂之何故云不誦十二經絡開口動手便錯良有以也圖說數則搜掇成篇啟玄所謂將升岱嶽非徑奚為欲詣扶桑無舟莫適此蓋師其意云手太陰肺經辛金肺者相傅之官治節出焉肺者氣之本魄之處也為陽中之太陰通於秋氣肺配胸中與大腸為表裡其母脾土其子腎水其克肝木其賊心火其象金其藏魄其旺秋其絕夏其色白其位西其卦乾其惡寒其性義其音商其數九其味辛其臭腥其華毛其候鼻其充皮其液涕其聲哭其氣呬其不足則太息其有餘則喘嗽其平脈浮短其賊脈洪其死丙丁日其畜馬其谷稻上為太白星其見症也善嚏悲愁欲哭灑淅寒熱缺盆中痛腹痛肩背痛臍右少腹脹痛小便數溏泄皮膚痛及麻木喘少氣頰上氣見秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病脈來厭厭聶聶如落榆莢曰肺平脈來不上不下如循雞羽曰肺病脈來如物之浮如風吹毛曰肺死真肺脈至大而虛如以毛羽中人膚色赤白不澤毛折乃死手太陰氣絕則皮毛焦皮毛焦則津液去津液去則皮節傷皮節傷則皮枯毛折毛折者則毛先死丙日篤丁日死肺絕三日死肺至懸絕十二日死白欲如白璧之澤不欲如堊白如豕膏者生白如枯骨者死形寒飲冷則傷肺實則兵戈競擾虛則夢田野平原憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛辛走氣氣病毋多食辛多食苦則皮膚槁而毛拔肺欲收急食酸以收之以酸補之以辛瀉之肺苦氣上逆急食苦以泄之小麥羊肉杏薤皆苦肺手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端多氣少血寅時氣血注此補人參黃耆五味子麥門冬山藥紫菀百部茯苓阿膠瀉防風葶藶桑皮枳殼澤瀉蘇子肺臟之圖肺重三斤三兩六葉兩耳凡八葉附脊第三椎卮言曰肺者茷也茷茷然居乎上為五臟之華蓋醫旨緒餘曰肺者勃也言其氣勃鬱也手太陰肺經左右共二十二穴以下十四經凡六百六十穴溫乾薑生薑款花白豆蔻木香涼沙參天門冬玄參貝母桔梗兜鈴瓜蔞枯芩山梔人溺東垣報使引經白芷升麻蔥白手少陰心經丁火心者君主之官神明出焉心者生之本神之變也為陽中之太陽通於夏氣主明則下安以此養生則壽主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃心以膻中為腑與小腸為表裡其母肝木其子脾土其克肺金其賊腎水其象火其藏神其旺夏其絕冬其色赤其位南其卦離其惡熱其性禮其音徵其數七其味苦其臭焦其華面其候舌其充血其液汗其聲笑其氣呼其不足則憂其有餘則笑不休其平脈洪其賊脈沉其死壬癸日其畜羊其谷黍上為熒惑星其見症也消渴兩腎內痛後廉腰背痛浸淫善笑善驚善忘上咳吐下氣泄眩僕身熱腹痛而悲夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而有石曰冬病石甚曰今病脈來累累如循琅玕曰心平脈來喘喘連屬其中微曲曰心病脈來前曲後居如操帶鉤曰心死真心脈至堅而持如循薏苡子累累然色赤黑不澤毛折乃死手少陰氣絕則脈不通脈不通則血不流血不流則色澤去故面黑如黧此血先死壬日篤癸日死心絕一日死心至懸絕九日死赤欲如帛裹朱不欲如赭赤如雞冠者生赤如衃血者死憂愁思慮則傷心實則夢憂驚恐怖虛則夢煙火焰明喜傷心恐勝喜熱傷氣寒勝熱苦傷氣酸勝苦苦走血血病毋多食苦多食鹹則脈凝泣而變色心欲軟急食鹹以軟之以咸補之以甘瀉之心苦緩急食酸以收之犬肉麻仁李韭皆酸心臟之圖心形如未敷蓮花重十二兩中有七孔三毛盛精之汁三合附脊第五椎爾雅曰心纖也靈纖細微無物不貫卮言曰深也深居高拱相火代之行事也手少陰心經左右共十六穴心手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下下循臑內後廉行太陰心主之後下肘內循臂內後廉抵掌後銳骨之端入掌內後廉循小指之內出其端多血少氣午時氣血注此補棗仁麥門冬遠志山藥當歸天竺黃瀉貝母黃連木香玄胡索溫石菖蒲藿香涼竹葉牛黃硃砂連翹犀角東垣報使引經獨活細辛足太陰脾經己土脾者倉廩之官五味出焉脾者倉廩之本營之居也此至陰之類通於土氣脾以胃為腑其母心火其子肺金其克腎水其賊肝木其象土其藏意其旺長夏及四季之末其絕春其色黃其位中央其卦坤其惡濕其性信其音宮其數五其味甘其臭香其華在唇四白其候口其充肉其液涎其聲歌其氣呵其不足則少氣其有餘脹滿其平脈緩其賊脈弦其死甲乙日其畜牛其谷稷上為鎮星其見症也五泄注下五色大小便不通面黃舌本強痛口甘食即吐食不下咽怠惰嗜臥搶心善飢善味不嗜食不化食尻陰膝臑胻足背痛煩悶心下急痛有動氣按之若牢當臍痛心下痞腹脹腸鳴飧泄不化足不收行善瘛腳下痛九竅不通溏泄水下後出餘氣則快飲食中滿食減善噫形醉皮膚潤而短氣肉痛身體不能動搖足胻腫若水長夏胃微軟弱曰平弱多胃少曰脾病但代無胃曰死軟弱有石曰冬病弱甚曰今病脈來和柔相離如雞踐地曰脾平脈來實而盈數如雞舉足曰脾病脈來堅銳如鳥之啄如烏之距如屋之漏如水之流曰脾死真脾脈至弱而乍疏乍數色黃青不澤毛折乃死足太陰氣絕則脈不榮其口唇口唇者肌肉之本也脈不榮則肌肉不滑澤肌肉不滑澤則肉滿肉滿則唇反唇反則肉先死甲日篤乙日死脾絕十二日死脾至懸絕四日死黃欲如羅裹雄黃不欲如黃土黃如蟹腹者生黃如枳實者死飲食勞倦則傷脾實則夢歡歌快樂虛則夢飲食相爭思傷脾怒勝思濕傷肉風勝濕甘傷肉酸勝甘甘走肉肉病多食甘多食酸則肉胝䐢而唇揭脾欲緩急食甘以緩之以甘補之以苦瀉之脾苦濕急食鹹以燥之大豆豕肉慄藿皆咸脾足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上踹內循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中少血多氣巳時氣血注此脾臟之圖脾重二斤二兩扁廣三寸長五寸有散膏半斤中梓曰脾胃屬土故俱從田字田者土也胃居正中故田字居正中脾屬於右故田字亦偏右足太陰脾經左右共四十二穴補人參白朮黃耆蓮子芡實陳皮扁豆甘草山藥蒼朮茯苓瀉枳實青皮石膏溫丁香藿香胡椒良薑附子官桂吳茱萸涼玄明粉滑石東垣報使引經白芍藥升麻足少陰腎經癸水腎者作強之官伎巧出焉腎者主蟄封藏之本精之處也為陰中之少陰通於冬氣腎以膀胱為腑其母肺金其子肝木其克心火其賊脾土其象水其藏志其旺冬其絕長夏及四季之末其色黑其位北其卦坎其惡燥其性智其音羽其數六其味鹹其臭腐其華在發其候耳其充骨其液津其聲呻其氣吹其不足則厥其有餘則腸泄其平脈沉其賊脈緩其死戊己日其畜彘其谷豆上為辰星其見症也面如漆䏚中清面黑如炭口渴咳唾多血胸中滿大小腹痛大便難臍左脅下背肩髀間痛飢不欲食心懸如飢腹大脛腫咳嗽脊臀股後痛臍下氣逆小腹急痛泄足痿厥下腫足胻寒而逆腸癖陰下濕四指黑手指青厥足下熱嗜臥坐而欲起凍瘡下痢善思善恐四肢不收四肢不舉冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病脈來喘喘累累如鉤按之而堅曰腎平脈來如引葛按之益堅曰腎病脈來發如奪索辟辟如彈石曰腎死真腎脈至搏而絕如彈石辟辟然色黃黑不澤毛折乃死足少陰氣絕則骨枯少陰者冬脈也伏行而溫於骨髓故骨髓不溫即肉不著骨骨肉不相親即肉濡而卻肉濡而卻故齒老而枯發無潤澤者骨先死戊日篤己日死腎絕四日死腎至懸絕七日死黑欲如重漆色不欲如炭色黑如烏羽者生黑如炲者死入坐濕地強力入水則傷腎實則夢腰脊解軟虛則夢涉水恐懼恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸咸走骨骨病毋多食鹹多食甘則骨疼痛而齒落腎欲堅急食苦以堅之以苦補之以咸瀉之腎苦燥急食辛以潤之黃黍雞肉桃蔥皆辛腎足少陰之脈起於足小指之下邪走足心出於然谷之下循內踝之後別入跟中以上踹內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中多血少氣酉時氣血注此補芡實地黃龍骨虎骨牡蠣桑螵蛸龜板山藥五味子鎖陽牛膝枸杞山茱萸杜仲瀉澤瀉知母溫附子肉桂破故紙鹿茸沉香膃肭臍涼黃柏知母牡丹皮地骨皮東垣報使引經獨活肉桂腎臟之圖父母構精未有形象先結河車中間透起一莖如連蕊初生乃臍帶也蕊中一點實生身立命之原即命門也自此天一生水先結兩腎夫命處於中兩腎左右開合正如門中棖闑故曰命門蓋一陽處於二陰之間所以成乎坎也詳見辨妄篇及八味丸方論中甲乙經曰腎者引也能引氣通於骨髓卮言曰腎者神也妙萬物而為言也腎有兩枚形如豇豆重一斤一兩附脊十四椎當胃下兩傍前後與臍平直足少陰腎經左右共五十四穴手陽明大腸經庚金大腸者傳導之官變化出焉其見症也大指次指難用耳聾煇煇焞焞耳鳴嘈嘈耳後肩臑肘臂外皆痛氣滿皮膚堅而不痛大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉循臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出俠口交人中左之右右之左上俠鼻孔氣血俱多卯時氣血注此大腸腑之圖大腸重二斤十二兩長二丈一尺廣四寸徑一寸當臍右回疊積十六曲盛谷一斗水七升半卮言曰腸者暢也貴通暢也大腸上口小腸下口大腸下接直腸下為肛門穀道手陽明大腸經左右共四十穴補牡蠣肉豆蔻訶梨勒五倍子龍骨蓮子粟殼瀉枳殼桃仁麻仁芒硝大黃檳榔石斛蔥白溫乾薑肉桂吳茱萸涼槐花條芩東垣報使引經葛根白芷升麻行上石膏行下手太陽小腸經泌清別濁水液分於膀胱滓穢分於大腸小腸者受盛之官化物出焉其見症也面白耳前熱苦寒額頷腫不可轉腰似折肩臑肘臂外後廉腫痛臑臂內前廉痛小腸腑之圖小腸重二斤十四兩長三丈二尺廣二寸半徑八分分之少半左回疊積十六曲容谷二斗四升水六升三合合之大半手太陽小腸經左右共三十八穴小腸手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目銳眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴多血少氣未時氣血注此補牡蠣石斛瀉荔枝子蔥白紫蘇木通溫小茴香大茴香烏藥涼天花粉黃芩東垣報使引經藁本羌活行上黃柏行下手少陽三焦經水穀之道路氣之所終始也上焦在胃上口其治在膻中中焦在胃中脘其治在臍旁下焦當膀胱上口治在臍下一寸三焦者決瀆之官水道出焉其見症也耳鳴喉痹腫痛耳後連目銳眥痛汗自出肩臑痛內外皆疼小指次指如廢三焦手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥多血少氣亥時氣血注此手少陽三焦經左右共四十六穴補黃耆甘草益智仁瀉澤瀉溫附子涼石膏地骨皮東垣報使引經柴胡行上川芎行上青皮行下三焦獨無圖者上焦如霧中焦如漚下焦如瀆有象無質即上中下三部臟腑空處是也手厥陰心包經絡丙火包絡者包絡其心也即膻中也為心之腑從來諸說不一承訛已久今考正之說見辨妄篇膻中者臣使之官喜樂出焉其見症也笑不休手心熱心中大熱面黃目赤心中動手厥陰心包絡之脈起於胸中出屬心包下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端多血少氣戌者氣血注此手厥陰心包絡經左右共一十八穴補地黃瀉枳殼烏藥溫桂涼梔子東垣報使引經柴胡行上川芎行上青皮行下心包絡獨無圖者以其在心下橫膜之上豎膜之下與橫膜相黏而黃脂裹者心也其脂膜之外有細筋膜如絲與心肺相連者心包絡也觀其命名即可思義乃叔和配諸尺中因其為臣使之官應心主而為相火故誤耳參玩內經昭然可辨足陽明胃經戊土官與脾同其見症也惡煙火聞木音則驚狂上登而歌棄衣而走顏黑不能言唇胗嘔呵欠消穀善飢頸腫膺乳氣衝股伏兔胻外廉足跗皆痛胸旁過乳痛口渴腹大水腫奔響腹脹胻內廉跗痛髀不可轉膕如結踹如裂膝髕腫痛遺溺失氣善伸數欠顛疾濕浸心欲動則閉戶獨處驚惈身前熱身後不熱胃足陽明之脈起於鼻交頞中旁納太陽之脈下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其有者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下入膝髕中下循胻外廉下足跗入中指內間其支者下廉三寸而別下入中指外間其支者別跗上入大指間出其端多血多氣辰時氣血注此補白朮蓮子芡實陳皮扁豆黃耆山藥半夏百合蒼朮瀉枳實硝石大黃溫藿香厚朴益智丁香吳茱萸草豆蔻白豆蔻肉豆蔻良薑乾薑生薑木香香附胡椒涼滑石石膏玄明粉石斛黃連黃芩天花粉山梔子升麻連翹乾葛竹茹知母東垣報使引經葛根白芷升麻行上石膏行下胃腑之圖胃重二斤十四兩紆曲屈伸長二尺六寸大一尺五寸徑五寸容谷二斗水一斗五升卮言曰胃者匯也號為都市五味匯聚何所不容萬物歸土之義足陽明胃經左右共九十穴足太陽膀胱經壬水膀胱者州都之官津液藏焉氣化則能出矣其見症也頭苦痛目似脫頭兩邊痛淚出臍反出下腫便膿血肌肉痿項似拔小腹脹痛按之欲小便不得膀胱足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從髆內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫踹內出外踝之後循京骨至小指外側多血少氣申時氣血注此膀胱腑之圖膀胱重九兩二銖縱廣九寸盛溺九升九合廣二寸半甲乙經曰膀者橫也胱者廣也言其體橫廣而短也膀胱上下俱有口上口絡於闌門下口裹胞乃胞外脂膏也形與綿球相似通身虛松可以畜水漸漬而滲入胞中胞滿而溺出也足太陽膀胱經左右共一百三十六穴補橘核菖蒲龍骨續斷益智仁瀉芒硝滑石車前子澤瀉溫茴香烏藥涼生地黃甘草梢黃柏東垣報使引經藁本行上羌活行上黃柏行下足少陽膽經甲木膽者中正之官決斷出焉其見症也口苦馬刀挾癭足外熱寢寒憎風體無膏澤胸中脅肋髀膝外至胻絕骨外踝前諸節痛善太息膽足少陽之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者別目銳眥下大迎合於手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上入小指次指之間其支者別跗上入大指之間循大指岐骨內出其端還貫入爪甲出三毛多氣少血子時氣血注此膽腑之圖膽在肝之短葉間重三兩三銖藏精汁三合狀如瓶卮言曰膽者澹也清淨之府無所受輸淡淡然者也中梓曰膽者擔也中正之官決斷出焉言有擔當也足少陽膽經左右共八十六穴補草龍膽木通瀉青皮柴胡溫半夏生薑陳皮川芎涼黃連竹茹東垣報使引經川芎行上柴胡本經青皮行下足厥陰肝經乙木肝者將軍之官謀慮出焉肝者罷極之本魂之居也為陽中之少陽通於春氣肝以膽為腑其母腎水其子心火其克脾土其賊肺金其象木其藏魂其旺春其絕秋其色青其位東其卦巽其惡風其性仁其音角其數八其味酸其臭羶其華爪其候目其充筋其液泣其聲呼其氣噓其不足則悲其有餘則怒其平脈弦其賊脈澀其死庚辛日其畜雞其穀麥上為歲星其見症也頭痛脫色善潔耳無聞頰腫肝逆面青目赤腫痛兩脅下痛引小腹胸痛脅腫婦人小腹腫腰痛不可俯仰四肢滿悶挺長熱嘔逆睪疝暴癢足逆寒胻善瘛遺溺淋溲便難癃狐疝㿗冒眩轉筋陰縮筋攣善恐胸中喘罵詈血在脅下喘春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛曰秋病毛甚曰今病脈來耎弱招招如揭長竿末梢曰肝平脈來盈實而滑如循長竿曰肝病脈來急溢頸如新張弓弦曰肝死真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死足厥陰氣絕則筋縮引卵與舌卷筋者聚於陰器而絡於舌本故脈不榮即筋縮急筋縮急即引卵與舌故舌卷卵縮此筋先死庚日篤辛日死肝絕八日死肝至懸絕十八日死青欲如蒼璧之澤不欲如藍青如翠羽者生青如草茲者死恚怒氣逆上而不下則傷肝實則夢山林大樹虛則夢細草苔蘚怒傷肝悲勝怒風傷筋燥勝風酸傷筋辛勝酸酸走筋筋病毋多食酸多食辛則筋攣急而爪枯肝欲散急食辛以散之以辛補之以酸瀉之肝苦急急食甘以緩之粳米牛肉棗葵皆甘肝臟之圖肝重四斤四兩左三葉右四葉附脊第九椎卮言曰肝者干也屬木象木枝幹也足厥陰肝經左右共二十八穴肝足厥陰之脈起於大指叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺多血少氣丑時氣血注此補木瓜阿膠薏仁酸棗仁瀉青皮芍藥柴胡青黛溫木香肉桂吳茱萸涼甘菊龍膽草胡黃連車前子東垣報使引經柴胡本經青皮行下川芎行上督脈督脈起於下極之俞並於脊裡上至風府入腦上巔循額至鼻柱屬陽脈之海其見症也脊強而腰厥督者都也行背部中為陽脈之都綱奇經脈也二十八穴任脈任脈起於中極之下以上毛際循腹裡上關元至喉嚨屬陰脈之海其見症也苦內結男子為七疝女子為瘕聚任者妊也行腹部中為生養之本亦奇經脈也二十四穴衝脈衝脈起於氣衝並陽明之經夾臍上行至胃中而散其見症也氣逆而裡急沖者通也言下至足上至頭通十二經之氣血帶脈帶脈起於季脅回身一周其見症也苦腹滿腰溶溶如坐水中帶者束也總束諸脈也季脅在肋下接髖骨之間陽蹺脈陽蹺脈者起於跟中循外踝上行入風池其見症也陰緩而陽急蹺者健也是人動足之所由也陰蹺脈陰蹺脈者起於跟中循內踝上行至咽喉交貫衝脈其見症也陽緩而陰急義與陽蹺同陽維脈陽維起於諸陽之會維者維持之義也為諸脈之綱維陰維脈陰維起於諸陰之交義與陽維同二經之見症也悵然失志溶溶不能自持驚即失志喜忘恍惚任督二脈導引秘旨夫人身之有任督猶天地之子午也人身之任督以腹背言天地之子午以南北言可以分可以合分之以見陰陽不離合之以見渾淪無間此修真者之周行也惜夫舉世昏昏盡趍岐徑或默朝土帝或內視腑臟或存神閉息或服氣吞霞或運氣機行火候或煉日月採精華或日運臍輪夜運泥丸或朝呼三魂暮攝七魄或按周天而工搬運或指斗柄而轉化機或守中黃絳宮而待神凝氣聚或運三華五炁而用洗骨伐毛種種旁門豈離任督獨惜其舍正路而不由耳知之者四門外閉兩目內觀心如止水身似空壺締觀黍米之珠權作黃庭之主不施搬運自妙轉旋含光嘿嘿調息綿綿握固內守注意玄關頃刻而真元內還未幾而一陽來復兩腎如湯煎膀胱似火熱任督猶車輪四肢若山石鼓巽運坤天機自動微以意定則水火自然升降如桔槔之呼水稻花之凝露謂之乾坤交垢罷一點落黃庭到此地位意不可散散則不成丹矣故紫陽翁曰真汞生於離其用卻在坎奼女過南園手持玉橄欖身心渾沌與虛空等不知身之為我我之為身神之為氣氣之為神不規中而自規中不胎息而自胎息虛室生白黑地引針亦不知任之為督督之為任也此是最上一乘慎勿身中摸索真志於修者其知所務哉別症論第十蓋聞治適病者易治失病者難今工者盡難而易者偶中非若諄於長沙之見隔世不爽錙銖而投治如合符節也雖先聖立教詳明而陰陽虛實元會運氣七情六淫四時寒暑錯互不齊況臟腑有合起之病而感受無偏至之形千端萬緒寧能悉諸簡編即載籍極博尤必先夫靈敏善乎丹溪有言曰醫者臨機應變如對敵之將操舟之工自非隨時取中寧無愧乎按前人已成之跡應今人無限之病何異按圖索驥幸其偶中也難矣太無先生日用古法治今病如拆舊屋改新屋不再經匠氏之手其可用乎潔古云運氣不齊古今易轍舊方新病難相附合許學士曰予讀仲景書守仲景法未嘗守仲景方乃為得仲景心也王履曰醫術之要先尋大意大意既曉則條分縷析脈絡分明內經曰知其要者一言而終不知其要流散無窮歷觀名論皆以別症為先吁嗟症固難別別症亦未易也脈有雷同症有疑似水火亢制陰陽相類臟之發也混於腑血之變也近於氣大實有羸狀誤補益疾至虛有盛勢反瀉含冤或辨色已真而診候難合或指下既察而症狀未彰欲按古今法而功效弗臻欲師心處療而狐疑莫決展轉進退毫釐千里獨不計人以死生寄我我以嘗試圖功彼禍人者無論矣即偶中者詎可對衾影哉彤溪有叔祖年七十患泄漏丹溪曰病久而不悴便澀而不赤脈澀而帶弦詢其喜食鯉魚遂以茱萸陳皮生薑砂糖等藥探吐膠痰而瀉止又有鄰人素患疳瘡夏初泄瀉脈澀而弦丹溪曰此下疳之重者與當歸蘆薈丸去麝四劑而瀉止夫此兩人症似脈同而治之迥別者求其本也一人勞倦發熱口乾煩躁面目皆赤東垣曰脈來鼓指而按之豁然內真寒而外假熱也取參朮薑附煎就使之冷服者以真熱假寒之劑治之一貼而熱勢盡退一人惡寒發戰兩脈細微按之甚數以石膏黃連清火之劑乘熱頓服而寒勢遂止此皆水火亢制而有兼化之象設不從脈按症治之禍不旋踵江右袁啟莘平素勞心處事沉滯時當二氣小便不通醫者與六一散不效再用木通澤瀉茯苓車前等藥又不效診得兩寸洪數知為心火刑金故氣化不及州都也亟用黃連茯神人參牛膝麥門五味一劑而愈閩中周東志形羸善飯忽患腹痛脹悶眾皆泥其脾虛多食不能運化治以枳實陳皮青皮神麯白朮茯苓脹勢轉增右寸關洪滑知為胃火上衝惟用石膏陳皮山梔甘草升麻黃芩二劑而脹止再用四君子加薑汁炒山梔十劑而康夫臟腑本不相懸而用藥若斯之異倘泥而不通其不致夭札者幾希一婦人多郁多產肢體漸瘦四肢微腫咳嗽吐痰稍有動作頭眩耳鳴有與八珍湯者久而無功此肝脾郁傷血分先用逍遙散加木香龜膠熟地二十劑而症減其七仍用八珍湯加丹皮香附兩月而瘥汪望洋之孫年方舞象發熱吐痰頭眩羸弱醫皆以二冬二母四物芩柏治之似瘧非瘧倦怠異常診其右三部不及左者兩倍及知脾肺氣虛火不生土之候也遂用補中益氣加薑桂至三錢十劑而安四十劑而平復夫治氣者主陽而升治血者主陰而降現症頗類而治之法適不相侔焉可以疑似之見賈禍耶樂元忠妻因免乳後病驚身翩翩如在浮雲中舉目則旋轉持身不定四肢痠軟皆以安神補虛治之前症轉甚戴元禮獨曰左脈芤且澀神色不變是驚氣傷心包絡積血耳乃下血如漆者一斗遂愈大實似羸者此也留守衛陸仲容之內病大熱妄見鬼神手揚足擲或用黃連清心湯困苦垂斃元禮視之曰形瘦而色不澤乃虛極耳專與參耆而安至虛似盛者此也此兩症者元禮不起而反劑雜投幽潛沉冤矣雖然難明者意難盡者言姑舉一二俾觸類相通惟願志仁壽者即病機淺易必審察昭昭標本彰明必小心翼翼明矣慎矣又毋以疑懼起因循之弊必以精詳操獨斷之權設有未確闕疑以待高明慎勿輕狂嘗試以圖僥倖庶無負於仁者之初心耳不然利心溺而名心深機心起而仁心隱毋乃自居於卑庸而品節一壞終世莫償貽害日多噬臍何及其可不痛切深戒哉四要論第十一按醫學之要有要於望聞問切者乎無之也哀夫叔季之世惟賴問之一端況其素問未必能悉遵前訓止求病端不察病本又況士大夫多秘所患以驗醫之能否問惡可以窮病之情哉或有攻苦之士留心候診而偽訣訛傳皆泥於左心小腸右肺大腸之訛浸淫而莫悟經位不別尚何以察死生虛實之機耶夫醫之四要猶人之四肢也一肢廢不成其為人一要缺不成其為醫經曰望而知之謂之神聞而知之謂之聖問而知之謂之工切脈而知之謂之巧六十一難曰望而知之者望見五色以知其病之所處也聞而知之者聞其五音以別其病之所出也問而知之者問其所欲五味以知其病之所起所在也切而知之者診其寸口視其虛實以知其病在何腑臟也故夫初近患人先望而聞次問而切誠不易之次第而醫者顧可忽乎匯其亟要列錄於左知言君子將有擇焉望靈樞經曰色青者其脈弦也赤者其脈鉤也黃者其脈代也白者其脈毛黑者其脈石見其色而不得其脈反得其相勝之脈則死矣得其相生之脈則病已矣五色篇曰赤色出兩顴大如拇指者病雖小愈必卒死黑色出於天庭大如拇指必不病而卒死黃帝曰青黑為痛黃赤為熱白為寒是為五官脈要精微論篇曰夫精明五色者氣之華也赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼五色精微象見矣其壽不久也青如草茲黃如枳實黑如煙煤赤如衄血白如枯骨皆死青如翠羽赤如雞冠黃如蟹腹白如豕膏黑如烏羽皆生夫五臟者身之強也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂附筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣得強者生失強者死左頰屬肝額屬心鼻屬脾右頰屬肺頤屬腎青色見於太陰太陽及魚尾正面口角如大青藍葉怪惡之狀者肝氣絕主死若如翠羽柏皮只是肝邪有怒病驚病風病目病之屬赤色見於口唇及三陰三陽上下如馬肝之色死血之狀者心氣絕主死若如橘紅馬尾色者只是心病有火熱怔怖驚悸夜臥不寧健忘之屬白色見於鼻準及正面如枯骨如擦殘汗粉者為肺氣絕主死若如膩粉梅花白綿者只是肺邪氣虛中寒咳嗽哮喘之屬黃色見於鼻乾燥若土偶之形為脾氣絕主死若如桂花雜以黑暈只是脾病飲食不快四肢倦怠脹悶泄瀉嘔吐之屬黑色見於耳或輪廓內外命門懸壁若汙水煙煤之狀者為腎氣絕主死若如蜘蛛網眼烏羽之澤者只是腎虛火邪乘水之病病者目睛不了了鼻中呼不出吸不入氣短促而冷者陰病也目中了了鼻中呼吸出入能往能來口鼻息長而皆熱者陽病也病人及健人黑色或白色起入目及口鼻三日中死久病人耳目及顴骨赤者五日死病人目無精光面若土色不受飲食四日死病人兩目眥有黃色起者將愈病人面目俱黃者不死病人面唇青黑者死健人及病人面如馬肝色望之如青近之如黑者死鼻管仰起者死神氣枯槁不潤澤者死聞經曰言而微終日乃復言者此奪氣也聲如從室中言此中氣之濕也因於暑汗煩渴而喘靜則多言衣被不斂言語善惡不避親疏者此神明之亂也仲景曰病人語聲寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中病息搖肩者心中堅息引胸中上氣者咳息張口短氣者肺痿吐沫病人五臟已奪神明不守聲嘶者死喉中有聲謂之肺鳴火來乘金不得其平則自鳴此壞症也虛勞痰嗽漸至聲啞者必死大笑不止心病也喘氣太息肺病也怒而罵詈肝病也氣不足以息者脾病也欲言不言語輕多畏者腎病也病人陰陽俱絕失錯不能言者三日死病人妄言錯亂及不能言者不治惟熱病者可以治倦不欲言縱使強言之聲怯弱而低微者內傷不足也語言前輕而後重其言高其聲壯厲而有力者外感有餘也言響如從甕中出傷風也言語無力不欲言難布息者內傷也言而不厭者外傷也問素問疏五過論篇曰凡未診病者必問嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精凡欲診病者必問飲食居處暴樂暴苦始樂後苦皆傷精氣暴怒傷陰暴喜傷陽診有三常必問貴賤封君敗傷及欲候王故貴脫勢雖不中邪精神內傷身必敗亡始富後貧雖不傷邪皮焦筋屈痿躄為攣徵四失論篇曰診病不問其始憂患飲食之失節起居之過度或傷於毒不先言此卒持寸口何病能中甲乙經曰問病者所思何也所懼何也所欲何也所疑何也問之要察陰陽之虛實辨臟腑之寒熱疾病所生不離陰陽寒熱虛實辨之分明治無誤矣五十一難問病欲得寒而欲見人者病在腑也病欲得溫而不欲見人者病在臟也問其痛處按之而痛止者為虛按之而痛甚者為實痛不移者為血痛無定者為氣凡百病問其晝則增劇夜則安靜氣病而血不病也夜則增劇晝則安靜血病而氣不病也晝熱夜靜陽氣旺於陽分也晝靜夜熱陽氣下陷入陰中也晝夜俱熱重陽無陰也亟瀉其陽峻補其陰晝靜夜寒陰血旺於陰分也夜靜晝寒陰氣上溢於陽中也晝夜俱寒重陰無陽也亟瀉其陰峻補其陽晝寒夜熱病名陰陽交變而死矣移精變氣論篇曰閉戶塞牖系之病者數問其情以從其意得神者昌失神者亡產後須問坐草難易惡露多少飲食遲早生子存亡蓋形傷血傷之不同補氣補血之有異飲食失節宜調中生子不存兼開鬱問其所欲以知其病欲熱者知為寒欲冷者知為熱好靜惡動者知為虛煩躁不寧者知為實惡食知傷食惡風知傷風好食甘為脾虛好食辛為肺病好食酸為肝虛好食鹹為腎弱好食苦為心病此皆順應而易治若乃心病愛咸肺傷欲苦脾弱喜酸肝病好辣腎衰嗜甘此為逆候病輕必危危者必死王海藏曰常人求診拱默惟令切脈試其知否殊不知氣血附於經絡熱則脈疾寒則脈遲實則有力虛則無力若得病之由及所傷之物豈能以脈知之乎故醫者不可不問其由病者不可不說其故蘇東坡曰吾疾必盡告醫者使胸中瞭然然後診脈疑似不能惑也吾求愈疾而已豈以困醫為事哉切經曰必審其所始病與今之所方病然後各切循其脈視其經絡浮沉上下逆從六部之中獨小者病獨大者病獨遲者病獨疾者病獨熱者病獨寒者病獨陷者病脈從四時謂之可治脈逆四時為不可治所謂逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈也熱則脈數寒則脈遲沉主在裡浮主在表虛者脈虛實者脈實澀者陽氣有餘滑為陰氣不足此八者脈之綱領也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛心脈循血脈而行持脈指法如六菽之重按至血脈而得者為浮稍稍加力脈道粗者為大又稍加力脈道闊軟者為散肺脈循皮毛而行持脈指法如三菽之重按至皮毛而得者為浮稍不加力脈道不利為澀又稍加力不及本位曰短肝脈循筋而行持脈指法如十二菽之重按至筋而脈道如箏弦相似為弦次稍加力脈道迢遞者為長脾脈循肌肉而行持脈指法如九菽之重按至肌肉如微風輕颭柳梢之狀為緩次稍加力脈道敦實者為大腎脈循骨而行持脈指法按至骨上而得者為沉次重而按之脈道無力為濡舉止來疾流利者為滑經曰先知經脈而後知病脈此之謂也脈盛滑而堅者病在外脈實小而堅者病在內脈小弱而澀者謂之久病浮滑而疾者謂之新病脈急為疝瘕小腹痛緩而滑曰熱中盛而堅曰脹來疾去徐上實下虛為厥顛來徐去疾上虛下實為惡風寸口之脈中手短者曰頭痛中手長者曰足胻痛中手促上擊者曰肩背痛浮而盛者病在外沉而堅者病在中沉而弱者寒熱推而內之外而不內身有熱也推而外之內而不外有心腹積也推而上之上而不下腰足清也推而下之下而不上頸項痛也按之至骨脈氣少者腰脊痛而身有痹也黃帝曰脈從而病反者其診何如曰脈至而從按之不鼓諸陽皆然諸陰之反何如曰脈至而從按之鼓甚而盛也化源論第十二自人心不古膠泥藥性拘惑成方而化源之義廢而不講久矣夫不取化源而逐病求療譬猶草木將萎枝葉蜷攣不知固其根蒂灌其本源而僅僅潤其枝葉雖欲不稿焉可得也人第知枝葉蜷而救枝葉者之近而切救根荄者之遠而迂亦曾知根荄澤而枝葉靡不向榮根荄戕而枝葉靡不受悴乎陰陽應象大論曰治病必求於本至真要大論曰諸寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也六元正紀大論曰資其化源訓詰諄諄光如日月罔非重源本耳苟捨本從標不惟不勝治終亦不可治故曰識得標只取本治千人無一損如脾土虛者必溫燥以益火之源肝木虛者必濡濕以壯水之主肺金虛者必甘緩以培土之基心火虛者必酸收以滋木之宰腎水虛者必辛潤以保金之宗此治虛之本也木欲實金當平之火欲實水當平之土欲實木當平之金欲實火當平之水欲實土當平之此治實之本也金為火制瀉心在保肺之先木受金殘平肺在補肝之先土當木賊損肝在生脾之先水被土乘清脾在滋腎之先火承水克抑腎在養心之先此治邪之本也金太過則木不勝而金亦虛火來為母復仇木太過則土不勝而木亦虛金來為母復仇水太過則火不勝而水亦虛土來為母復仇火太過則金不勝而火亦虛水來為母復仇皆亢而承製法當平其所復扶其不勝經曰無翼其勝無贊其復此治復之本也得其本則生生之本不閼而化化之源無窮謹道如法萬舉萬全氣血正平長有天命不然者膠藥執方用之不疑一旦敗傷動輒委命叩以循環相制之微惘然自失猶為遁詞以欺世良可慨矣知機論第十三古之論病不曰病形不曰病體命曰病機夫機之義微矣哉昔者養由氏懸楊葉於旋風之間矢無虛發人皆異之養由氏曰矢之發也不離乎機機之發也不離乎心我方不知心之為葉葉之為心雖欲不中胡可得也機者毫釐之間間不容髮秒未之差相懸無筭夫以至微至活之理非有至著至確之識其可謂之知機耶內經曰審察病機無失氣宜本草曰欲療治者先察病機病機未諳豈能變化處治徒循死句守株待兔不可以為工矣若諸風掉眩皆屬肝木諸痛瘡瘍皆屬心火諸濕腫滿皆屬脾土諸氣膹郁皆屬肺金諸寒收引皆屬腎水此病機之屬於五運者也諸暴強直皆屬於風諸嘔吐酸皆屬於熱諸躁狂越皆屬於火諸痓強直皆屬於濕諸澀枯槁皆屬於燥諸病水液皆屬於寒此病機之屬於六氣者也然運氣之道亢極則復反兼勝己之化故河間嘗曰夏熱太甚林木流津火極似水也冬寒太甚流水冰堅陰極似陽也仲景曰陽病十八陰病十八五臟之病各有十八合為九十病又有六微有十八病合為一百八病五勞七傷六極婦人三十六病不在其中則病機之繁未易枚舉病機之變未易測識奈何卑溺者流捕風捉影以依稀為實據膠柱鼓瑟以硬套為神良如虛勞發熱吐血痰嗽輒用一冬二母四物芩連款花紫菀之屬中風痿痹輒用三生二陳秦艽天麻之屬傷寒發熱輒用柴胡黃芩陳皮甘草之屬水腫腹脹輒用五皮枳殼澤瀉之屬瘧疾寒熱輒用青皮草果柴胡乾葛厚朴常山之屬痢疾腹痛輒用芍藥當歸黃連木香枳殼檳榔之屬嘔吐輒用竹茹山梔橘皮生薑之屬泄瀉輒用甘草白朮茯苓陳皮之屬小便不利輒用豬苓澤瀉木通車前之屬精氣不固輒用蓮鬚芡實金櫻牡蠣之屬不臥輒用棗仁遠志之屬口渴輒用花粉門冬之屬頭痛輒用川芎白芷藁本之屬足痛輒用木瓜牛膝苡仁之屬目疾輒用四物三黃蔓荊甘菊之屬婦科輒用香附烏藥四物陳皮之屬諸若此類不可勝舉果爾則醫亦何難之有耶夫運氣參差標本緩急臟腑陰陽貴賤貧富虛實邪正南北東西活若荷中之露實難捉摸不知因病以用法乃欲因法以合病效之不獲則曰有命詎然乎哉豈謂法儘可廢必趍奇異正恐法之可合者十三不可合者十七粗工未審詡詡專恣一旦告窮伊誰之咎嗟乎皆由不知病機專執病形之失也昔者齊中尉潘滿如小腹痛倉公診曰病得之酒且內其脈深小弱氣口緊小見瘕氣也中尉不復自止於內二十八日當溲血死居二十五日果溲血三日死王仲宣年二十仲景謂之曰君有病四十歲當眉落眉落半年而死服五石湯可免仲宣嫌其言受湯弗服居數日見仲宣曰服湯否曰已服仲景曰色候固非服湯之診君何輕命也後二十年果眉落至一百八十日而死古稱知機其神者庶幾其人歟學者每以此案自反當得愧汗通身抑此神奇豈別有術數之操只熟於理而已理熟則機得機得則言中奈何不察其機自居於闇而動以先哲為不可冀也亦知先哲之勤求古訓與今日之醫甚懸絕哉明治論第十四醫門之理賾而難窮莫先乎見其大意大意見則條理在我由此尋繹究何難窮粗工錯繆如肓人適野不辨東西又如羅雀於江罾魚於林冀其幸而得之豈理也哉夫三法四因五治六淫八要十失最宜早辨三法者初中末也一日初法當用峻猛緣病新暴感之輕發之重以峻猛之藥亟去之二曰中法當用寬猛相濟緣病非新非久須緩急得中養正去邪相兼治之三日末法當用寬緩藥性平善廣服無毒取其安中補益緣病久邪去正氣日微也四因者有始因氣動而內有所成病者積聚癥瘕之類有始因氣動而外有所成病者癰疽瘡瘍掉瘈之類有不因氣動而內有所成病者留飲宿食喜怒想慕之類有不因氣動而外有所成病者瘴氣邪魅蠱毒蟲咬獸傷墮墜刀斫刺射捶撲之類五治者和取從折屬也一曰和假令小熱之病當以涼藥和之和之不已次用取二曰取為熱勢稍大當以寒藥取之取之不已次用從三曰從為熱勢既甚當以溫藥從之從之不已次用折四曰折為病勢極甚當以逆制之制之不已當以下奪之下奪不已次用屬五曰屬為求其屬以衰之如熱陷骨髓針藥之所不及故必求其屬屬者生克之本王太僕所謂壯水之主以制陽光是也六淫者陰陽風雨晦明也陰淫寒疾則怯寒此寒水太過別淺深以溫之陽淫熱疾則惡熱此相火太過須審虛實以涼之風淫末疾末謂四肢也必身強直此風木太過須和冷熱以平治之在陽則熱在陰則寒寒則筋攣骨痛熱則委緩不收雨淫腹疾則濕氣濡泄此濕土太過以平滲燥之兼看冷熱之候晦淫惑疾晦邪所幹精神惑亂此燥金太過當滋養之明淫心疾心氣鼓動狂邪譫妄此君火太過當鎮以斂之八要者虛實冷熱邪正內外也一曰虛脈細皮寒氣少泄瀉飲食不進此為五虛二曰實脈盛皮熱腹脹前後不通悶瞀此為五實三曰冷陽氣衰微腑臟積冷四曰熱陰氣衰弱腑臟積熱五曰邪非臟腑正病也六曰正非外邪所幹也七曰內情欲所傷不在外也八曰外外物所傷不在內也十失者病在驕恣背理不遵醫戒不自珍愛一失也輕身重財治療不早診視不勤二失也聽從師巫廣行殺戮不信醫藥三失也憂思想慕怨天尤人廣生懊惱四失也諱疾忌醫言不由中藥不合症五失也不能擇醫或信佞言或憑龜卜六失也室家不和處事乖戾盡成荊棘七失也不明藥理旦暮更醫雜劑妄投八失也但索速寫方藥材濫惡妄為加減九失也奉持匪人煎丸失法怠不精詳十失也工醫者不可不知此數則物理論曰古之聖醫知天地神祗之妙性命吉凶之數處虛實之分定順逆之節貫微通幽不失細少然而雖高必以下為基豈獵等可造學者果有是志請從此卑邇始風土論第十五蓋聞一病而治各不同者地勢使然也五方之氣不齊而粗工雜合以治豈知大體者哉壽蒼生者不分畛域有事四方男子之常奈之何不亟為究也東方之域今之南直浙江山東福建是也於象為木於時為春天地之所始生也稟東方之風氣者多風魚鹽之地濱海傍水其民食魚而嗜咸其利豐故安其處其味美故恣其食魚者假濕熱而生令人熱中鹽入腎腎屬水水制火火屬心心主血鹽勝血令人發熱而陰傷其民黑色而疏理其病皆為癰瘍宜培土之基以御邪風其治宜砭石故砭石者亦從東方來西方之域今之陝西四川是也於象為金於時為秋天地之所收引也稟西方之風氣者多燥地方高阜陵居而多風金氣肅殺水土剛強其民不衣布帛衣褐薦食酥酪形體脂肥膚腠封閉血氣充實故外邪不能傷其病也皆因七情飲食男女之過其治宜毒藥峻攻可使遄已故毒藥者亦從西方來北方之域今之北直山西是也於象為水於時為冬天地之所閉藏也稟北方之風氣者多寒地高陵居風寒冰冽其民樂野處而乳食其病多寒中宜益火之源以消陰翳其治宜灸焫故灸焫者亦從北方來南方之域今之江西兩廣云貴是也於象為火於是為夏天地之所長養也稟南方之風氣者多熱其地卑下水土孱弱霧露所聚嵐瘴乘人其民嗜酸食不芬香陽盛之處故多赤色味酸主斂故皆致理熱氣內傷濕氣外薄加之嗜酸肝經受損故病攣痹宜壯水之主以制陽光其治宜微針故九針者亦從南方來中央之域今之河南湖廣是也於象為土於時為長夏天地之所以生萬物也稟中央之風氣者多濕其地平以濕四方輻輳萬物交歸故民食雜而不勞陰陽應象大論篇曰地之濕氣感則害皮肉筋脈故其病多痿弱氣逆及寒熱也當扶木之主以制土邪其治宜導引按蹺故導引按蹺者亦從中央出也丹溪曰西北之地多風寒故患外感者居多東南之地本卑濕故患濕熱者恆眾蓋北方高阜天不足西北而多風南方卑下地不滿東南而多濕方土之候各有不齊所生之病多隨土著西方氣厚飲食倍常居室儉素元氣不戕一有疾病輒用疏利其病如脫若夫東南體質柔脆腠理不密飲食色欲與西北迥別概用疏利不幾於操刃殺人耶雖然西北固厚安能人人皆實東南固薄安得人人皆虛必觀其人因症而藥斯無一偏之弊耳倘盈虛消息之故茫然而欲強勉圖功不亦遠乎虛勞論第十六蓋聞人之生也負陰而抱陽兩者和則四體強兩者虧則萬病作三因之症多端而根本之傷獨重經曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱此言氣虛之癆也又曰陰虛生內熱此言血虛之癆也內經之言虛癆惟是氣血兩端至巢氏始分五臟之癆七情之傷又分氣血筋骨肌精之六極甚而分臟腑肌骨為二十三蒸本事方語傳屍鬼疰至於九十九種鑿空生蔓使學者惑於多岐靡所適從伊誰之咎乎盍以內經為式第於脾腎分主氣血約而實該確而可守也夫人之虛不屬於氣即屬於血五臟六腑莫能外焉而獨拳脾腎者水為天一之元土為萬物之母二臟安和諸經各治百疾不生蓋脾具土德脾安則土為金母金實水源且土不侮水水安其位故脾安則腎愈安也腎兼水火腎安則水不挾肝上泛而凌土濕火能益土蒸腐而化精微故腎安則脾愈安也救腎者必本於陰血血主濡之陰本下降虛則上逆當斂而抑六味丸是也救脾者必本於陽氣主煦之陽本上升虛則下陷當升而舉補中益氣湯是也近世治癆專以四物二冬黃柏知母不知皆行秋冬之令非所以生萬物者也且血藥常滯必妨痰而減食血藥常潤必滑腸而泄瀉況黃柏苦寒尤能減食知母甘寒尤能滑腸二味俱瀉腎經實火丹溪有言曰實火可瀉虛火可補癆症之火虛乎實乎瀉之可乎即知其宜補而用藥頗多疑難如補脾保肺法當兼行然脾喜溫燥肺喜清潤保肺則妨脾保脾則妨肺須知燥熱而甚能食而不瀉者潤肺當怠而補脾亦不可缺也若虛羸而甚食少腸滑雖多嗽喘但當補脾而清潤宜戒矣脾有生肺之能肺無扶脾之力故補脾尤要於保肺也嘗見癆症多死於泄瀉泄瀉多由於寒涼此至著至確者也又如補腎扶脾法當兼行然甘寒補腎又恐不利於脾辛溫快脾又恐愈傷其水兩者並衡較重脾土以土能生金金為水母故也若腎大虛者又不可拘但補腎之中不脫扶脾壯脾之中不忘養腎可耳又如補氣補血均不可少然氣藥有生血之功血藥無益氣之理也故古之名論或曰獨陰不長或曰血脫補氣或曰甘溫能除大熱或曰陽生陰長聖賢之意皆以春夏之令可以發育秋冬之氣不能生長且虛癆證受補者可治不受補者不治故朱丹溪專主滋陰其治癆方案用人參者十有六七葛可久神於治癆其垂著十方多用人參自好古肺熱傷肺節齋服參必死之說印定後人眼目遂至畏人參如畏砒鴆甘用苦寒直至上嘔下泄猶不悔悟良可憾矣幸汪石山李瀕湖深指其誤詳為之辨而宿習沿流極重難返貽禍至今未有抵止余所以不禁婆心為之嘔肝膽而揭日月也須知肺經自有熱者肺脈必洪數按之而實未合用參若火來乘金者肺脈雖洪數按之必軟金氣大傷非參不能保之前哲洞窺元本預知流弊而為之說曰土旺而金生勿拘拘於保肺水壯而火熄毋汲汲於清涼奉此兩言開萬世之聾瞶濟無窮之夭枉矣倘受病日深中氣已壞藥餌不可施功針灸無所用巧亟求胎息之工鼓巽運坤通任會督發身中之造化噓既敗之陽和定操奪命之奇永致康和之福尊生者其可以草木無功遂委之命也哉邪祟論第十七按內經十八卷未嘗有片語及邪祟其言邪氣盛則實者指六淫之邪耳非世俗所謂神鬼妖怪也丹溪云虛病痰病有似邪祟蓋血氣者身之祟也神既衰乏邪因而入理或有之若夫血氣兩虧痰客中焦妨礙升降不得運用以致十二官各失其職視聽言動皆為虛妄以邪治之其人必死或心靈虛損驚惕如疾如中鬼邪或陽明內實登高而歌棄衣而走殺人不避水火罵詈不避親疏此皆神明搖亂之症古雖有祝由一科龍樹咒法之治皆移精變氣之術但可解疑釋惑使心神歸正耳何邪祟之可祛哉雖然山谷幽陰時有猿精狐怪莊房日久或多怨鬼愁魂魘勝已行妖禍及於生命形家未善魑魅因而肆淫頑如花木取精多而為孽微如雞犬歷歲久而興妖然有犯有不犯者抑又何也一則曰因虛而入正氣虛則陽明之氣不足以勝其幽潛一則曰因心而客邪心起則淫亂之神適足以招其類聚畏懼深則疑似之念大足以惑其心神或面黃肌瘦或奇夢驚心或昏倦嗜臥或異症蜂起或語言錯亂或嗜好失常或飲食久絕而神色未變或危篤垂斃而忽爾康強或妄言禍福而明徵不謬或叫號震擊而猛悍非常或兩脈而如出兩人或一脈而浮沉不等乍疏乍數乍大乍小或促或結或滑或實凡遇此症但以補虛安神為主祛邪逐祟為佐有痰者吐之消之有積者下之攻之用禁咒灸法以治其外用正言激論以醒其心未有不瘳者也一旦張皇純用攻擊不求其原妖乃愈甚矣如八毒赤丸蘇合香丸之屬僅可施於一時久而弗已藥且為祟寧能去祟耶昔有灸鬼穴法以絹帛縛病人兩手大拇指取艾炷置於其中兩介甲及兩指角肉四處著火一處不著則不驗七壯神效此屢試不誣者也果患邪祟者盍先從此治傷寒論第十八夫六氣皆能害人而傷寒為甚殺厲之氣其來甚毒況六經之變不齊陰陽之間疑似表裡與半表半裡審視須詳兩感與合病並病辨別毋混投劑稍有差訛殺人速於用刃故自古有難明之嘆也冬月嚴寒萬類潛藏君子固密則不傷於寒若腎虛之人太陽不固偏易感寒或卒受非常之冷寒毒乘於肌膚在冬三月發者名正傷寒伏而不發至春始發名曰溫病春猶不發至夏始發名曰熱病總是冬令之寒隨時令而更名也獨不言至秋為涼病者何也寒水之氣與火為仇遇仇不發已為火氣所勝而長夏濕土又制水邪況至金令金得寒而愈堅故至秋則無傷寒也仲景於傷寒獨精而遺言久遠廢墜頗多王叔和收集散亡為之詮次惜以己意溷經未免穿鑿成無己順文註釋並無校正致將冬令傷寒之方通療春夏溫熱之病遺禍至今未有能改溫熱之變必別有方今皆失而無徵宋學士所以嘆傷寒無全書也陶節庵以麻黃桂枝等劑難於輕投轍以平和之劑代之大違仲景之旨夫傷寒病緒多端萬難輕忽得其要領易於拾芥脈證與理而已求之多岐則支離繁碎如涉海問津矣脈證者表裡陰陽虛實寒熱也理者知其常通其變也多岐者蔓演之方書也余故約六法以盡之曰汗吐下溫清補汗者治在表也而汗法有三一曰溫散天遇寒勝之時人逢陰陽之臟夫陽氣不充則表不能解雖身有大熱必用辛溫一曰涼解炎熱熾盛表裡枯涸陰氣不營亦不能汗宜用辛涼一曰平解病在陰陽之間既不可溫又不可涼但宜平用期於解表而已吐者治在上也吐中有發散之意可去胸中之實經曰在上者因而越之是也下者攻其里也而下法有五痞滿在氣燥實在血四證俱具者攻之宜峻也但滿燥實者攻之稍緩但見痞實者攻之更緩或行蓄血或逐水停輕重緩急隨證變通也溫者溫其中也臟受寒邪不溫則死夫氣為陽氣虛則寒故溫亦是補又名救里者以陽虛大危亟當救援也有直中陰經之寒正虛邪湊多在冬月大寒之勝不分經絡而一於虛寒且無表證之兼有傳經至三陰而寒者其寒也久而後變且有表證之兼雖與直中相類而所傷所治則有別矣清者清其熱也有熱無結不合下症若不清之邪氣盤踞熱何由散乎或下後有未盡之邪亦宜清也補者救其虛也古人言之頗詳今人畏而不敢使傷寒犯虛者坐而待斃大可憾也至若屢行發散而汗不能透陰氣不能達也人知汗屬於陽升陽可以解表不知汗生於陰養陰可以發汗也又如內熱不解屢清而火不退陰不足也人知寒涼可以去熱不知壯水可以制火也又如正虛邪旺久而不痊但與補正其邪自除此必見虛衰之陰脈者也傷寒論曰陰症得陽脈者生陽症得陰脈者死人皆奉其言未知繹其義夫正氣實者多見陽脈正氣虛者多見陰脈證之陽者假實也脈之陰者真虛也陳氏曰凡察陰症不論熱與不熱惟憑脈用藥百無一失不論脈之浮沉大小但重按無力便是伏陰然則沉小者人知為陰脈不知浮大者亦有陰脈也是知傷寒雖有萬變虛實二字可以提綱正勝則愈邪勝則死正氣實者雖感大邪其病亦輕正氣虛者雖感微邪其病亦重氣實而病者攻之即愈雖不服藥經盡即安何足慮也所可慮者惟挾虛耳奈何庸淺之輩不分虛實但遇傷寒動手便攻實症逢之自可應手取效若虛症而攻之無不死者概曰傷寒無補法誤矣獨不觀仲景立三百九十九法而治虛寒者一百有奇垂一百一十三方而用人參桂附者八十有奇東垣丹溪節庵有補中益氣回陽返本溫經益元等陽未嘗不補也獨不可謬投於不虛之症耳而概謂傷寒無補法豈仲景之遺言不足信乎傷寒傳變先自三陽後入三陰此常序也而變例不可不知東垣曰太陽經病若渴者自入於本也名曰傳本太陽傳陽明者名循經傳太陽傳少陽者名越經傳太陽傳少陰者名表里傳太陽傳太陰者名誤下傳太陽傳厥陰名巡經得度傳陶節庵曰或自太陽始日傳一經六日至厥陰而愈者或不罷再傳者或間經傳者或傳二三經而止者或始終只在一經者或越經而傳者或初入太陽不發熱便入少陰而成陰症者或直中陰經者或兩經三經齊病不傳而為合病者有一經先病未盡又過一經之傳而為並病者有太陽陽明合病者有太陽少陽合病者有少陽陽明合病者有三陽合病者若三陽與三陰合病即是兩感劉草窗謂傷寒傳足不傳手非也人之氣血運行周身豈邪遇手經而有不入者哉寒之傷人必先皮毛皮毛者肺之合外則寒慄鼻塞內則喘嗽短氣非傳肺乎舌苔昏亂非傳心與包絡乎泄瀉秘結非傳大腸乎癃閉非小腸乎痞滿上下不通非傳三焦乎且內經云五臟六腑皆病豈手經不在內乎然經言傳變不及手經者何也足之六經可盡周身之脈絡手經已在其內不必復言矣未滿三曰其邪在表汗之而愈滿三日者其邪在裡下之而愈此特道其常耳須知脈大浮數在表可汗脈實沉數在裡可下日數雖多有表症者必汗日數雖少有里症者必下第當以表裡為辨不可以日數拘也以上數則詞雖簡約傷寒之要訣已無遺漏倘能本此而精求之可以升仲景之堂矣廣嗣論第十九夫嗣續者上接亙古之傳下行無疆之脈顧不甚重哉夫祖宗及今不知幾千世一旦至我而斬孝子慈孫所以籲天禱地而莫可誰何也不知天地之大德曰生生之氣固流行遍滿何獨至我而獨靳乎此其故可得而想矣了凡先生曰愛者生之本忍則自絕其本只此二句充義之盡便是聖賢從來無絕嗣之聖賢人亦奈何不強為善也強為善則生機充盎麟趾鍾祥天豈能限數豈能拘星相豈能阻風水豈能囿夫然後調神以養氣養氣以生精勤事玄功綿綿罔間靜心絕欲嚴戒七情功到藥生勃然䘒作譬如天地之閉藏一遇陽春靡不發育故素問曰道者能卻老而全形年皆百數能有子也雖然藥餌之功亦不可少如女子稟畀羸孱性情暴戾尺脈微細血海敗傷者固無論已即性和而脈旺者猶必平其陰陽使月事無愆期之患而子宮無阻塞之虞一意固其天真壯其胃氣勿泥婦人多氣而以香附之類損其血縮砂之類殘其氣倘能知書明理亦教之以養氣存神則其奏功捷於桴鼓如此者謂之有其地矣男子精衰多由於七情不能致慎五臟不能相生故素問曰腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉靈樞經曰五臟主藏精藏精者不可傷由是則五臟各有精隨用而灌注於腎腎不過為都會關司之所非腎之一臟獨有精也奈何舉世不察不能別臟腑之有餘不足而平之但以補腎為功不知熱則害水寒則伐火即使腎氣得補而四臟未平終無相生之理曷成孕育之功若曰某有秘授奇方發無不中遂欲執一以治萬豈理也耶必察其症狀通變用之則病可必除精可自足如此者謂之有其種矣天地生物必有氤氳之候萬物化生豈無樂育之時世之言三十時辰兩日半二十八九君須筭特言其概耳非的論也居恆必兩家寡欲至經行一度必有一日絪縕之候於一時辰時間氣蒸而熱神昏而悶有動而莫遏之狀此的候也逆而取之則成丹順而施之則成胎其曰三日月出庚又曰溫溫鉛鼎光透簾幃皆言其象也如此者謂之知其時候矣褚氏謂陰血先至陽精後沖而成男陽精先入陰血後參而成女然世有精先至而生男精後至而生女者獨何歟東垣曰經斷一二日血海始淨感者成男四五日血脈已生感者生女六日以後雖感無胎然世有經始斷交合生女經久斷交合生男亦有四五日以前交合無孕八九日以後交合有孕者獨何歟俞氏謂微陽不能射弱陰不能挕然世有羸夫弱婦屢屢受胎血氣強盛者反艱於育獨何與丹溪專以婦人經水為主然富貴之家侍妾眾多寧無月事當期者乎有已經首夫頻頻生育而娶之以圖嗣者竟亦無胎更與它人轉盻生子獨何與故欲生子者只以百脈齊到為善百脈齊到者暢遂之極而無一毫勉強是也至男女之分只以精血各由百脈之齊到者以別勝負然而有意種子競競業業必難結胎偶意為之不識不知成胎甚易如此者謂之結其子矣自此而半產可虞甚至一月而墮胎人皆莫覺一次墮他次亦墮只以為經行耳寧知其胎已墮哉故播種之後勿復交接以擾其子宮勿令勞役勿令食冷勿令疾行勿令跌僕勿令洗浴勿令過醉勿令之怒勿令之驚多服健胃和中平肝養氣之藥隨時調養可無遺墮之虞既固其胎宜遵胎教巢氏曰初受胎時未有定儀因感而變欲子端正莊嚴宜口談正言身行正事欲生男者宜佩弦執弓矢欲生女者宜佩韋施環珮欲子美好宜佩白玉欲子賢能宜看詩書古人轉女為男之法或以絳紗囊佩雄黃於左者或潛以夫發及手足甲置蓆下者或潛以斧置床下系刃向下者或潛以雄雞尾尖長毛三莖置蓆下者此皆外象內感有妊者宜亟聞也由是觀之則世之無嗣者靡非自戕自賊以絕其生之本豈其自然之性哉愚嘗謂造物有不毛之地人應之故婦人有無子宮者造物無不雨露之天人應之故男子皆能施化往往自失其道致斬萬世之傳耳嗟乎人孰無心讀此章者可以猛然醒翻然悔矣婦科論第二十病之情一也而療婦人為難所謂寧醫十男子莫醫一婦人此何說也凡病皆始於七情而後六氣之邪乘虛來犯婦人女子之性陰濁勝而陽明微慈戀愛憎嫉妒憂恚性情鬱滯染著堅牢加之不出閫戶無可遣解不習詩書無可寬慰義命之理茫然怨尤之心橫起或有懷未能暢遂或有病不可告人含羞諱疾偏信師巫鄙吝恣睢反疏藥餌所以受病之處蒂固根深卒難全愈況乎產蓐帶下三十六病損氣傷血挾症多端故曰女人嗜欲過於丈夫感病倍於男子誠非虛語寇宗奭曰豪貴之家居燠室之中處帷幔之內既不能行望色之神聽聲之聖又不能盡切脈之巧黃帝曰凡治病察其形氣色澤形氣相得謂之可治色澤已浮謂之易已形氣相失謂之難治色夭不澤謂之難已又曰診病之道觀人勇怯骨肉皮膚能知其虛實以為診法若婦人脈病不相應既不得見其形惟據脈供藥其可得乎醫者慎重不免盡理質問愚者見所問繁多以為醫學不精往往得藥不信昔者扁鵲見齊侯之色尚不能取信況其未之見者耶是四診之術不得其一矣自古高人哲士為之別立一科而重嘆其難也至於師尼寡婦及違時未笄之女郁情尤甚奏效尤難褚澄所以有療各不同之說然不達其情而專責諸草木是以江河填漏卮雖多亦以奚為也夫久郁生火火賊元氣元氣受賊外邪並侮現症即有百端惟郁傷元氣可一言以蔽之也曰鬱則芳香達氣似不可少曰傷元氣則養衛和營又安可緩哉前賢以歸脾湯為補虛散郁之聖藥為其養心則神和疏氣則鬱解非越鞠丸可方擬者故表而出之
