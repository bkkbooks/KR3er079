body:
  text: 卷之三藥性論第二十一神農三品數應重卦增衍至今馬渤牛溲亦無遺用欲窮其類雖一千八百九十二種掛漏猶多要皆聖賢好生之念博闡以壽斯民然質非甚敏藥繁則惑能不悵多岐之莫適乎因考潔古老人珍珠囊止論百品丹溪僅以隨身七十二味所在活人與其多而饋孰若少而察也乃選四大家恆用最切要者一百二十種附録二十種新補二十種悉以時珍綱目為主剪繁去復獨存精要採集名論竊附管窺比之舊本十更四五蓋偕天下於燎原而免妄投之失耳草部人參味甘性微溫無毒入肺脾二經茯苓為使惡滷咸反藜蘆畏五靈脂白中微黃大而肥實者佳去蘆用補氣安神除邪益智消食開胃止渴除煩療腸胃冷止心腹痛善理勞傷最清虛火按人參味甘合五行之正性溫得四氣之和虛人服之譬如陽春一至萬物發生昔賢嘉其功魁群草良非虛語虛勞賴之如飢渴之飲食惜乎王節齊泥好古肺熱傷肺之說妄謂參能助火陰慮忌服自斯言一出印定後人眼目凡遇勞症概不敢用病家亦以此說橫於胸中甘受苦寒至死不悟豈非一言而傷天地之和哉潔古謂其瀉心肺脾胃中火邪東垣謂其血脫補氣陽生陰長之理丹溪謂其虛火可補參耆之屬且言陰虛潮熱喘嗽吐血四物加人參或用瓊玉膏甚則獨參湯主之古今治勞莫妙於葛可久用參之劑十有六七由是則古之神良未嘗不以人參治陰傷而世醫為節齊所誤牢不可破殊不知虛勞吐血古人屢言其受補者可治不受補者不治故不服參者不能愈服參而不受補者必不能愈敢陳臆見俟正於後之君子若血症驟起肺脈獨實脹症暴成九候堅強痧疹初發斑點未彰傷寒始作熱邪昌熾惟茲數者不可輕投也沙參味甘苦性微寒無毒入肺經惡防己反藜蘆白而實者佳去蘆微焙用理胸中結熱結血治虛勞肺痿肺癰定心內驚厥退皮間邪熱按沙參氣輕力薄非肩弘任大之品也人參補陽而生陰沙參補陰而制陽一行春氣一行秋氣不相侔也玄參味苦鹹性微寒無毒入腎經惡黃耆乾薑大棗山茱萸反藜蘆忌銅器蒸過曬乾黑潤者佳補腎明目滌熱除驚理傷寒狂邪斑毒療虛勞燥渴骨蒸外科治瘰癧癰疽女方主産乳余疾按玄參色黑味鹹本為腎經之劑古人多用以治上焦火症者正為水不勝火亢而僭上宜壯水之主以制陽光滋陰劑中須用蒸曬差減寒性然亦不可久用也丹參味苦微寒無毒入心經畏鹹水反藜蘆潤而咸者佳微焙用安神散結益氣養陰去瘀血而生新血安生胎而落死胎理帶下崩中療胎前産後新補按丹參色合南離獨人心家專主血症古人稱丹參一味兼四物之功嘉其補陰也胃氣虛寒者斟酌投之黃耆味甘微溫無毒入肺脾二經茯苓為使惡龜甲白鮮皮性軟嫩色緑而潤者佳蜜炙用補肺氣而實皮毛斂汗托瘡解渴定喘益胃氣而去膚熱止瀉生肌補虛治勞理大瘋癩疾治帶下崩淋按黃耆為補表要藥肺主皮毛脾主肌肉故入此二經黃耆得防風其功愈大為其助達表分表有邪氣方實者勿用甘草味甘性平無毒入脾經白朮為使惡遠志反大戟芫花甘遂海藻忌豬肉赤皮堅實者佳酒炙用補脾和中潤肺治痿止瀉退熱堅筋長肌除咽痛定咳逆解一切毒和一切藥生用瀉火熱熟用去裡寒梢止莖中痛節主腫毒瘡按甘草外赤內黃備坤離之色味甘氣平資戊己之功甘味居中而能兼乎五行可上可下可內可外有和有緩有補有泄理中湯用之恐熱劑僭上皮也承氣湯用之恐峻劑速下也故曰熱藥用之緩其熱寒熱有之緩其寒甘能滿中故中滿者勿用甘能緩急故筋急者宜之頭入吐藥有功梢達腎家清火嘔病酒病脹病俱禁用也白朮味甘苦性溫無毒入脾胃二經防風為使忌桃李雀肉青魚菘菜産於潛者佳米泔浸半日去皮切片曝乾蜜水拌炒至褐色用健脾補胃消穀進食化胃家痰水理心下急滿利腰臍間血結祛周身濕痹君枳實而消痞佐黃芩以安胎愚按白朮甘溫得土之沖氣補脾胃之第一品也術贊云味重金漿芳逾玉液百邪外御六府內充察草術之勝速益於己者並不及術之多功也俗醫往往嫌其滯一坐未讀本草一坐炮製未精耳但臍間有動氣築築者禁之蒼朮味苦甘辛性溫無毒入脾胃二經畏惡悉同白朮産茅山梗細皮黑其須蓊茂內有紅點者佳米泔浸一日土蒸半日刮去皮曬乾切片米糠拌炒糠枯為度發汗散邪燥脾逐水消痰下氣益胃和中除山嵐瘴氣闢鬼邪瘟疫按蒼朮為濕家痰家要劑辛溫辟邪得天地之正氣者歟但陰虛便燥渴而火亢者忌之當歸味甘辛性溫無毒入心脾胃三焦經惡䕡茹濕面畏菖蒲海藻生薑白而肥大堅實者佳酒洗去蘆用去瘀生新舒筋潤腸溫中止心腹之痛養營療肢節之疼治痢排膿生肌止痛調經祛風理崩帶淋瀝按當歸為血分要藥辛溫而散血中氣藥也頭止血而上行梢破血而下流身養血而中守全活血而不走氣血昏亂服之而定能領諸血各歸其所當歸之經故名當歸若入吐衄崩下藥中須醋炒過少少用之多能動血耳泄瀉家禁與川芎味辛性溫無毒入肝經白芷為使畏黃連形實色白潤者佳醇酒微煨用主頭痛面風淚出多涕寒痹筋攣去瘀生新調經種子長肉排膿小者名撫芎能止痢開鬱按川芎亦血中氣藥痘疹家不起發者往往用之然亦不敢多用為其上升也寇宗奭謂久服川芎令人暴亡以其辛喜歸肺肺氣偏勝金來剋木肝必受侮久則偏絶若君臣佐使配合得宜寧致此害哉虛火上炎嘔吐咳逆者禁與白芍藥味酸苦微寒有小毒入肝經雷丸為使惡石斛芒硝畏鱉甲小薊反藜蘆大而色白者佳醇酒浸半日煨透切片微炒制肝而主血熱目疾脅下作疼安脾而主中滿腹痛瀉痢不和斂肺而主脹逆喘咳腠理不固赤者行惡血利小腸按芍藥收斂下降行秋金之令猶未若芩連之寒而寇氏云減芍藥以避中寒丹溪云新産後勿用芍藥恐酸寒伐生生之氣蓋以藥之寒者行殺伐之氣違生長之機雖微寒如芍藥古人猶諄諄告戒況大苦大寒之藥其可肆用而莫之忌耶地黃味甘性寒無毒入心肝脾腎四經當歸為使惡貝母畏蕪荑蔥蒜蘿蔔忌銅鐵器産懷慶每隻重五六錢者佳砂鍋柳甑襯以荷葉將地黃酒潤用縮砂末拌蒸蓋覆極密蒸半日取起曝乾如前又蒸又曬九次為度令中心透黑即成熟地矣生者涼血補陰去瘀生新養筋骨益氣力理胎産主勞傷通二便消宿食心病而掌中熱痛脾病而痿蹶貪眠熟者滋腎水封填骨髓利血脈補益真陰久病脛股痠痛新産後臍腹作疼愚按地黃為補腎要藥養陰上品六味丸以之為首天一所生之本也四物以之為君乙癸同源之義也九蒸九曬方熟每見世人一煮透便以為熟地誤矣稟北純陰之性而生非太陽與烈火交煉則不熟也所以固本膏雖經日煎熬必生熟各半用之即此可以知地黃非一煮便熟者矣以姜酒拌炒生者不妨胃熟者不滯膈若痰凝氣鬱食少瀉多者不可用也何首烏味苦澀微溫無毒入肝腎二經茯苓為使忌諸血無鱗魚蘿蔔蔥蒜鐵器選大者赤白合用泔浸竹刀切如檳榔大黑豆拌蒸二時曬一日如前又蒸九次為度補真陰益精髓理虛勞能多嗣強筋壯骨黑髮悅顏消諸種癰瘡療陰傷久瘧治崩中帶下調産後胎前按何首烏補陰而不滯不寒強陽而不燥不熱稟中和之性而得天地之純氣者也昔有老人何姓者見藤夜交掘而服之鬚髮盡黑故名首烏後陽事大舉屢生男子改名能嗣則其養陰益腎可想見矣山藥味甘性平無毒入肺脾腎三經喜麥門冬惡甘遂色白而膩者佳飯上蒸透切片炒黃用補中益氣長肌強陰安神退熱止瀉固精按山藥得土之沖氣稟春之和氣比之金玉君子無往不宜但性緩非多用不效與面同食不能益人萎蕤味甘性平無毒入肺脾腎肝四經畏滷咸色白而肥大者佳潤肺主嗽補脾去熱養肝而理眥傷淚出益腎而除腰痛脛寒新補按萎蕤滋益陰精與地黃同功增長陽氣與人參同力潤而不滑和而不偏譬諸盛德之人無處不宜故神農收而為上品自豫拈出近來用者稍多矣貝母味苦辛性微寒無毒入心肺二經厚朴白薇為使畏秦艽莽草礬石反烏頭選白而大者去心糯米拌炒米熟為度消痰潤肺滌熱清心療喘嗽紅痰除胸中鬱結下胞衣傅人面瘡散項下癭癧按貝母本功惟入肺治燥痰久服非脾家所喜汪機云俗以半夏燥而有毒代以貝母不知貝母治肺金燥痰半夏治脾土濕痰何可代也脾為濕土故喜燥肺為燥金故喜潤若痰屬脾經誤投貝母可翹首待斃又詩云言採其莔即貝母也作詩者本以不得志而言今用以治愁郁者其說蓋本於此脾虛食少者禁用知母味甘苦性寒無毒入肺腎二經忌鐵器肥白而潤者佳去毛銅刀切片鹽酒炒透清肺經熱消痰捐咳瀉腎家火利水潤腸除傷寒煩熱理肢體浮腫按知母瀉腎經有餘之火惟狂陽亢甚者宜之若腎虛而瀉之則愈虛而虛火愈甚況寒能傷胃潤能滑腸其害人也隱而深譬諸小人陰柔巽順似乎有德至國祚己移人猶莫覺其非者近世治勞尊為上品往往致上嘔下泄遂至不救良可憾也瀉相火是其本功至夫清金止嗽蓋相火不炎自當馴致也腸滑食少者避之當如鴆毒桔梗味苦辛性平有小毒入肺經畏白及龍膽草忌豬肉白而堅實者佳去蘆米泔浸切片微焙清肺熱除癰痿通鼻塞理咽喉清頭目消痰下氣散風排膿定痢疾腹痛止胸脅煩疼按桔梗為舟楫之劑引諸藥上至高之分以成功既以上行又能下氣者為其入肺肺實主氣肺金得令則濁氣自下行耳古稱開提氣血鬱症中宜用亦同此義丹溪云乾咳乃痰火鬱在肺中痢疾腹痛乃肺金之氣鬱在大腸之間均宜桔梗開之觀其開字及止痛則其下氣洵有神功也若病不屬肺者用之無益半夏味苦辛性溫有毒入肺脾胃三經柴胡為使惡皂莢畏雄黃生薑乾薑秦皮龜甲反烏頭忌羊血海藻餳糖白而大者佳水浸七日每日換水去帽每斤用生薑五兩明礬二兩同煮二時水乾為度消痰燥濕開胃健脾除咳逆嘔吐定頭眩昏迷傷寒心下滿堅痰厥頭疼消癰墮胎按汪機曰脾胃濕熱涎化為痰此非半夏曷可治乎若以貝母代之翹首待斃李時珍曰脾無濕不生痰故脾為生痰之源肺為貯痰之器半夏治痰為其體滑辛溫也涎滑能潤辛溫能散亦能潤故行濕而通大便利竅而泄小便所謂辛走氣能化液辛以潤之是已丹溪謂半夏能使大便潤而小便長成無己謂半夏行水氣而潤腎燥局方半硫丸治老人虛閉皆取其滑潤也俗以半夏為燥不知利水去濕故土燥非性燥也但恐非濕熱之邪而用之是重竭其津液誠非所宜古人半夏有三禁謂血家渴家汗家也南星味苦辛性溫有大毒入肝脾二經蜀漆為使惡莽草畏附子乾薑生薑滾湯泡過研細入牛膽中懸風處經年用換膽而再經年者尤佳主中風麻痹痰氣堅積口噤身強破血利水墮胎按南星氣溫而泄性緊而毒故能攻堅去濕然半夏辛而能守南星辛而不能守其性烈於半夏也然南星專主風疾半夏專主濕痰功雖同而用有別也陰虛燥痰在所禁忌天門冬味苦甘性寒無毒入肺腎二經地黃貝母為使畏曾青忌鯉魚肥大如地黃者佳去心用潤燥保肺定喘定嗽消血化痰治肺痿肺癰殺三蟲通大便按天門冬清金降火益水之源故能下通腎氣而滋補腎主五液燥則凝而為痰得潤劑則肺不苦燥而痰自化故濕火之痰半夏主之燥火之痰天門冬主之二者易治鮮不危困若脾胃虛寒單服久服必病腸滑而成痼疾麥門冬味甘微寒無毒入心肺二經地黃車前為使惡款冬苦瓠畏苦參青蘘木耳鍾乳忌鯽魚肥大者佳去心用退肺中伏火故止嗽止渴益精美顏清心氣驚煩故寧血養營安魂定魄按麥門冬稟秋令之微寒是以清肺多功夫心火焦煩正如盛暑秋風一至炎蒸若失矣大約與天門冬功用相仿但甘味稍多寒性差減較勝一籌然專泄而不專收火盛氣壯者相宜氣弱胃寒者何可餌也五味子肉味甘酸核中苦辛而咸性溫無毒入肺腎二經蓯蓉為使惡萎蕤勝烏頭北産肥而肉厚者佳嗽藥生用補藥炒用必打碎核方五味備也滋腎經不足之水強陰澀精除熱解渴收肺氣耗散之金療咳定喘斂汗固腸按潔古云夏服五味使人精神頓加兩足筋力湧出東垣云收瞳神散大乃火熱必用之藥有外邪者不可驟用丹溪云收肺補腎乃火嗽必用之藥寇氏謂其食之多虛熱者蓋收補之驟也黃昏嗽乃火浮於肺宜五味子斂而降之若風邪在表痧疹初形一切停飲皆當禁絶大黃味苦性大寒有毒入脾胃肝大腸四經黃芩為使忌冷水惡乾漆錦紋滋潤者佳主瘀血癥瘕留飲宿食結熱停痰水腫痢疾蕩滌腸胃推陳致新按大黃乃血分之藥若在氣分是謂誅伐無過矣仲景瀉心湯治心氣不足吐衄血者乃心氣不足而包絡肝脾與胃邪火有餘也雖曰瀉心實瀉四經血中伏火也又心下痞滿按之軟者用大黃黃連瀉心湯亦瀉脾胃濕熱非瀉心也病發於陰而下之則痞滿乃寒傷營血邪氣乘虛結於上焦胃之上脘在於心故曰瀉心實瀉脾也病發於陽而下之則結胸乃熱邪陷入血分亦在上脘大陷胸湯丸皆用大黃亦瀉脾胃血分之邪也若結胸在氣分只用小陷胸湯痞滿在氣分只用半夏瀉心湯成氏注釋未能分別此義大黃誠有撥亂反正之功然峻利猛烈苟非血分結熱六脈沉實者其可輕試哉黃連味苦性寒無毒入心經黃芩龍骨連翹為使惡菊花玄參芫花白鮮皮白殭蠶畏款冬花牛膝解巴豆附子毒忌豬肉大如指色鮮黃而堅重者佳上焦酒炒中焦薑汁炒下焦吳茱萸拌炒瀉心除痞滿明目理瘡瘍痢疾腹痛心痛驚煩殺蟲安蛔利水厚腸天行熱病嬰兒疳積按韓𢘅曰黃連與肉桂同行能使心腎交於頃刻時珍曰古人治痢用黃連木香水火散用黃連乾薑左金丸用黃連吳茱萸薑黃散用黃連生薑口瘡方用黃連細辛皆是一冷一熱寒因熱用熱因寒用最得制方之妙所以有成功而無偏勝也內經曰五味入胃各歸所喜攻久而增氣物化之常氣增而久夭之由也王冰注云增味益氣如久服黃連反從火化也蓋大苦大寒行隆冬肅殺之令譬如皋陶明刑執法是其職也稷契夔龍之事非其任矣近世不明此義見古人用以治痞滿治疳積每遇腹中不寬快者輒用枳實黃連以為寬中消食之劑獨不聞脾胃之氣虛則白朮陳皮補之實則枳實黃連瀉之若不分虛實一概用之殺人必矣故脾虛血少以致驚煩痘瘡氣虛作瀉行漿後泄瀉腎虛五更瀉陰虛煩熱氣虛蒸熱脾虛發瀉法咸禁之龍膽草味苦澀性大寒無毒入肝膽二經貫衆小豆為使惡地黃防葵酒浸炒主肝膽熱邪下焦濕火殺蟲明目小兒客忤疳氣癰腫瘡瘍按龍膽草大苦大寒譬之嚴冬黯淡慘肅冰凌盈谷萬卉凋殘人身之中詎可令此常行乎先哲謂苦寒伐標宜暫不宜久如聖世不廢刑罰所以佐德意之窮苟非氣壯實熱者率爾輕投其敗也必矣黃芩味苦性寒無毒入肺大腸二經山茱萸龍骨為使惡蔥實畏丹砂丹皮藜蘆沙參丹參蒸透曝乾中枯而大者清肺止嗽化痰目赤疔癰堅實而細者瀉大腸火除濕治痢安胎利水按陶隱居云療腹痛利小腸仲景云少陽症腹中痛者去黃芩加芍藥心下悸小便不利者去黃芩加茯苓似與隱居之說不合不知受寒腹痛心下悸小便不利脈不數者禁用黃芩若熱厥腹痛肺熱而小便不利者可不用乎善讀書者先求其理毋泥其文附子味辛甘性熱有毒入脾腎二經畏防風黑豆甘草黃耆人參童便犀角身矮乳稀重一兩五錢者佳滾湯泡去皮臍切作四片童便一碗甘草湯一碗同煮汁盡為度新瓦上烘乾主臟腑沉寒三陰厥逆心腹冷痛積聚癥瘕寒濕痿躄暴瀉脫陽噎膈嘔噦癰疽不斂小兒慢驚痘瘡灰白胃寒蛔動強陰墮胎堅筋骨益氣力為寒濕聖藥按附子稟雄壯之質有斬關之能引補氣藥追散失之元陽引補血藥養不足之真陰引發散藥以驅在表風邪引溫暖藥以除在裡寒濕丹溪曰氣虛熱甚稍加附子以行參耆之功肥人多濕亦用集驗曰腫因積生積去而腫再作若再用利藥小便愈閉醫多束手蓋中焦氣不升降為寒所隔惟服附子小便自通吳綬曰傷寒傳變三陰及中寒夾陰身雖大熱而脈沉者必用附子厥冷腹痛脈沉細唇青囊縮者急用之有起死之功近世往往不敢用直至陰極陽竭而後議用遲矣若陰虛內熱及內真熱而外假寒者不可誤服麻黃味辛甘苦性溫無毒入肺膀胱二經厚朴為使惡辛夷石韋去根節水煮一二沸去沫用主冬三月寒邪頭痛身熱脊強去營中寒邪泄衛中風熱按麻黃輕可去實為發散第一藥惟當冬月在表真有寒邪者宜之或無寒邪或寒邪在裡或傷風有汗等症雖發熱惡寒其不頭痛身疼拘急六脈不浮緊者皆不可用雖可汗之症亦不宜多服汗為心液不可汗而汗與可汗而過汗則心血為之動矣或亡陽或衄血而成大患可不慎哉葛根味甘辛平無毒入胃大腸二經主消渴大熱解肌發表嘔吐頭痛開胃下食解諸毒化酒毒止血痢散鬱火生者能墮胎按葛根種種治效只在陽明一經仲景治太陽陽明合病桂枝加麻黃葛根又葛根芩連解肌湯用以斷太陽入陽明之路非即太陽藥也頭痛乃陽明中風可用葛根蔥白湯若太陽初病未入陽明而頭痛者不可便服以發之是引賊入陽明也東垣曰葛根鼓舞胃氣上行治虛瀉之聖藥夫風藥多燥葛根獨止渴者以其升胃家下陷上輸肺金以生水耳麻黃乃太陽經藥兼入肺經肺主皮毛葛根乃陽明經藥兼入脾經脾主肌肉發散雖同所入迥異紫蘇味辛性溫無毒入肺經忌鯉魚雙面紫者佳開胃下氣溫中達表通大小腸殺魚肉毒梗主下氣安胎子可潤腸定喘按紫蘇本散風之劑俗喜其芳香旦暮資食不知泄真元之氣所謂芳草致豪貴之疾者是也氣虛表虛者禁用葉腸潤肺虛者禁用子防風味辛甘性溫無毒入肺經畏萆薢惡藜蘆白蘞乾薑芫花殺附子毒堅實而潤者佳瀉肺散風赤眼冷淚通利關脈頭眩頭面遊風按防風能御風邪故名乃風藥中潤劑也卑賤之卒隨所引而至為去風去濕之仙藥肺虛者勿服之羌活味甘苦性平無毒入小腸膀胱肝腎四經主風寒濕痹筋骨攣疼頭旋掉眩頭項難伸別有獨活功用相同中國為獨活可理伏風西羌者為羌活可理遊風按羌活治肢節痛因於風者宜之若血氣虛而痛者誤用之反致增劇柴胡味苦甘性微寒無毒入肝膽二經半夏為使惡皂莢畏女菀藜蘆忌見火主傷寒瘧疾寒熱往來嘔吐脅痛口苦耳聾痰實結胸飲食積聚心中煩熱熱入血室目赤頭疼濕痹水脹別有銀州柴胡理肝勞五疳羸熱按柴胡少陽經半表半裡之藥病在太陽者服之太早則引賊入門病在陰經者復用柴胡則重傷其表世俗不明柴胡之用每遇傷寒傳經未能辨別以柴胡湯可藏拙輒混用之殺人不可勝數矣勞症惟在肝經者用銀柴胡若氣虛者不過用些小助參耆非用柴胡退熱也若遇勞症便用柴胡不死安待惟此一味貽禍極多故特表而詳言之前胡味苦甘辛性微寒無毒入肺脾胃大腸四經使與畏惡俱同柴胡主下氣散結消痰定喘消食安胎按前胡主降與柴胡上升者不同長於下氣氣下則火降痰亦降矣若不因外感之痰及陰虛火動者俱當遠之升麻味甘苦性平無毒入肺脾胃大腸四經堅實而緑色者佳解百毒殺精鬼闢瘟瘴蠱毒中惡腹痛頭痛齒痛口瘡斑疹散陽明風邪升胃中清氣按升麻稟極之清氣升於九天故元氣不足者用此於陰中升陽如瀉痢崩淋脫肛遺濁須其升提夫虛人之氣升少降多經曰陰精所奉其人壽陽精所降其人夭東垣摘入補中湯獨窺其微矣凡氣逆嘔吐者切勿輕投白芷味辛性溫無毒入肺胃大腸三經當歸為使惡旋覆花微焙主頭風目淚齒痛眉疼風痹瘙癢止痛排膿蛇傷金瘡按色白味辛行手陽明庚金性溫氣厚行足陽明戊土芳香上達入手太陰辛金故主治不離三經燥能耗血散能損氣有虛火者勿用藁本味苦辛微溫無毒入膀胱經惡䕡茹畏青葙子大陽巔頂作痛女人陰腫疝疼胃風泄瀉按內熱頭痛及春夏溫暑之病不宜進也甘菊花味甘微寒無毒入肺腎二經枸杞桑白皮為使味甘而不苦者佳去蒂清頭面風熱明目止淚胸中熱氣死肌濕痹新補按甘菊花獨稟金精善制風木且氣性輕揚故主用多在上部同枸杞便能助腎矣細辛味辛性溫無毒入心小腸二經惡黃耆山茱萸畏滑石反藜蘆主風寒濕痹頭痛鼻塞下氣破痰頭面遊風百節拘攣齒疼目淚新補按細辛稟升陽之氣辛香開竅單服末至一錢令人悶絶則其燥烈可知血虛頭痛者痛戒之秦艽味苦辛性微溫無毒入大腸胃二經菖蒲為使畏牛乳左紋者佳祛風活絡養血舒筋骨蒸黃疸利小便按秦艽風藥中潤劑散藥中補劑故養血有功中風恆用之者治風先治血血行風自減之意乎天麻味辛性溫無毒入肝經大而透明者佳酒浸煨透主風虛眩暈麻痹不仁語言蹇澀腰膝軟疼殺精魅蠱毒理驚氣風癇按天麻雖不甚燥畢竟風劑助火若血虛無風者不可妄投荊芥味辛性溫無毒入肝經反驢肉河豚蟹黃鱨魚主風熱瘡疹瘰癧結聚瘀血濕瘟清頭目利咽喉按荊芥治風賈相國稱為再生丹許學士謂有神聖功戴院使命為産後要藥蕭存敬呼為一捻金陳無擇隱其名為舉輕古拜散夫豈無故而獲此隆譽哉雖然用者須審察的當今人但遇風症輒用荊防此流氣散之相沿耳不知風在皮裡膜外者荊芥主之非若防風之入人骨肉也薄荷味辛性溫無毒入肺肝二經産蘇州者良忌見火去風熱通關竅清頭目定霍亂消食下氣貓咬蛇傷蜂螫傷寒舌苔和蜜擦之按薄荷辛香善疏結滯之氣多服損心肺玄胡索味苦辛性溫無毒入心肺脾胃四經破血下氣調經利産止腹痛心疼血暈崩淋按玄胡索行氣中血滯血中氣滯庶幾仙劑虛人須與參術同行不爾損真鬱金味辛苦甘性溫無毒入肺肝胃三經主血積氣滯生肌定痛按鬱金能開肺金之郁物罕值高肆中多以薑黃僞之必光明脆徹苦中帶甘味者真虛人斟酌投之天花粉味苦性寒無毒入心肺二經枸杞為使惡乾薑牛膝乾漆反烏頭白如雪者佳主退熱口渴消痰利膈消腫毒散撲損瘀血通月經實名栝樓主療結胸子能潤肺化痰按天花粉稟清寒之氣舊稱補虛以熱退為補非真能補也脾胃虛寒者禁之澤瀉味甘鹹性微寒無毒入腎膀胱二經畏文蛤去皮酒潤焙主水道不通淋瀝腫脹催生除濕止泄精去脬中留垢按種種功能皆由利水何以又止泄精乎此指濕火為殃不為虛滑者言也其性善瀉古稱補虛者誤矣扁鵲謂其害眼者確也六味丸用之者古人用補必兼瀉邪邪去則補自得力專一於補必致偏勝之害如病人無濕腎虛精滑目虛不明法咸禁之車前子味甘淡性寒無毒入肺肝小腸三經酒拌蒸曝主利水止瀉解熱催生益精明目開竅通淋其根葉長於行血逐水新補按利水之品乃云益精何也男女陰中各有二竅一竅通精乃命門真陽之火一竅通水乃膀胱濕熱之水二竅不並開水竅開則濕熱外泄相火常寧精竅常閉久久精足目明雜録云服固精藥久服此行房即有子若陽氣下陷腎氣虛弱者勿用木通味辛甘淡性平無毒入肝心小腸三經色白而細者佳去皮用主五淋癃閉關格腫脹殺蟲宣竅醒睡止痛破血通經催生墮胎散腫下乳按木通以疏通肝木得名又甘淡能助西方秋氣下降專通氣滯肺受熱邪氣化之源絶則寒水斷流宜此治之腳氣症足膝腫痛用木通一味二兩水煎頓服一日後當發紅疹便愈夾以他藥即不效也其性宣通精滑氣虛內無濕熱者及孕婦均忌常山味苦辛性寒有毒入肝經忌蔥醋菘菜細實而黃雞骨者良酒浸一宿切極薄片炒透主痰結瘧疾項下癭瘤按常山有劫瘧之功須發表提出陽分之後用之神效用失其宜真氣必傷酒浸炒透則力緩不發吐若是虛瘧須與參術同行然亦不可多也草果味辛性溫入胃經主瘴癘瘧疾消痰化食亦能散邪新補按草果氣猛而濁如仲由未見孔子時氣象若氣不實邪不甚者不必用之香附味苦微溫無毒入肺肝二經發散者生用調經者童便浸炒開鬱化氣發表消痰胸腹脅痛按香附於氣分為君藥乃氣病之總司女科之主帥也雖然味辛性燥多用損氣血菖蒲味辛性溫無毒入心肺二經秦皮秦艽為使惡地膽麻黃忌飴糖羊肉勿犯鐵令人吐石上産梗細而節密者良去毛切片微炒宣五臟通九竅明目聰耳開心益智除咳逆上氣風寒濕痹止小便利治疥癬瘡按芳香利竅心脾之良藥也能佐地黃天冬之屬資其宣導臻於太和多用獨用亦為氣血之殃遠志味苦辛性溫無毒入腎經畏珍珠藜蘆蜚蠊齊蛤殺附子毒甘草湯浸半日去木曝過焙乾補腎強志益精定心止驚治皮膚中熱令耳聰明療癰疽敷服皆奇按遠志入腎非心藥也強志益精治善忘精與志皆腎所藏也精虛則志衰不能上通於心故善忘靈樞經曰腎藏精精舍志腎盛怒而不止則傷志志傷則喜忘人之善忘者上氣不足下氣有餘腸胃實而心肺虛虛則營衛留於下久之不以時上故善忘也味中兼辛故下氣而走厥陰經曰以辛補之此水木同源之義前古未發也牛膝味苦酸性平無毒入腎肝二經惡龜甲畏白前白鮮皮忌牛肉産川中肥而長三尺余者良酒浸蒸用壯筋骨利腰膝除腰脊痛寒濕痿痹強陰益精通精墮胎理膀胱氣化遲難引諸藥下行甚捷罨竹木刺入肉按牛膝為陰能降而不能升脾虛下陷因而腿痛膝腫大非所宜補骨脂一名破故紙味辛性溫無毒入腎經惡甘草忌羊肉諸血胡桃肉拌炒達命門興陽事固精氣理腰疼止腎泄按補骨脂暖補水臟壯火益土之要劑宜丸不宜煎但性過於燥陰虛火動大便祕結者戒之菟絲子味辛甘性平無毒入腎肝二經山藥為使酒煮竟日打糜爛作餅烘乾再銼入磨方成細末續絶傷益氣力強陰莖添精髓堅筋骨悅顏色理勞傷除夢泄主寒精自出溺有餘瀝去風明目新補按菟絲子稟中和之性凝正陽之氣為補腎要藥溫而不燥補而不滯服食家多珍之單服一味末飲啖如湯沃雪補土之母故進食如神續斷味苦辛性溫無毒入肝腎二經地黃為使惡雷丸産川中色赤而瘦折之有煙塵者良酒浸焙補勞傷續筋骨通血脈利關節縮小便止遺泄理崩帶主一切腫毒一切胎産病暖子宮去一切面黃虛腫按續斷氣性中和補而不滯行而不泄外科女科需為上劑但草茅根似續斷誤服令人筋軟石斛味甘苦性平無毒入胃腎二經惡巴豆畏殭蠶酒浸酥拌蒸一時用清胃熱生長肌肉逐皮膚虛熱強腎添精壯骨主腳膝冷痛骨髓中痛厚腸止瀉安神定驚按石斛性和主用宏多但氣力淺薄得參耆便能奏功專倚之無捷得之效也選擇味甘者佳誤用木斛其味大苦餌之損人百合味甘微苦性平無毒入心肺二經白花者良補中保肺止嗽安神除百邪鬼魅顛狂邪叫一切癰瘡通大小便按金匱要略云行住坐臥不定如有神靈謂之百合病以百合治之則其清心安神從可想見久服使人心志歡和但腸滑者勿用紫菀味苦辛性微溫無毒入肺經洗去沙土蜜潤微焙主咳逆喘嗽虛勞多痰煩渴吐膿血按苦能下達辛可益金故吐血虛勞收為上品入至高之臟使氣化及於州都小便自利人所不知性滑不宜多用久用款冬花味辛性溫無毒入肺經杏仁為使惡皂莢硝石玄參畏貝母辛夷麻黃黃耆黃芩黃連青葙含英而不吐者良去蒂蜜水微焙主咳逆上氣喘急喉痹消渴肺癰肺痿除煩化痰按款冬賦云冰凌盈谷雪積披崖顧見款冬煒然華豔想見其純陽之稟故其主用皆辛溫開豁之力也世多以枇杷花僞之故功無效耳溫而不助火可以久任薏苡仁味甘性平無毒入脾肺二經色白而糯者良水淘曝乾炒透用健脾進食保肺止嗽解渴消水腫療濕熱筋攣去幹濕腳氣按苡仁屬土本是脾藥虛則補母故肺病用之筋骨之病以治陽明為本故筋病用之土能勝水故泄利水腫用之受熱使人筋攣受濕使人筋緩者可用受寒使人筋攣者不可用也妊娠久服能墮胎兒白豆蔻味辛性溫無毒入肺經老而光綻者佳去衣微炒主冷氣吐逆消食下氣寬胸進食去白睛翳膜脾虛瘧疾按白豆蔻感秋燥之令得乎地之火金味辛氣溫為脾家所喜然元氣虛須與參術同行不爾損氣肉豆蔻一名肉果味辛性溫無毒入胃大腸二經米粉裹煨去油忌鐵器止瀉痢溫中消食開胃止嘔闢鬼殺蟲按肉果屬金與土下氣者心脾得補而善運氣自下也非若陳皮香附之泄耳瀉利初起者不可早服縮砂仁味辛性溫無毒入肺脾大小腸胃腎膀胱七經微炒去衣下氣化食醒酒止心腹脅痛理奔豚霍亂吐瀉鬼疰安胎按芳香歸脾辛能潤腎為脾胃要藥若腎虛不歸元非此嚮導不濟然性燥火炎者忌之胎婦氣虛不可多服反致難産不可不知蓬莪蒁味苦辛溫無毒酒浸煨透切片炒主積聚氣凝心腹疼痛消食通經按蓬莪蒁峻猛之性誠為磨積之藥但虛人服之積不去而真已竭重可虞也每見世俗治積塊旦暮用之反成痼疾元氣虛者須與參術同行乃無損耳京三稜味苦性平無毒入肺肝二經醋炒用主積聚血結心腹痛墮胎按昔有患症癖死者遺言令開腹取之得塊乾硬如石文理有五色削成刀柄後刈三稜忽化為水故療積塊如神蓬莪蒁破氣中之血京三稜破血中之氣主用頗同微有氣血之別東垣五積方中用此二味皆用人參贊助故有成功而無偏勝也若專用克伐胃氣愈虛不能運行積反增大矣謹之艾葉味辛苦性微溫無毒入脾肺肝腎四經苦酒香附為使陳久者良安胎暖子宮止血痢理腸風吐衄崩中灸百病新補按艾辛可利竅苦可疏通故氣血交理胎産多需之藿香味辛性微溫無毒入肺脾二經主溫中開胃行氣止嘔吐定心腹痛按交州記比藿香於蘇合楞嚴經謂之兜婁婆香皆取其芳香今售者不甚芳香或非真種耳澤蘭味苦性微溫無毒入肝脾二經養新血破宿血消癰腫瘡膿産前後百病按澤蘭補而不滯行而不峻為産科要藥紅花味辛性溫無毒入心肝二經酒噴微焙主活血止痛産後血暈按紅花色赤宜為血症所需多則行血少則養血然力薄不能獨自成功須歸地同行為妙香薷味辛性溫無毒入肺胃二經石生硬梗者良發散夏月悽愴寒邪下氣定霍亂腹痛利小便治水腫甚捷按香薷味辛性溫為夏月發散陰寒之劑如納涼過度飲冷太多陽氣為陰邪所遏以致頭痛發熱煩躁口乾吐瀉霍亂宜用之以發越陽氣散水和脾則愈若勞役受熱反用香薷是重虛其表反助其熱害人不淺近世市人多煎混售默受其禍者曷可勝數萆薢味苦甘性平無毒入胃肝腎三經薏苡仁為使畏葵根大黃柴胡前胡牡蠣忌牛肉主風寒濕痹腰膝作疼去膀胱宿水止失溺便頻按萆薢主用皆祛風濕補下元楊子建曰小便頻莖內痛必大腑熱閉水液只就小腸大腑愈加燥竭因強忍房事有瘀腐壅於下焦故痛此與淋症不同宜鹽炒萆薢一兩煎服以蔥湯洗穀道即愈腎受土邪則水衰肝挾相火而凌土濕得萆薢以滲濕則土安其位水不受侮矣威靈仙味微辛鹹性溫無毒入十二經忌茶茗面主宣通五臟理痛風散皮膚大腸風邪化痰行水按威喻其猛靈仙喻其效速氣壯者服之神效虛弱人不宜用也鉤藤味甘性微寒無毒入肝經舒筋除眩下氣寬中主小兒驚癇客忤胎風新補按鉤藤祛風而不燥為中和之品但久煎便無力俟他藥煎就後投鉤藤一二沸即起頗得力也去梗純用嫩鉤其功十倍茵陳味苦性寒無毒入膀胱經主濕熱黃疸利小腸新補按茵陳雖去濕熱須五苓之類佐助成功中病即已若過用之元氣受賊馬兜鈴味苦性寒無毒入肺經去梗微焙主咳逆上氣消痰定喘新補按兜鈴體性輕揚故功在至高之臟根名青木香疝家要藥可塗諸毒熱腫若肺虛挾寒者不宜多用連翹味苦性寒無毒入心胃膽大腸腎五經主心經客熱諸經血結消癰疽腫毒清六經邪火新補按連翹手少陰主藥也心為火主心清則諸臟皆清諸瘡痛癢皆屬心火故瘡家以為要藥性極苦寒多用即減食茴香味辛性溫無毒入胃腎二經主腹痛疝氣霍亂吐逆通命門助陽事按茴香辛香宜胃溫暖宜腎故主治不越二經若陽道數舉上有火症者禁用八角者名大茴香粟大者名小茴香主用相仿小者力差薄耳木部白茯苓味甘淡性平無毒入心脾肺腎小腸五經馬藺為使畏牡蒙地榆秦艽龜甲忌醋産雲南皮薄色白而堅重者佳去皮膜乳制用補胃利小便消痰去濕止嘔吐泄瀉安神定驚保肺定咳止渴安胎抱根者為茯神主用相仿職專安神赤色者利水之外無他長按茯苓假土之精氣松之餘氣而成無中生有得坤厚之精為脾家要藥素問曰飲入於胃遊溢精氣上輸於肺通調水道下輸膀胱則利水之藥皆上行而後下降也潔古謂其上升東垣謂其下降各不相背也小便頻多其源亦異經云肺氣盛則便數虛則小便遺心虛則少氣遺溺下焦虛則遺溺包絡遺熱於膀胱則遺溺膀胱不約為遺厥陰病則遺溺所謂肺氣盛者實熱也宜茯苓以滲其熱故日小便多者能止也若肺虛心虛包絡熱厥陰病皆虛火也必上熱下寒法當升陽膀胱不約下焦虛者乃火投於水水泉不藏必肢冷脈遲當用溫熱皆非茯苓可治故曰陰虛者不宜用也茯神抱根而生有依守之義故魂不守舍者用以安之赤者入丙丁但主導赤而已琥珀味甘性平無毒入心肺脾小腸四經主安神殺鬼消瘀血通五淋明目去翳止血生肌合金瘡按琥珀感木土之氣而兼火化故有功於脾土脾能運化肺金下降小便自通因血少而小便不利者誤用之反致燥急之苦肉桂味辛甘性熱有小毒入腎肝二經忌火生蔥石脂去皮用主元陽痼冷脾胃虛寒溫中降氣堅筋骨強陽道定驚通血脈制肝邪下焦腹痛奔豚疝瘕宣通百藥善墮胞胎桂心入心脾二經理心腹痛五勞七傷殺三蟲宣氣血利關節托癰疽痘毒能引血成膿桂枝入肺膀胱二經無汗能發有汗能止主心腹痛皮膚風橫行為手臂之引經直行為奔豚之嚮導按肉桂乃近根之最厚者故治下焦桂心即在中之次厚者故治中焦桂枝即頂上細枝又名薄桂故治上焦此本乎天者親上本乎地者親下之道也王好古云本草言桂發汗而仲景治傷寒有當汗凡數條皆用桂枝又云無汗不得服桂枝汗多者用桂枝甘草湯此又用桂閉汗一藥二用何也本草言桂辛甘能通脈出汗者是調其血而汗自出也仲景云太陽中風陰弱者汗自出衛實營虛故發熱汗出又云太陽病發熱汗出者此為營弱衛強陰虛陽必湊之故皆用桂枝發汗乃調其營則衛自和風邪無所容遂自汗而解非桂枝能開腠發汗也汗多用桂枝者以之調和營衛則邪從汗出而汗自止非桂枝能閉汗也昧者不知其意遇傷寒無汗者亦用桂枝誤甚矣曾世榮曰小兒驚風及瀉宜五苓散瀉丙火滲土濕內有桂能抑肝風而扶脾土也醫余録云有人患眼痛脾虛不能食肝脈盛脾脈弱用涼藥治肝則脾愈虛用暖藥治脾則肝愈盛但於平藥中倍加肉桂殺肝益脾一治兩得之傳云木得桂而枯是也若血症非挾寒目疾非脾虛者禁用丁香味辛性溫無毒入肺胃腎三經畏鬱金忌見火去丁蓋用主脾胃虛寒反胃厄逆胸腹痛痃癖奔豚鬼疰蠱毒壯陽暖腰膝小兒吐瀉慢驚痘瘡灰白大者名母丁香拔白鬚塗孔中即生黑按丁香祛寒開胃之劑同柿蒂止厄同黃連乳汁點目此得辛散苦降之妙有火者忌服木香味辛性溫無毒入心肺脾胃肝膀胱六經入理氣藥忌火入止瀉藥麵裹煨行肝氣泄肺氣健脾氣散滯氣止瀉痢定嘔吐健脾消食除心腹脅痛脹滿積聚開鬱殺鬼安胎按木香乃氣分第一藥也肺實主氣肺氣調則金能制木而肝平怒則肝氣逆上忤其元氣心有縱肝之情而不能制則肝盛得木香則心暢而正氣亦暢肝氣何逆之有哉實心之行肝非肝之自行也氣虛及陰虛火亢者禁與沉香味辛性微溫無毒入腎肝二經外黃內黑紋直而無夾木者佳主鬼疰惡氣脹滿心腹諸痛鬱結症癖補脾益氣壯陽大腸虛閉小便氣淋按沉香色黑下墜故達腎諸木皆浮此獨沉水故入肝木而治逆上之氣行氣而不傷氣溫中而助火誠良劑也氣虛下陷者忌入柏子仁味甘辛性平無毒入心脾腎三經畏菊花羊蹄草蒸曬微炒養心益智安神定悸益血興陽去邪魁除風濕美顏色耳目聰明按柏子仁不寒不燥甘而補辛而潤其氣芬芳能透心腎而益脾胃仙家收為上品或瀉或多痰者勿用柏葉養陰止血屬金善守春採東夏採南秋採西冬採北方得節候生氣枸杞子味甘性平無毒入肺腎二經産甘州色紅潤圓細核少而甘美者良補精強陰明目安神主熱消渴利大小腸根名地骨皮補腎養陰治在表無定之風邪傳尸有汗之骨蒸按枸杞地骨均為腎家之劑熱淫於內瀉以甘寒地骨皮是也精不足者補之以味枸杞子是也腸滑者禁枸杞子中寒者忌地骨皮益智仁味辛性溫無毒入心脾腎三經綻滿者佳去殼鹽水炒研細溫中進食補腎扶脾安神開鬱攝涎唾止小便餘瀝及夜多小便夢泄精滑按益智行陽退陰之藥三焦命門氣弱者宜之楊士瀛云心者脾之母進食不止於和脾火能生土當使心藥入脾藥中庶幾相得古人進食多用益智土中益火也血燥多火及因熱而遺濁者法咸禁之訶子一名訶黎勒味苦澀性溫無毒入肺大腸二經清喉生用止瀉煨用俱去核固腸止瀉斂肺止嗽降火消痰利咽喉通津液下食積除脹滿破結氣開胃止嘔吐久服令鬚髮變黑主腸風瀉血崩中帶下胎漏新補按訶子能澀腸然下氣太急虛人不可獨用同人參能補肺同白朮能益脾同五味能斂肺同橘皮能下氣波斯國人遇大魚放涎滑數里舟不能行乃投訶子其滑化為水則其化痰消涎從可想見矣咳嗽未久瀉痢新起者皆在禁例吳茱萸味辛苦性熱有小毒入肝脾腎三經蓼實為使惡丹參硝石白堊畏紫石英産松江開口者佳陳久者良去梗鹽湯泡半日漉起曝乾用溫中下氣開鬱止瀉去痰消食除濕起陽止吞酸疝氣水腫治心腹冷痛如神殺鬼去蟲按吳茱萸辛散燥熱入厥陰居多脾腎其旁及也寇氏曰下氣最速腸虛人服之愈甚咽喉口舌生瘡以茱萸末醋調貼兩足心一夜便愈引熱下行也性極燥極急非大寒者不可輕投虛泄者必與參術同投亦須少少用之不爾損人山茱萸味酸微溫無毒入肝腎二經蓼實為使惡桔梗防風防己色鮮肉厚者佳酒潤去核隔紙焙乾用補腎助陽事止腰膝痠疼閉精縮小便主月事多耳鳴響按山茱萸性溫而潤故於水木多功夫四時之令春生而秋殺萬物之性喜暖而惡寒腎肝居至陰之地非陽和之氣則陰何以生乎小便不利者勿用杜仲味辛甘性溫無毒入肝腎二經惡玄參蛇蛻去皮鹽酒炒去絲益精堅筋骨止腰膝痛主肝燥風虛陰濕癢小便餘瀝按腎苦燥急食辛以潤之肝苦急急食甘以緩之杜仲所以多功於腎肝也溫而不助火可以久服金櫻子味酸澀甘性平無毒入肝腎二經去刺及核刷毛令淨澀精止遺泄脾泄久痢便頻按金櫻子味澀久服多服能減人食丹溪曰經絡隧道以通暢為和平昧者取其澀精煎膏常服自不作請咎將誰執須經霜後將熟時採太生令人利太熟功力薄也半黃者佳酸棗仁味甘性平無毒入心肝膽三經惡防己炒熟用主煩心不眠虛汗煩渴四肢痠痛補中益肝堅筋骨助陰氣按聖惠方云膽虛不眠寒也炒棗仁為末竹葉湯調蓋以肝膽相依血虛則肝虛膽亦虛得熟者以旺肝則木來制土脾主四肢又主困倦故令人睡濟衆方云膽實多睡熱也生研為末薑茶湯調服蓋棗仁秋成者也生則全金氣而制肝脾不受侮而運行不睡矣滑瀉者不宜多用竹葉味苦甘寒無毒入心胃二經清心滌熱止嗽化痰竹茹即竹之刮去青皮用第二層者主逆氣嘔厄噎膈吐衄血熱崩中痰氣竹瀝味甘薑汁為使主中風痰涎壅盛神氣昏冒凡痰在皮裡膜外經絡四肢者非此不能達按竹有多種惟取大而味甘者為勝生長年許嫩而有力竹能損氣故古人以筍為刮腸篦竹瀝久服滑腸脾虛泄瀉者勿用寒痰濕痰食積痰並非竹瀝所能治桑白皮味甘性寒無毒入肺經續斷桂心麻子為使蜜炙勿令涎落忌鉛鐵器下氣消痰瀉肺除喘滿去肺中水氣水腫脹葉可止汗去風子可補腎養陰生津安神枝可祛風養筋桑寄生和血舒筋堅齒長髮療痹安止崩漏按桑之為用甚弘凡根枝幹葉若子若灰若寄生均有奇功根較寒子較暖用者須酙酌之豬苓味淡性平無毒入膀胱經去皮用利水去脹滿主帶下淋濁亦能發汗按豬苓感楓根之餘氣而生利水諸藥無如此快衍義謂多服損腎昏目潔古謂淡滲亡津液無濕症者勿用厚朴味苦辛性溫無毒入胃經乾薑為使惡澤瀉寒水石硝石忌豆厚而色紫有油者佳去粗皮薑汁浸透焙用溫中平胃消痰下氣除脹消食去水破血腹痛嘔逆按厚朴苦能下氣走而不守大損真氣虛人及孕婦不可輕用也黃柏味苦性寒無毒入腎經惡乾漆肉厚深黃者佳去粗皮鹽酒炒至焦褐色用瀉腎火有餘利小便去下焦濕熱腫痛口瘡女人漏下赤白按黃柏性寒行隆冬肅殺之令故獨入少陰瀉有餘之相火昔人稱其補陰者非其性補蓋熱去則陰不受傷雖謂之補亦宜也若腎虛脾薄之人畏之甚於刀錐今天下極其崇尚以為去熱治勞之妙藥而不知陰寒之性能奪人食損人氣命門真元之火一見而消亡脾胃運行之職一見而阻喪獨不聞實火可瀉虛火可補之說乎元氣既虛又用苦寒直行而泄奚啻雪上加霜遏絶生機莫此為甚受其害而斃者十人而九冤哉生命何辜而遭此慘伐哉必尺中洪大按之有力可炒黑暫用不然便當痛絶山梔子味苦性寒無毒入肺經炒黑用清肺熱吐上焦邪氣除心中懊憹去臍下血滯利小便引火屈曲下行按梔子輕飄象肺故獨入肺家泄有餘之火種種功用皆從肺旁及者也大苦大寒損胃伐氣虛者畏之世人每用治血不知血寒則凝反成敗症治實火之吐血順氣為先氣行則血自歸經治虛火之吐血養正為先氣壯則自能攝血此治療之大法不可少違者也誤用梔子其害也必矣牡丹皮味辛苦性微寒無毒入肝經畏貝母大黃菟絲子忌蒜胡荽和血生血涼血行血除風痹主無汗骨蒸清相火按丹皮清東方雷火是其本功北方龍火因而下伏此乙癸同源之治也古人惟以此治相火故六味丸用之後人專用黃柏不知丹皮之功更勝也千載祕奧人所未知木瓜味酸性溫無毒入肝經忌鐵去穰主一切筋病濕痹腳氣按木瓜稟東方之酸故職專治筋轉筋時但念木瓜二字及書土作木瓜字立效東垣曰氣脫能收氣滯能和故筋急筋緩無所不宜孟詵謂多食木瓜損齒及骨經曰陰之所生本在五味陰之五宮傷在五味五味太過即有增勝之憂也檳榔味苦性寒無毒入胃大腸二經下氣性如鐵石治後重如神消穀逐水除痰殺蟲解毒醒酒諸瘧瘴癘按嶺表多食檳榔瘴癘之作率因食積此能消食下氣故也南方地溫腠府不密久食檳榔臟腑疏泄一旦病瘴至不可救豈非伐氣之禍歟氣虛下陷者所當遠避大腹皮味辛性溫無毒入肺脾二經豆汁洗去沙淨微炒主攻心腹水腫悶脹通大小腸去蠱毒按大腹皮去水下氣之劑病虛者勿用即用須以補劑監製大腹樹上多棲鴆鳥宜以大豆汁多洗令黑汁去盡方可用也果部橘皮味辛性微溫無毒入肺脾二經産廣中者良陳久者良去蒂及膜用開胃健脾消痰理氣止嗽定嘔消食開鬱小者名青皮破氣達下焦消痰治瘧平肝去積理小腹痛按橘皮能溫能補能散能和其功當在諸藥之上採時色已紅熟如人至老成則烈性漸減收藏又復陳久則多歷黴夏而躁氣全消故稱中和之品為脾胃重藥青皮猛鋭不宜多用市中以小橘中空易腐難銼多以小柑小橙小香櫞之類僞之此近來通弊不可不察也枳殼味辛苦性微寒無毒入肺脾胃大腸四經去穰麩炒破至高之氣除咳定喘止嘔消食化痰逐水治脹小者名枳實破氣瀉痰沖牆倒壁之勢按枳殼枳實上世未嘗分別自東垣分枳殼治高枳實治下海藏分枳殼主氣枳實主血然究其功用皆利氣也氣利則痰消積化矣人之一身自飛門以至魄門三焦相通一氣而已又何必分上與下氣與血乎但枳實性急枳殼性緩為確當耳昔湖陽公主苦難産方士進瘦胎飲用枳殼四兩甘草二兩為末每服一錢自五月後一日一服合以施人無不受害者夫氣壯則子有力而易生枳殼破氣胎子無力反致難産惟在奉養太過北方氣實者或有相宜否則決當謝絶時醫不察虛實不辨補瀉往往概施損害真元為厲不淺雖以補劑救之亦難挽其克削之害也近來多蹈此弊故特表以為戒杏仁味苦甘性溫有毒入肺大腸二經惡黃芩黃耆葛根蘘草滾水泡去皮尖炒透雙仁者有毒能殺人須揀去主上焦風心下熱氣逆喘嗽潤大腸解錫毒消狗肉索粉按東垣云杏仁治氣桃仁治血俱通大便若虛人便閉不可過泄脈浮者屬氣用杏仁陳皮脈沉者屬血用桃仁陳皮手陽明與手太陰為表裡賁門主往來魄門主收閉為氣之通道故並用陳皮佐之市中所售多有李仁梅仁夾雜用須細辨桃仁味苦甘性平無毒入肝大腸二經香附為使湯泡去皮尖炒透雙仁者勿用主瘀血血閉心下堅心腹痛潤大腸辟邪殺鬼按桃仁苦重於甘氣薄味厚沉而下降苦以行滯甘以生新成氏曰肝者血之源血聚則肝燥肝苦急急食甘以緩之桃仁之甘緩肝散血故抵當湯用之傷寒八九日內有蓄血發熱如狂少腹滿痛小便自利又有當汗失汗熱毒深入吐血血結煩躁讝語俱用此湯山楂味酸性平無毒入脾胃二經去核消肉積乳積疝氣兒枕痛發小兒痘疹理下血腸風按山楂善去腥膻油膩之積與麥芽消穀積者不同核主催生疝氣仲景治傷寒一百一十三方未嘗用麥芽山楂何也為其性緩如治世之良吏非亂世之能臣故但用大小承氣不用山楂麥芽近世不問有食無食一概用之以為穩當真堪捧腹大棗味甘性平無毒入脾經忌生蔥解烏附毒主養脾生津潤肺止嗽定驚和百藥按素問言棗為脾之果又言脾病毋多食甘仲景建中湯心下痞者減飴棗然則脾不足者可用而有餘者不可復增其氣以致偏勝耳素問所謂脾病非不足蓋有餘也田氏曰齒病蟲病疳病不宜啖棗補遺曰婦人臟躁悲傷欲哭狀若神靈東垣曰溫以補不足甘以緩陰血仲景治奔豚用大棗扶土以平腎也水飲脅痛有十棗湯益土而勝水也𡵺嶁神書曰執棗一枚咒云我有棗一枚一心歸大道優他或優降或劈火燒之念七遍與瘧者食即截每試必效亦神異也紅棗功相仿力少薄耳龍眼味甘性平無毒入心脾二經肥大而緑色者佳補心益脾安志強魂聰明長智按方外服龍眼法五更將不見水乾龍眼以舌在齒上取肉去核即是舌攪華池之法細細嚼至渣細膏連口中津汩汩然咽下如咽甚硬物畢又如前法食第二枚共服九枚約有一時許服畢方起辰巳二時又服九枚未申二時又服九枚臨臥服九枚一曰四次卻有半日之工服龍眼則氣和心靜且漱津納咽是取坎填離之法勞症者勤行一月無不愈者方士大祕余表之以公同人蓮子味甘性平無毒入心腎二經補中養神止瀉痢遺精安靖上下君相火邪耳目聰明止赤白濁崩帶藕主止渴解酒止怒令人心歡藕節能止吐衄血蓮花須清心固精悅顏止血荷葉助脾進食止血固精安胎止瀉葉蒂治雷頭風按蓮花産於泥水而不染泥水節節含藏生生不息根須花果葉節皮心品品皆為良藥蓋神物也稟芬芳之氣合稼穡之味為脾之果脾為中黃所以交媾水火會合木金者也土旺則四臟皆安而蓮之功力巨矣胡桃味甘性平無毒入肺腎二經潤腸悅顏斂肺補腎同補骨治痿強陰同胡粉拔白變黑新補按胡桃達命門之品也夫三焦者元氣之別使命門者三焦之本源蓋一源一委也命門指所居之府而名乃藏精系胞之物三焦指分治之部而名乃出納熟腐之司一以體名一以用名在兩腎之間上通心肺為生命之原相火之主靈樞已詳言而扁鵲不知原委體用之分以右腎為命門以三焦為有名無狀承訛至今莫之能正胡桃仁頗類其狀而外之皮汁皆黑故入北方通命門命門既通則三焦利故上通於肺耳昔幼兒痰喘五日不乳夢大士授方令服人參胡桃湯數口喘即定明日去胡桃衣喘復作仍連皮服遂愈蓋皮有斂肺之功也空腹時連皮食七枚能固精命門火熾者勿服芡實味甘性平無毒入脾腎二經補腎固精止遺濁益脾實腸新補按芡實止瀉固精獨於脾腎得力則先後天之根本咸賴焉吳子野云人之食芡必枚齧而細嚼之未有多嘬而亟咽者也舌頰齒唇終日囁嚅而芡無五味腴而不膩是以致玉池之水轉相灌注積其功力雖過乳石也老人服之延年當矣嬰兒食之難長豈其難化歟烏梅味酸性平無毒入肺脾二經定嗽止渴清音去痰止血止利安蛔退熱消酒毒蝕惡肉按梅生於春曲直作酸其用以收斂為功病有當發散者誤食必為害若過食而齒齼者嚼胡桃肉解之瘡疽愈後有肉突起烏梅燒傅一日減半兩日而平谷部六種麥芽味甘鹹性溫無毒入脾胃二經豆蔻砂仁烏梅木瓜芍藥五味子為使炒焦去芒留芽用消食和中化痰催生落胎按麥性黏滯水漬生芽氣雖少清性猶未化全在多炒至於焦色反有功力專主五穀之積與山楂異古人有麥芽消腎之說為其伐胃故也經云胃為水穀氣血之海化營衛而潤宗筋又曰陰陽總宗筋之會而陽明為之長故胃傷者陽事衰也豈非消腎之確證歟李時珍曰有積消積無積消元氣前賢於攻伐之劑雖平善如麥芽恐人過用損真猶諄諄告戒況硝黃巴硇之屬其可嘗試而漫為哉世之喜於消導者至此亦當瞿然矣神麯味甘苦性溫無毒入脾胃二經陳久者良研細炒至褐色用消穀健脾胃治赤白痢閃挫腰痛産後回乳按神麯消穀勝於麥芽第須修造如法收藏陳久炒令焦色為善造法擇五月五日或六月六日白麵五斤象白虎蒼耳草汁一碗象勾陳野蓼汁一碗象騰蛇青蒿汁一碗象青龍杏仁五兩及北方河水象玄武赤小豆煮熟去皮四兩象朱雀一如造麴法罨黃懸風處經年用淡豆豉味苦甘性寒無毒入肺經主傷寒瘴氣煩悶溫毒發斑嘔逆按豆豉能升能降能散能和得蔥則發汗得鹽則吐越得酒則治風得薤則治痢得蒜則治血炒熟又能止汗須如法自造為勝白扁豆味甘性微溫無毒入脾經炒黃去殼研用補脾止瀉消暑降濕止渴解毒按扁豆甘溫與太陰相宜故能通理三焦升清降濁須入他藥為佐使單食多食反能滯氣飴糖味甘性溫無毒入脾經主脾虛腹痛痰多喘嗽瘀血腸鳴按飴本米穀腐化味極甘溫為中州所喜痰嗽方中用少許加入潤肺化痰頗著奇功然用之太過反能動火生痰凡中州吐逆酒病牙疳腎病俱不可服麻仁味甘性平無毒入脾胃二經畏牡蠣白薇茯苓絹包置沸湯至冷取出懸井中一夜勿著水曝乾新瓦上挪去殼潤五臟通大腸宣風利關節催生新補按麻仁木谷也而治風同氣相求也陳士良云多食損血脈滑精氣痿陽事婦人多食即髮帶疾以其滑利下行走而不守也菜部生薑味辛性溫無毒入肺胃二經隔年老者良通神明去穢惡主咳逆嘔吐痰氣解鬱開胃消食散風寒脹滿冷痢腹痛轉筋殺蟲解毒生用發散熟用和中要熱去皮要冷留皮按生薑辛溫之品而張鼎謂其除壯熱何也夫壯熱之原非外感風邪即內傷飲食姜能發散又能消導故也東垣曰生薑為嘔家聖藥蓋辛以散之嘔乃氣逆不散也或問辛溫入肺何云入胃曰咽門之下受有形之物及胃之系便是胃口與肺系同行故能開胃夜勿食姜者夜則主斂反開發之違天道矣秋勿食姜亦同此義有病則不論也夫辛能入肺肺旺則一身之氣皆為吾用中焦之元氣定而脾胃出納之令行邪氣不能容矣凡中風中暑中氣中毒中惡中酒食厥痰厥尸厥冷厥霍亂昏暈一切卒暴之病得之立救且開鬱回陽鬼魅不敢近藥中之神聖也乾薑味辛性溫無毒入肺脾二經切薄片炮紫色經年後用之良溫中補脾消食去滯主腹痛脹滿風寒濕痹腸癖下利反胃吐瀉痰多腰腎冷疼止血散風寒按乾薑生則逐寒邪而發表炮則除胃冷而守中多用散氣須生甘草緩之多服僭上令人目暗喉痹孕婦食乾薑令胎內消丹溪曰血虛發熱産後大熱用之止吐血痢血須炒黑用時珍曰能引血藥入血氣藥入氣去惡養新有陽生陰長之意故血虛吐衄下血者用之乃熱因熱用從治之法也夫乾薑本辛炮之則苦守而不移非若附子行而不止也其止血者蓋血虛則熱熱則妄行炒黑則能引補血藥入陰分血得補則陰生熱退且黑為水色故血不妄行也然血寒者可多血熱者不過用三四分為嚮導而已白芥子味辛性溫無毒入肺經解肌發汗利氣疏痰溫中去滯辟邪療反胃按丹溪曰痰在皮裡膜外非白芥子不能達煎湯不可太熟熟則力減大辛大散用須中病即已久用損真氣令人眩運損目肺經有熱陰虛火亢當遠謝之萊蔔子即蘿蔔子味辛性溫無毒入肺胃二經微炒研細下氣定喘消食除膨祛痰消腫毒新補按丹溪曰萊蔔子治痰有推牆倒壁之功虛弱人服之氣淺難以布息昔胡僧入中國見人食麵驚曰食之安得不病及見食萊蔔乃曰賴有此耳又洞微志云有人病狂夢中見紅衣女子引入宮殿中小姑歌云五云樓閣曉玲瓏天府由來是此中惆悵悶懷言不盡一丸萊蔔火吾宮一道士云此犯大麥毒也紅衣女心神也小姑脾神也萊蔔制面毒故曰火吾宮也遂以藥及萊蔔子治之果愈嗣是用萊蔔子治面積頗著神異瓜蒂以味苦性寒有小毒入肺經去胸中邪氣水停食積痞硬懊憹新補按瓜蒂極苦而性上湧能去上焦之疾所謂高者因而越之是也最能損胃傷血耗氣奪神上部無實邪者不敢輕投人部乳汁味甘性平無毒入心肝脾三經色濃白而不作氣者佳補五臟潤腸胃悅顏色止消渴退虛熱潤噎膈祛目赤止淚流按乳從血化生於脾胃攝於衝任未受孕則下為月水既受孕則留而養胎産後則變赤為白轉降為升上成乳汁此造化玄微之妙卻病延年之藥也世俗多以乳汁能滑腸果爾天下無不瀉之嬰兒矣有是理哉特與食混進誠能發瀉故於夜半時進前後皆與食遠此為良法服乳歌曰仙家酒仙家酒兩個葫蘆盛一斗五行釀出真醍醐不離人間處處有丹田若是乾涸時咽下重樓潤枯朽清晨能飲一升余返老還童天地久曝製作粉名乳金丹尤佳惟脾胃泄瀉者不宜用也童便味鹹性寒無毒入膀胱經色白者佳主勞弱煩蒸天行狂亂撲損瘀血吐衄産婦血運按經云飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱小便入胃仍循舊路而出故丹溪以為降火甚速陰虛火動非此不除褚澄曰喉有竅則咳血喉不停物毫髮必咳血既滲入愈滲愈咳服寒涼則百不一生飲溲便則百不一死時珍曰人之精氣清者為血濁者為氣濁之清者為津液清之濁者為小便便與血同類同咸故治血多功也熬煉成秋石去濁留精補正祛邪遠元覆命為虛勞者每一靈丹人中白降火散血化痰治疳同鰻魚食之謂之烏龍丹金汁味苦性寒無毒入肺胃大腸三經入土經年者佳主傷寒陽毒發狂痘瘡血熱傅癰疽解百毒新補按金汁濁陰歸下竅有降無升入土既久去濁留清身中諸火逆上仍用身中降火之品治之此竹破須將竹補抱雞遠用卵為之法也陽明實熱發狂痘瘡紫黑乾枯非此莫能治療人胞一名紫河車味甘鹹性溫無毒入心腎經米泔洗淨銀針刺出毒血童便浸半日用醋酒洗至色白為度入鉛瓶中加蜜半斤仍以鉛銲口隔湯煮十沸待冷方開選首胎無病者良陽人使陰陰人使陽主一切虛損痼疾骨蒸脊腰痠疼足膝痿軟驚悸羸乏按崔氏云胎衣宜藏吉方若為蟲獸所食令見不育此亦銅山西崩洛鐘東應之理蒸煮而食不顧損人長厚者弗忍為也獸部龍骨味甘性平無毒入肝腎二經忌魚及鐵器畏乾漆蜀椒理石石膏火煅水飛酒煮曝乾主鬼魅泄精泄瀉溺血小便頻胎漏腸風小心驚癇女子漏下赤白生肌斂瘡脫肛止汗安魂龍齒專主安魂狂熱按龍為東方之神故其骨多肝疾腎主骨故又益腎也須火煅紅水飛每斤用黑豆一斗蒸過否則著人腸胃晚年作熱許叔微曰肝藏魂能變化故魂遊不定者治之以龍齒性太澀斂非虛滑脫陷者勿用虎骨味辛性溫無毒入肝腎二經畏乾漆蜀椒磁石去髓酥炙黃脛骨最良壯筋骨去風毒攣急走注疼痛按虎者西方之獸通於金氣風從虎虎嘯而風生風木也虎金也木受金制焉得不從故可入骨搜風然虎之強勇皆在於脛故脛骨勝他骨百倍也中藥箭者有毒損人必有微黑不可不辨虎䐗醫翻胃有功虎爪主辟邪殺鬼犀角味苦酸鹹性大寒無毒入心胃肝三經松脂升麻為使惡雷丸烏頭烏喙忌鹽劈開紙裹納懷中乘熱搗之應手如粉清心去煩熱鎮驚明目消痰散風清肝辟邪解毒主傷寒發狂譫語發黃發斑痘瘡太熱按犀食百草之毒故能解百毒然大寒之性胃必受傷妊婦多服能消胎氣羚羊角味鹹性寒無毒入肺肝二經清肺平肝明目去熱定風安魂主驚夢狂越傷寒時氣熱在肌膚産後惡血攻心按羚羊角外有二十四節掛痕內有天生木胎有神力抵千牛入藥不可單用須銼細避風搗篩更研萬匝如飛塵免刮入腸入厥陰伐生生之氣不宜久用多用牛黃味苦微甘性平有小毒入心脾肝三經人參為使惡龍骨地黃龍膽草蜚蠊常山畏牛膝乾漆體輕微香磨甲色透置舌上先苦後甘清涼透心者真清心利痰安魂定驚除邪逐鬼痘瘡紫色譫語按東垣曰牛黃入肝凡中風入臟者必用牛黃入骨透髓引風自內而出若中府及中血脈者用之引邪入髓如油入面莫之能出至於脫絶症只宜滲灌牛黃不足倚也牛肉和中養脾丹溪倒倉法用肥嫩牡黃牛肉二十斤去筋膜長流水煮爛去渣取淨液再熬如琥珀色病者先斷淫欲食淡前一日不食晚飯入密室中明快而不通風者取汁飲之寒月隔湯溫之病在上者欲吐多則急飲之病在下者欲利多則緩飲之病在上中下者欲吐利俱多則時緩時急渴則自飲小便飢則先與粥湯次與淡稀粥三日後方與菜羹糜粥調養一月沉疴悉去此後忌牛肉十年丹溪自序曰牛坤土也黃土色也以順德配乾健者牡之用也肉者胃之藥也液者無形之物也故由腸胃而透肌膚毛竅無所不入夫積聚久而成形黏著於迥薄曲折之處可以丸散犯乎此則踵其曲折如洪水泛漲陳朽順流而下其法得之西域異人借補為瀉因瀉為補大有再造之功真奇法也鹿茸味甘鹹性溫無毒入腎經杜仲為使畏大黃大如茄子不破者佳刮去毛酥炙透生精益陽強筋健骨補髓養血安胎殺鬼主便數泄精溺血虛癆腰脊膝痛鹿角主用相仿功力差緩按鹿乃仙獸能通督脈稟純陽之質含生髮之氣其性極淫一牡常御百牝腎氣有餘足於精者也其角不兩月長大至一二十斤生長神奇無過於此茄茸所以貴重者功力既宏取之極難當其初生不過一茶之頃已成茄形稍遲半日便如馬鞍岐起愈小則愈嫩雖絹帛觸之亦損破也一破其力大減然鹿性好觸才捕便抵一抵便破故不破損者其值隆也鹿與麋又當有別鹿山獸也屬陽夏至解角陰生陽退之象也麋澤獸也屬陰冬至解角陽生陰退之象也主用有陰陽之別可不察乎阿膠味鹹性平無毒入肺肝腎三經薯蕷為使畏大黃明徹質脆色緑者真蛤粉炒成珠用主勞損肢體痠疼吐衄崩淋尿血血痢腸風帶下經水不調咳嗽喘急肺痿肺癰潤燥化痰安胎療腫毒利小便調大腸按阿膠乃濟水之眼內經以濟水為天地之肝故入肝多功馬騾皮合北方水色順而健行之物故入腎多功水充則火有制火熄則風不生故木旺風淫火盛金衰之症莫不應手取效然邇來真者絶罕誤用僞者反為滯痰傷胃不可輕忽也麝香味辛性滑無毒忌大蒜及火微研用主開竅通經穿筋透骨闢鬼殺邪催生墮胎殺蟲蠱去風痰治驚癇理客忤蝕潰瘡之膿消瓜果之積按麝香走竄飛揚內透骨髓外徹皮毛草木見之黃落瓜果見之腐爛孕婦佩之墮胎東垣云麝香搜骨髓之風風在肌肉者誤用之反能引風入骨丹溪云五臟之風忌用麝香以瀉衛氣故症屬虛者概勿輕用癆怯人切忌佩帶獺肝味甘性溫有毒入肝經主傳尸鬼疰疫毒蠱災獺爪搜逐癆蟲新補按葛洪云尸疰鬼疰使人寒熱沉沉默默而不知所苦而無處不惡積月纍年殗殢至死死後傳染乃至滅門惟用獺肝陰乾為末水服二錢每日三服藥下腹中有蟲漸漸瀉出以瘥為度蟲魚部龜甲味鹹性寒有毒入心腎二經惡沙參蜚蠊自敗者良去肋及背刮去黑皮酥炙補腎除蒸養心益智續筋骨去瘀血止瀉痢及漏下赤白痎瘧癥瘕小兒囟門不合諸瘡久不收口按龜甲北方之至陰故能補陰若入丸散順研極細恐著人腸胃變為瘕也夫龜鹿皆永年龜首藏向腹能通任脈取下甲以補腎補血皆陰也鹿鼻反向尾能通督脈取上角以補火補氣皆陽也格物考云天有先春之震山多自死之龜龜聽雷音則口中所含以蟄者便吐而昂首時令尚早無蟲可食多致餓死血肉腐爛滲入下甲此真敗龜板也又陽龜殼圓板白陰龜殼長板黃陰人用陽陽人用陰鱉甲味鹹性寒無毒入肝經惡礬石理石九肋者良未經湯煮佳酥炙主癆熱骨蒸心腹癥瘕瘧母瘀血漏下陰蝕痔核按鱉色青主治皆肝症龜色黑主治多腎症同歸補陰實有分別性皆至陰太寒多用必傷土也牡蠣味鹹性寒無毒入腎經貝母為使畏麻黃辛夷吳茱萸醋調黃泥固濟煅透童便淬之澀精止帶化痰軟堅去熱止渴斂汗消疝固二便化瘰癧按牡蠣鹹寒宜其歸腎壯水之主可制陽光久服必有寒中之患五靈脂味甘性溫無毒入肝經畏人參酒飛去沙曝乾生者行血炒者止血主破血下氣一切心腹脅痛祛冷滯按五靈脂乃寒號蟲之糞也氣味俱厚獨入厥陰主血滯大有神功其止崩帶者非但治血乃去風之劑風動物也衝任經虛被風傷襲不能藏血與荊防治崩相似濁陰有歸下之功兼能降火人所未知氣極膻惡虛薄人弗能勝也穿山甲味鹹性寒有毒刮去膜打碎炒黃再研用搜風逐痰破血開氣療蟻瘻截瘧治腫毒理痛痹按穿山甲古名鯪鯉甲穴山而居寓水而食善走竄經絡無處不到直達病所成功如患在某處即用某處之甲此要訣也性頗峻猛不可過用石部硃砂味甘性寒有毒入心經惡磁石畏鹹水忌一切血研細水飛狀如箭頭者最上狀如石榴子鮮紅透明者亦佳安心神療癲狂去結痰解煩熱辟邪氣殺鬼祟清胎毒痘毒止目痛牙疼按硃砂色赤應南離為心經主藥多服令人呆悶水銀即硃砂之液殺蟲蝨下死胎滲入肉內使人筋攣若近男陽陽痿無氣惟以赤金擊莖邊患處水銀自出陽便起也輕粉即水銀升煉者去風殺蟲追毒生肌若楊梅瘡初起便服輕粉或以輕粉根朱點之毒氣退伏骨髓如油入面莫之能出逮十年草載之後毒發關竅重者喪生輕者廢敗世之蹈此而死者不可勝數醫者取其一時捷效計利忘命亦與於不仁之甚者也痛切戒之赤石脂味酸澀辛性大寒無毒入心胃大腸三經畏官桂芫花惡大黃松脂煅透水飛固腸止泄長肉生肌主崩漏痢疾脫肛腸澼新補按仲景三物桃花湯用赤石脂為君治少陰下利膿血取其酸澀之性也痢症新起者忌用食鹽味鹹性寒無毒入腎經擦牙止痛洗目去風納導可通二便探吐心腹煩疼停痰霍亂中暑疝症新補青鹽功用相同其力更倍按潤下作咸咸走腎凡喘嗽水脹消渴大忌食鹽或引痰生或凝血脈或助水邪多食傷顏色傷筋力故西北人不那咸少病多壽東南人嗜鹽少壽多病所以修養家云淡食能多補匪浪說也朴硝味辛鹹性大寒有小毒入胃大腸二經大黃為使惡苦參苦菜女菀畏三稜下氣破血攻積聚癥瘕老痰宿食煩熱邪氣明目清躁推陳致新按經曰鹹味下泄為陰又曰咸以軟之又曰熱淫於內治以鹹寒又曰氣堅者以咸軟之皆合用硝仲景只用芒硝不用朴硝惡其太峻也朴硝在下最粗而濁芒硝在上其質稍清再經煎煉為玄明粉尤為清粹然終是攻擊之利方士濫誇玄明粉可以卻病延年不根之說也若施之於有虛無火人殺人慘於刀劍矣石膏味辛甘性大寒無毒入肺胃二經雞子為使惡莽草巴豆馬目毒公畏鐵光明嫩者佳清胃火除頭疼齒痛逆氣驚喘三焦熱皮膚熱腸胃結氣消渴發汗解肌按石膏沉陰下降有肅殺而無生長須適事為故毋恣意用之致伐資生之本也潔古云能寒胃令人不食非有極熱不宜用血虛發熱有類白虎湯症誤用之不可救也寇氏云孫兆言四月後天熱時宜用白虎湯但四方氣候不齊歲中運氣不一亦宜兩審東垣謂立夏前多服白虎必小便不禁此陽明津液不能上輸肺之清氣亦復下降故爾滑石味甘淡性寒無毒入胃膀胱二經甘草石韋為使惡曾青白膩而嫩者佳研細水飛利小便行積滯逐凝血解燥渴宣九竅通六腑按潔古云滑則利竅不與淡滲藥同時珍曰滑石利竅不獨小便也上能利毛腠之竅下能利精溺之竅多服使人小便多精竅滑脾虛下陷者勿用
