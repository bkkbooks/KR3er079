body:
  text: 卷之一三奇論第一三奇者仙經所謂人有三奇精氣神也聖人治未病則修煉尚矣用冠篇首仿啓玄首敘天真之意也玄玄祕密固不形於紙上而大意則不妨敷布恐為旁門所亂耳附修攝法二十五條久習自有奇驗勿以易而忽之王太僕重次內經移九卷天真論以冠篇首其旨何居有熊氏以絳宮玄府之祕開靈蘭金匱之先分久視而拯夭札安在不桴鼓應耶今談道者牛毛成道者麟角總未夢見內經者也天真論云上古之人其知道者法於陰陽和於術數飲食有節起居有常不妄作勞故能形與神俱而盡終其天年又曰恬淡虛無真氣從之精神內守病安從來復有真人至人聖人賢人之別均之修煉而深淺不齊然精氣與神未有殊者也余因之嗜道詳徵仙典博訪異人幸聞性命之奧獲起沉痼之疴至神奇亦至簡易但明先天祖氣便為入道之門夫是祖氣始於混沌未開伏於無形無象視之不可見聽之不可聞生天生地生人物者也老子曰有物混成先天地生寂兮寥兮獨立而不改周行而不殆可以為天下母吾不知其名字之曰道者也胎息經云氣入身來謂之生神去離形謂之死知神氣者可以長生固守虛無以養神氣神行即氣行神往即氣往若欲長生神氣須注仙經曰人在氣中如魚在水中魚一刻無水即盡人一刻無氣即亡又曰神是性兮氣是命神不外馳氣自定又曰陽氣一分不盡則不死東垣曰氣乃神之祖精乃氣之子氣者精神之根蒂也悟真篇云道自虛無生一氣便從一氣産陰陽玄同子曰人未生時受茲祖氣便能生育此身然則招攝此氣豈不能長生耶白玉蟾曰煉形見性憑君作招氣無門老不禁招之者非口鼻呼吸非津液灌咽非臍內存神非丹田凝抱非心下腎上非兩腎中間非升坎填離非通任會督非陰蹺一關非眉間一穴非泥丸峰頂非湧泉海底非窺中極非守陽根非丹爐烹煉非房中採取故鍾離曰涕唾津精氣血液七般靈物總皆陰若將此物為丹質怎得飛神貫玉京又曰四大一身皆屬陰不知何物是陽精康節先生一口道破云乾遇巽時觀月窟地逢雷處見天根天根月窟間來往三十六宮都是春此明明指出人身天地之正中得訣下手只須一香之頃先天祖氣忽然扯入鼻孔如迎風之狀扯入一次即盜奪一次三日之後當源源而來七日來復百日工畢是斗柄招太陽徑寸混三才之大道也無奈傍門邪術訛傳錯教非徒無益而又害之故袁了凡云隨守一處皆可收心苟失其宜禍害立起若夫虛勞內損痼疾經年雖扁倉神聖望而卻走倘能積氣開關猶可回生起死積氣非呼吸為工開關非搬運為力簡易而無繁賾之苦自然而無勉強之勞氣足則庶氣上騰甘露下灌三關開通百骸暢遂從前受病之根斬刈無遺嗣後真之氣蒸噓不已余雖不敏嘗事於斯以起奇疴雖非久視之大道實為卻病之神工否則與道相失去死不遠而猶冀以草木生之何怪其不相及也王氏首揭天真之旨其在斯乎附修攝法二十五條桑榆子曰精化為氣氣化而神集焉元氣充滿神必備矣憂患動中則知見因而暫虧蓋氣權有不致者耳故曰神能御氣則鼻不失息談紫霄曰神猶母也氣猶子也以神召氣如以母召子劉赤腳云神氣如子母相親只為塵情間隔若去了一分塵情即有一分升降後天氣與先天氣同出而異名先天絪縕於無形後天有形而可見其實一而已矣故曰採先天煉後天相制化作神仙善養氣者行欲徐而穩立欲定而恭坐欲端而直聲欲低而和使此身常在太和元氣中久久自有聖賢氣象呼吸有聲者風也非息也守風則散雖無聲而鼻中澀滯者喘也非息也守喘則結不聲不滯而往來有跡者氣也非息也守氣則勞所謂息者不出不入之義綿綿密密若存若亡心不著境無我無人更有何息可調至此則神自返息自定心息相依水火相媾息息歸根金丹之母丘長春云息有一毫之未定命非己有人身之血百骸貫通及欲事既作撮一身之血至於命門化精以泄夫精者神倚之如魚得水氣依之如霧覆淵不知節嗇則百脈枯槁交接必損腎外雖不泄精精已離宮定有真精數點隨陽之痿而溢出如火之有煙焰豈能復返於薪哉腎中陽氣至子而生夜半子時披衣起坐兩手搓熱一手兜外腎一手掩臍而凝神於內腎久久習之而精旺矣金丹祕訣曰一擦一兜左右換手九九之數真陽不走戌亥二時陰旺陽衰之候一手兜外腎一手擦臍下左右換手各擦八十一半月精固久而彌佳張成子曰臥時坐於床垂足解衣閉息舌拄上齶目視頂門提縮穀道兩手摩兩腎腧各一百二十多多益善極能生精固陽治腰痛每上床時兩足赤肉更番用一手握足一手摩湧泉多至千數少亦百餘能固真去濕十六字訣曰一吸便提氣氣歸臍一提便咽水火相見不拘行住坐臥舌攪華池抵住上齶滿口津生咽下谷谷有聲隨於鼻中吸清氣一口以意目力送至臍下一寸三分略存一存謂之一吸隨將下部輕輕如忍便狀以意目力提起上夾春雙關真至玉枕透入泥丸謂之一呼周而復始咽時有津固妙無津亦谷谷然咽之不拘多寡只要每日毋間久行精神強旺百病不生入房即有采補之功六字訣曰自子至巳六陽時面向東方勿閉窗戶又忌風入解帶正坐叩齒四九攪口中濁津漱煉一二百候成清水即低頭谷谷咽下送至丹田開口念呵字以吐心中毒氣念時耳不得聞呵字聲聞即氣粗反損心氣念畢仰頭閉口將鼻徐吸清氣以補心氣吸時亦不得聞吸聲但呵字令短吸時令長如是六次則心毒散而心元復矣依此式念呼字治脾呬字治肺噓字治肝嘻字治膽吹字治腎並各六次是謂小周黃素四十四方經云夜寢欲閣眼時以手撫心三過閉目微祝曰太靈九宮太乙守房百神參位魂魄和同長生不死塞滅邪凶此隱寢魂之法常能行之魂魄安寧身中三尸常以庚申日録人罪過奏聞上帝減人祿命每遇庚申徹夜不臥三尸不得上奏上尸名彭居中尸名彭質下尸名彭矯臥時叩齒三七左手撫心呼三尸名令不敢為害患停滯者閉息納氣猛送下鼓動胸腹兩手作挽弓狀氣極滿緩緩呵出五七通快即止患感冒者盤足端坐兩手緊兜外腎閉息存氣自尾閭上夾脊透泥丸逐其邪氣低頭屈抑如禮拜狀得汗為度患齒疾者晨醒扣齒四九納氣三口每口呼去脾毒食後必漱潔小解必緊咬永無齒疾患目昏者靜坐閉息垂簾塞兊兩目輪左轉七遍右轉七遍緊閉少時忽大睜開久行為妙患頭眩者靜坐閉息兩手掩耳折頭五七次存想元神逆上泥丸風邪自散心靜則神悅神悅則福生人能化毒性以救死養喜神以延生必去身災兼除人患精欲漏時提氣守泥丸或微呵一二次勿使心氣下從雖有走漏可無大傷切勿子後行房陽方生而頓滅之一度傷於百度食飽徐行摸腹解帶伸腰使食下舒方可就坐飽坐發痔食後曲胸而坐必病中滿怒後勿食食後勿怒醉後勿飲冷飽余勿便臥發宜多梳面宜多擦胸宜常護目宜常運耳宜常凝口宜常閉齒宜常扣氣宜常提津宜常咽濁宜常呼背宜常暖腹宜常摩囊宜常裹肢節宜常搖動皮膚宜常干沐孫真人曰大怒交合成癰疽疲勞入房虛損少子身體常欲小勞流水不腐戶樞不朽運動故也常當內視五臟了了分明勿食一切腦子損人忍小便膝冷成麻忍大便乃成氣痔著濕衣汗衣令人生瘡頭勿向北臥頭邊勿安火爐夜臥魂魘勿燃燈喚之亦勿近身急喚惡夢不可說早起含水向東噴之咒曰惡夢著草木好夢成寶玉凡在家及出行逢疾風暴雨震雷昏霧皆有惡神經過宜入室閉戶靜坐焚香過後乃出方不損人卻病十法心如木石觀四大假合一也煩惱現前以死譬之二也常將不如我者巧自寬慰三也造物勞我以生遇病卻間反生慶幸四也痛苦不適宿業難逃惟歡領受五也室家和睦無交謫之言六也衆生各有病根常自觀察克治七也風露嚴防嗜欲淡薄八也飲食寧節毋多起居務適毋強九也高人良友講開懷出世之談十也病有十不治恣縱惂淫不自珍重一也窘若拘囚無瀟灑趣二也怨天尤人廣生懊惱三也今日預愁明天一年常計百年四也室家聒噪動成荊棘五也聽信禱賽廣行殺戮六也寢興不適飲食無度七也諱疾忌醫攻補妄投八也過服湯藥蕩滌腸胃九也以死為苦難割難捨十也四時調攝法春三月此謂發陳夜臥早起肝旺脾衰減酸增甘節情欲以葆生生之氣少飲酒以防逆上之火正月衣宜下厚而上薄勿驟脫衣勿念犯風夏必飧泄二月宜暖衣令得微汗以散去冬伏邪三月勿處濕地勿露體星宿下夏三月此謂蕃秀夜臥早起心旺肺衰減苦增辛伏陰在內宜戒生冷神氣散越宜遠房室勿暴怒勿當風至秋為瘧勿晝臥勿引飲主招百病四月純陽之月忌入房五月毒月君子齊戒薄滋味節嗜欲黴雨濕蒸宜烘燥衣時焚蒼朮常擦湧泉襪以護足六月勿濯冷勿貪風夜勿納涼臥勿搖扇腹護單衾食必溫暖秋三月此謂容平早臥早起肺旺肝衰減辛增酸收斂神氣禁吐禁汗七月須取爽氣足與腦宜微涼八月勿食姜勿沾秋露九月宜養筋冬三月此謂閉藏早臥晚起腎旺心衰減咸增苦暖足涼腦曝背避寒勿令出汗目勿近火足宜常濯十月屬亥純陰之月一歲發育之功實胚胎於此大忌入房十一月一陽方生遠帷幕省言語十二月禁疲勞防汗出余早歲攻儒讀無言無隱之章便覺疑團膺礙壯年學道頗得真詮洞知不根虛靜者即是邪術晚歲參禪幸遇明眼尊宿壁立萬仞把個沒滋味鐵酸餡劈頭拈示未嘗落草盤桓但與本分草料忽爾轉身豁開向上大機大用開口不在舌頭擎茶受食何處不垂指示乃知夫子無言無隱和盤托出老氏虛極靜篤只證教家蓋嘗統而論之三教同一心地法門孔子多從倫常日用處提撕不壞世間相而談實相者也老子長生黃白男女之說悲世貪執順其所欲漸次導之世尊四十九年說法猶是隨人顛倒至拈花一著方稱本懷直下一刀兩段坐斷千聖頂𩕳是知三教聖人心法雖同而直捷痛快未有妙於禪宗者也醫宗論第二夫醫也者近之治身消患於未兆遠之治人廣惠於無窮然非研求靈素玩味諸家雖至敏者不能闢無師之智也夫病者聽醫猶聽神明醫誠良而聽之宜也今醫師遍天下而術未工病者疑信半而姑聽命焉又以好全惡危之心待之病非在皮膚效期於旦夕旦不效旦更夕不效夕更而醫始不能盡其技矣故天下不尊醫醫亦不自尊急而求醫醫亦急而求術古之藝精而試今之藝試而精古之人法治病今之人病合法醫固如此人於何尤君之慨然以仁壽為己任非博綜無由也昔在神農闢本草四卷察寒熱溫平分君臣佐使開萬世之聾聵救斯民之夭枉黃帝內經十八卷上窮天紀下極地理遠取諸物近取諸身闡發玄機弘開壽域醫師未能諳熟便為無本庸流弟徵辭奧義非淺衷者敢窺也商有伊尹作湯液本草明輕清重濁晰陰陽升降及十二經表裡之宜制方之祖也秦越人成難經八十一卷為有熊之勳臣開後學之師表惜其誤以命門一穴指為右腎考之明堂銅人諸經灼然見智者之一失也漢之倉公識見超異史稱其神而迥風沓風未詳其旨長沙張仲景著傷寒論二十二篇三百九十七法一百一十三方暨金匱玉函等經屬傷寒之鼻祖真濟世之慈航若法奧未詳而妄輕投治比之操刃何以異焉至憤激之說以不服藥為中醫今讀者酸鼻矣魏有華他針灸湯丸應手取效刳腹煎腸神在百端內照圖說其遺意也晉有王叔和脈經十卷分三部九候辨人迎氣口闡靈素之微集諸家之要奈何高陽生以僞訣竊名禍蒼生也久矣皇甫謐獨得抒微渺直闖軒岐著甲乙針經精確可徵曠越千古齊有諸澄謂廣嗣祈男可以必得師尼寡婦療各不同頗著卓識至謂女人脈反於男以心肺列於兩尺此其謬也隋有巢元方撰病源論五十卷條分縷析得未曾有然但詳風寒不及濕熱毋乃偏乎楊上善以太素名家徵休徵咎幾於神靈而還按內經終無此旨意其神於風鑑假以託名耳全元起內經訓解即非字字印泥而深心體會已得大旨宜當時以為得則生失則死也唐有孫思邈千金方三十卷脈經一卷論粗工禍人至為憤切用心仁厚何以加焉王啓玄天元玉冊三十卷玄珠十卷照明隱旨三卷內經注解二十四卷推運氣之微窮經絡之理靡有闕遺亦一時之傑也宋有錢乙著傷寒指微嬰孩雜論挾內經之祕分五臟之方謂肝挾相火有瀉而無補腎為真水有補而無瀉大哉斯言獨發奧旨借其遺書散墜未可多見也龐安常立言精邃述人迎氣口在手在喉上下齊等引繩曰平過勝即病而有三陰三陽之分二十年晦蝕之旨一旦照明豈曰小補金之成無己祖述長沙詳加注腳著傷寒論明理論庶幾博洽精詳識超辭達然未免隨文順釋其於分別較正實多闕略劉完素撰述六書發明亢制之理洞如觀火然偏主於熱豈能盡六氣之變乎遂令後世喜用寒涼伐天和而罔悟伊誰之咎也潔古張元素洞徹病機活潑施療嘗言運氣不齊古今易轍舊方新病難相附合仁人之言其利甚溥拘方之士庶有悟焉憾其書多不傳無從私淑耳元季李東垣發明內傷極類外感實有分別而以土為萬物之母多注意於扶脾確然元本曠古未發之旨也張子和儒門事親惟主汗吐下三法當固有起死之功誤即有傷生之慘是惟氣強者宜之稍挾虛者在所痛禁大抵貧賤之人合用此法富貴之人腑臟柔薄可不重為之慮耶王好古著元戎十卷大法三卷仲景詳辨傷寒辨惑活人節要湯液本草此事難知癍疹論光明論標本論等書非一代大儒儔能辨此羅天益潛心篤學撰衛生寶鑑二十四卷亦醫林之白眉也吳恕以傷寒頭緒繁多括為歌訣名曰指掌令學者無高深之嘆良有裨也隱君王圭幼壯至老分款調攝五痰諸飲悉究精詳號為泰定養生論方法神奇至今賴之丹溪朱震亨著格致餘論局方發揮附余心法等書謂陽易於動陰易於虧獨重滋陰降火蓋補東垣之未備也後世不知其故妄意其殿四家之末後集諸氏之大成群然宗法輒以寒涼損真此非丹溪之誤不善學者誤丹溪也又言六氣之中暑也燥也火也熱居其半獨不思寒也濕也風也冷亦居其半耶倪惟德論方論證靈通變化讀啓微緒論而知敕山老人非常人也滑伯仁診家樞要十四經發揮本草會韻深心特見殊可嘉尚王履學究天人文章冠世有溯洄集傷寒考諸刻膾炙人口更有鉤玄韻繞二書則未之見也顧其真書淪沒而脈訣鈴法僞書滿世豈天不欲使斯民躋於壽域耶戴起宗究內經之奧抒運氣之旨慨脈訣誤人起而正之有德醫門非淺鮮矣近世名家如節庵陶華著書六種邃究傷寒良有苦心獨其畏仲景峻方輒以數方代之則亦登堂而未能入室者矣節齊王綸名醫雜著以二陳療痰止宜於濕而老痰者不合也其老痰丸方真出獨創惜夫過謂參能殺人虛勞禁用斯言一出印定後人眼目至今膠執其說互相傳戒而虛虛之禍曷可勝言向非李瀕湖力挽其訛幾何不使虛勞之症坐而待斃乎薛立齊敏而多聞謂十三科一理慨外科固執成方不窮病本特發內外合一之旨又以風會不齊今人虛薄痛戒寒涼多行溫補拯救絶靈驗若桴鼓著述計十六種誠邇來名醫之冠而多功於先哲後昆者也歷考前代醫籍之傳者五百九十六部一萬有九十二卷而吾熙朝之彥續有萬餘卷不能枚舉茲特述其尤者亦說約之意也倘眼孔未富執一得以自封章名未融泥筌蹄而多滯則於衛生博濟之道隔去萬重司命之謂何而甘為庸下也方且慚汗無地而尚欲取於天下其可得耶先天根本論第三夫玄黃未兆天一之水先生胚體未成兩腎之元先立仙經曰借問如何是玄牝嬰兒初生兩腎未有此身先有兩腎故腎為臟腑之本十二脈之根呼吸之主三焦之源而人資之以始者也故曰腎水者先天之根本也而一點元陽則寓於兩腎之間是為命門蓋一陽居二陰之間所以位乎北而成乎坎也人非此火無以運行三焦腐熟水穀內經曰少火生氣仙經曰兩腎中間一點明逆為丹母順為人夫龍潛海底龍起而火隨之元陽藏於坎府運用應於離宮此生人之命根也乃知陽火之根本於地下陰火之源本於天上故曰水出高原又曰火在水中夫水火者陰陽之徵兆天地之別名也獨陽不生孤陰不長天之用在於地下地之用在於天上則天地交通水火混合而萬物生焉古之神聖察腎為先天根本故其論脈者曰人之有尺猶樹之有根枝葉雖枯根本將自生傷寒危篤寸口難稽猶診太溪以卜腎氣夫精也者水之華池神倩之如魚得水氣依之如霧覆淵方其為嬰孩也未知牝牡之合而勃然峻作精之至也純純全全合於天方溟溟清清合於無淪年十六而真精滿始能生子精破之後乾破而為離真體已虧不知節嗇則百脈空虛不危何待世有以固精采補者是大不然男女交接必擾其腎外雖不漏精已離宮有真精數點隨陽之痿而溢出如火之有煙焰豈能復返於薪哉是故貴寡欲然損精傷神是非一端若目勞於視精以視耗耳勞於聽精以聽耗心勞于思精以思耗體勞於力精以力耗隨事而節之則精與日積矣是故貴節勞腎司閉藏肝主疏泄二臟皆有相火而其繫上屬於心心君火也怒傷肝而相火動則疏泄者用事而閉藏者不得其職雖不交合精已暗耗矣是故貴息怒酒能動血飲酒則身面俱赤是擾其血也數月不近色精已凝厚一夜大醉精隨薄矣是故宜戒酒內經曰精不足者補之以味然膏粱之味未必生精恬淡之味最能益腎洪範論味而稼穡作甘世間之物惟五穀得之味正淡食五穀大能養精吳子野云芡實本溫平不能大益人而謂之水中丹者何也人之食芡也必枚齧而細嚼之未有多嘬而亟咽者也舌頰齒唇終日囁嚅而芡無五味腴而不膩是以致玉池之水轉相灌注積其功力雖過乳石可也以此知人能淡食而徐飽者大有益於脾腎經曰胃為水穀氣血之海化榮衛而潤宗筋又曰陰陽總宗筋之會而陽明為之長故胃強則腎克而精氣旺胃病則精傷而陽事衰也靈樞曰生之來謂之精此先天元生之精也素問曰食氣入胃散精於五臟此水穀日生之精也然日生之精皆從元精所化而後分布其臟盈溢則輸之於腎故曰五臟盛乃能瀉若飲食之精遇一臟有邪則一臟之食味化之不全不得與元精俱藏而時自下矣故腎之陰虛則不藏肝之陽強則氣不固若遇陰邪客於竅與所強之陽相感則精脫而外淫矣陽強者非真陽之強乃肝之相火強耳夫五臟俱有火惟相火之寄於肝者善則發生惡則為害獨甚於他火其陰器既宗筋之所聚乃強於作用皆相火充其力也若遇接內得陰氣與合則三焦上下內外之火翕然而下從百體玄府悉開其滋生之精盡會於陰器以躍出豈止腎所藏者而已哉任恭惠公年老彌健或問其故曰曾讀文選石韞玉而山輝水含珠而川媚於斯二語悟得葆精之道故足於精者百疾不生窮於精者萬邪蜂起先哲洞窺根本力勉圖全遇症之虛者亟保北方以厚生命之根其於水火之間又有分別水不足者壯水之主以制陽光六味丸是也火不足者益火之元以消陰翳八味丸是也只千年力方剛尺脈獨實者微加炒枯知母黃柏以抑其亢炎昧者以為滋陰上劑救水神方不問虛實而概投之不知知母多則腸胃滑黃柏久則腸胃寒陽氣受賊何以化營衛而潤宗筋將髓竭精枯上嘔下泄而幽潛沉冤尚忍言哉此皆守河間有熱無寒之論丹溪陽常有餘之說貽禍如此其烈耳致求正録云劉朱之言不息則軒岐之澤不彰誠斯道之大魔亦生民之厄運也雖其言未免過激然補偏救弊為後學頂門下針良有苦心也古之至人知金為水母氣為水源坎可填離舌水為活綿綿納咽汩汩有聲會崑崙峰頂山澤氣通則水源所發混混乎不捨晝夜水精所奉洋洋乎為露為淋故知氣即水水即氣因以明火即水水即火也水中有火水出高原之義不亦彰且著乎後天根本論第四夫人㘞地一聲之後命曰後天而後天之根本脾胃是也脾胃屬土土為萬物之母故易曰至哉坤元萬物資生經曰脾胃者倉稟之官五味出焉又曰食入於胃散精於肝淫氣於筋濁氣歸心淫精於脈脈氣流經氣歸於肺飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也是知水穀入胃灑陳於六腑而氣至焉和調於五臟而血生焉行於百脈暢於四肢充於肌肉而資之以為生者也故曰安穀則昌絶谷則亡一日不食則飢七日不食則腸胃竭絶而死矣人之有脾胃猶兵家之有餉道也餉道一絶萬衆立散脾胃一敗百病難施上古聖人見土為後天之根本故其著之脈者曰四時皆以胃氣為本有胃氣則生無胃氣則死是以傷寒當危困之候診衝陽以察胃氣之有無衝陽應手則回生有日衝陽不應則坐而待斃矣東垣先生深窺經旨獨著脾胃論以醒提聾聵其言胃中元氣盛則能食而不傷過時而不飢脾胃俱旺能食而肥脾胃俱虛不能食而瘦者胃伏火邪於氣分則能食脾虛則肌肉削也七情戕其內六氣攻其外皆足以致虛惟飲食與勞倦兩端其關尤巨經曰飲食自倍腸胃乃傷又曰水穀之寒熱感則害人六腑夫飲者水也無形之氣也經曰因而大飲則氣逆或為喘咳或為飲癖或為水腫或為嘔吐之類食者物也有形之血也經曰因而飽食經脈橫解腸癖為痔或為脹滿或為積聚或為諸痛或為吐利之類此所謂飲食傷也經曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱又曰勞則氣耗勞則喘息汗出內外皆越故氣耗矣有所勞倦皆損其氣氣衰則虛火旺旺則乘脾脾主四肢故困熱無氣以動懶於語言動作喘乏表熱自汗心煩不安此所謂勞倦傷也蓋人受水穀之氣以生所謂清氣營氣衛氣皆胃氣之別名也胃為水穀之海五臟六腑皆受灌輸若起居失度飲食失節未有不傷脾胃者也脾胃一傷元氣必耗心火獨炎心火即下焦陰火心不主令相火代之火與元氣勢不兩立一勝則一負陰火上衝氣高而喘身熱而煩脾胃之氣下陷穀氣不得升浮是春生之令不行無陽以護其營衛乃生寒熱經曰勞者溫之損者溫之又曰溫能除大熱大忌苦寒反傷脾胃東垣於勞倦傷者立補中益氣湯純主甘溫兼行升發使陽春一布萬物敷榮易老於飲食傷者立枳朮丸一補一攻不取速化但使胃強不復傷耳此皆炎黃之忠藎後進之標的也羅謙甫善發其旨故云脾虛食少弗可攻伐補之自能食進是則更有法焉東方之仇木宜安恐木實則侮土而厥張也西方之子金宜顧恐子虛則竊母以自救也若夫少火實為生氣之元中央之土虛則補其母故許學士云腎虛不能食化譬如釜中水穀下無火力其何能熟耶嚴用和云房勞過度真陽衰弱不能上蒸脾土以致飲食不消須知補腎腎氣若壯丹田火充上蒸脾土土溫自治矣愚嘗統而論之脾胃者其坤順之德而有乾健之運故坤德或慚補土以培其卑監乾健稍弛益火以助其轉運此東垣謙甫以補土立言學士用和以壯火垂訓蓋有見乎土強則出納自如火強則轉輸不怠火為土母虛則補其母治病之常經也每見世俗一遇脾胃虛滯便投曲卜楂芽香砂枳朴甚而用黃連山梔以為脾胃良方而夭枉者更僕難數矣不知此皆實則瀉子之法因脾胃有積聚有實火元氣未衰邪氣方張用破氣之劑以瀉肺金主氣之臟誠有功效若虛而伐之則愈虛虛而寒之遏真火生化之元有不敗其氣而奪其谷乎最可異者以參朮為滯悶之品畏之如砒鴆獨不聞經云虛者補之勞者溫之又云塞因塞用乎又不聞東垣云脾胃之氣實則枳實黃連瀉之虛則白朮陳皮補之乎又不聞丹溪云實火可瀉芩連之屬虛火可補參耆之屬乎且飲食初傷元氣未敗或有濕熱黃連其選也若病稍久元氣必虛陽氣不充陰寒為祟反服黃連無異於入井而反下石耳經曰飲食勞倦損傷脾胃始受熱中末傳寒中則始宜清熱終宜溫養灼然有辨故能辨虛實善識寒溫醫之能事竟矣更有說者聖人治未病不治已病則居恆無病之時便當早為之所觀既濟之象曰君子以思患而預防之隨之象曰君子以嚮晦入晏息頤之象曰君子以節飲食豈非明飲食勞倦之足以傷生耶養生家知勞倦之禍人也亟於養氣行欲徐而穩言欲定而恭坐欲端而直聲欲低而和常於動中習靜使此身常在太和元氣中久久自有聖賢氣象長生祕典曰內勞神明外勞形質俱足夭折惟房勞較甚為其形與神交用精與氣均傷也又曰久立久坐久行久臥皆能傷人以上皆防勞倦元氣勝穀氣其人瘦而壽穀氣勝元氣其人肥而夭泰西水曰飲食有三化烹煮糜爛名曰火化細嚼緩咽名曰口化蒸變傳送名曰胃化二化得力不勞於胃醫說云飲食到胃俱以溫和為妙不問冷物熱物但細嚼緩咽自然溫矣祕典曰食飽之後解帶摸腹伸腰徐行作噴以通其祕用呵以去其滯令飲食下行方可就坐飽坐發痔曲胸而坐成中滿醉後勿飲冷飽余勿便臥食後勿怒怒後勿食冷熱之物不宜互食尊生編云飲以養陽食以養陰食宜常少亦勿令虛不飢強食不渴強飲則脾勞發脹朝勿令飢夜勿令飽淡食則多補五辛善助火調食法云寧少毋食多寧飢無食飽寧遲毋食速寧熱毋食冷寧零毋食頓寧軟毋食硬此六者調理脾虛之要法也以上皆言飲食語云修養不如節勞服藥不如忌口斯言雖鄙頗切理要誠能於此精勤則土強而臟腑俱安後天之根本不損營衛沖和有天命矣辨妄論第五蓋聞診候者通神達微之事也而登高自卑必取諸脈象惜高陽生僞訣訛傳久汩於陰霾之域雖闢之者代不乏人奈習之者恬不知改余欲起而正之固知微塵無足嶽之能然天下萬世豈無明眼余言或不足信將內經亦不足信耶今以內經脈法為圖據經言以正其訛炳若曰星則徵無不信吾知免夫尺內兩旁則脅季也尺外以尺外以候腎尺裡以候腹中附上在外以候肝內以候膈右外以候肺胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中此內經之候法也府不及膽者寄於肝部也不及大小腸膀胱者統於腹中也高陽生以大小腸列於寸上三焦配於左尺命門列於右尺膻中置而不言男女易位死數差訛形脈不分圖象妄設不可不為之辨也夫寸主上焦以候胸中關主中焦以候膈中尺主下焦以候腹中此生身之定位古今之通論也大小腸皆在下焦腹中僞訣越中焦而候之寸上有是理哉滑伯仁以左尺主小腸膀胱前陰之病右尺主大腸後陰之病可稱千古隻眼僞訣之誤特因心與小腸為表裡肺與大腸為表裡不知經絡相為表裡診候自有定位何可混耶叛經者一也金匱真言篇曰肝心脾肺腎五臟為陰膽胃大腸小腸三焦膀胱六腑為陽此止十一經耳則手厥陰一經竟何在乎靈蘭祕典篇曰心者君主之官神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉脾胃者倉廩之官五味出焉大腸者傳道之官變化出焉小腸者受盛之官化物出焉腎者作強之官使巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣此以膻中足十二臟之數是則配手厥陰者實膻中也及靈樞敘經脈又有胞絡而無膻中然曰動則喜笑不休正與喜樂出焉之句相合夫喜笑者心火所司則知其與心應也獨膻中稱臣使者君主之親臣也由是胞絡即為膻中斷無可疑膻中以配心臟自有確據乃僞訣竟不之及則手厥陰為虛懸之位矣叛經者二也靈樞曰上焦出於胃上口並咽以上貫膈而布胸中中焦亦並胃中出上焦之後泌糟粕蒸津液化精微而為血下焦者別回腸注於膀胱而滲入焉水穀者居於胃中成糟粕下大腸而成下焦又曰上焦如霧中焦如漚下焦如瀆由是則明以上中下分三焦矣僞訣列於右尺不亦妄乎又曰密理厚皮者三焦厚粗理薄皮者三焦薄又曰勇士者三焦理橫怯士者三焦理縱由是則明有形象矣僞訣以為無形不亦妄乎叛經者三也心肝脾肺俱各一候惟腎一臟而分兩尺候者為腎有兩枚形如豇豆分列於腰脊之左右僞訣以左為腎右為命門考諸明堂銅人等經命門一穴在督脈第十四椎下陷中兩腎之間蓋一陽居二陰之中所以成乎坎也且脈之應於指下者為有經絡循經朝於寸口內經並無命門之經絡何以應診而列之右尺乎叛經者四也夫男女之異惟莖戶精血胞門子戶耳若夫脈象自有定位如左尺水生左關木左關木生左寸火君火付權於相火故右尺火生右關土右關土生右寸金五行循序相生萬古不易之理僞訣乃曰女人反此背看之甚且以右尺候心右尺候肺而五行之理紊亂極矣叛經者五也經曰腎絶四日死肝絶八日死心絶一日死肺絶三日死脾絶十二日死乃僞訣云四十日止一臟絶卻後四年多命沒夫人豈有一臟既絶尚死四年者乎叛經者六也內經曰形氣有餘脈氣不足死脈氣有餘形氣不足生仲景曰脈病人不病號曰行尸以無王氣卒運僕不知人則死人病脈不病名曰內虛雖困無苦而僞訣云健人脈病號行尸病人脈健亦如之是脈病與人病無別矣叛經者七也脈理淵微可以神領難以言求而況可以圖示乎如大小長短固可圖也而遲數結促皆以至數為名豈可得而圖乎勉強牽合幾堪捧腹叛經者八也夫是八者特舉謬之尤耳若按字而求其疵更僕難數然蔡西山辨之於前戴同父正之於後無待贅舉願後之學者詳味經言翻其錯誤使千年晦蝕之旨一旦昭明指下井然而證治無惑斯民無夭折之嗟矣審象論第六夫證之不齊難以枚舉而盡欲以指下得其情則戛戛乎難之矣先哲有言曰脈有神機微而莫顯胸中了了指下難明況胸中昧昧而思指下全生庸可幾乎脈固有象不能比類以晰其似對比以別其殊辨兼至以定名察平脈以昭治分六氣以測證按運政以觀應審真臟以知亡則呫嗶雖勤而臨視莫適輕言談笑亂說是非御人口給言不由衷試一思之真堪愧絶余是以不揣鄙陋略陳概云此類者所以明相類之脈洪與虛皆浮也浮而有力為洪浮而無力為虛沉與伏皆沉也沉脈行於筋間重按即見伏脈行於骨間重按不見必推筋至骨乃可見也數與緊皆急也數脈以六至得名緊則不必六至惟弦急而左右彈狀如切緊繩也遲與緩皆慢也遲則三至極其遲慢緩則四至徐而不迫實與牢皆兼弦大實長之四脈也實則浮中沉三取皆然牢則但於沉候取也洪與實皆有力也洪則重按少衰實則按之亦盛也革與牢皆大而弦也革則浮取而得牢則沉取而見也濡與弱皆細小也濡在浮分重按即不見也弱主沉分輕取不可見也細與微皆無力也細則指下分明微則似有若無模糊難見矣短與動皆無頭尾短為陰脈其來遲滯動則陽脈其來滑數促結澀代皆有止者也數時一止為促緩時一止為結往來遲滯似止非止為澀動而中止不能自還止有定數為代對舉者所以明相反之脈浮沉者脈之升降也遲數者脈之急慢也滑澀者脈之通滯也虛實者脈之剛柔也長短者脈之盈縮也洪微者脈之盛衰也緊緩者脈之張弛也促結者脈之陰陽也濡弱者脈之窮於進退者也芤弦者脈之見於盛衰者也經曰前大後小前小後大來疾去徐來徐去疾去不盛來反盛去盛來不盛乍大乍小乍長乍短乍數乍疏是又二脈之偶見者也兼至者合衆脈以成一脈也浮而細且軟為濡沉而細且軟為弱浮而極細極軟似有若無為微浮而且大且弦且長之合為革沉而且大且弦且長之合為牢且大且長浮中沉皆有力為實平脈者各部之本脈也足厥陰肝沉而弦長足少陰腎沉實而滑足太陰脾中和而緩足少陽膽弦大而浮足陽明胃浮長而澀足太陽膀胱洪滑而長手少陰心洪大而散手太陰肺浮澀而短手厥陰心胞絡浮大而散手少陽三焦洪大而急手陽明大腸浮短而滑手太陽小腸洪大而緊時令者四時之變脈與之應也十二月大寒至二月春分為初之氣厥陰風木主令經云厥陰之至其脈弦春分至小滿為二之氣少陰君火主令經云少陰之至其脈鉤小滿至六月大暑為三之氣少陽相火主令經云少陽之至大而浮大暑至八月秋分為四之氣太陰濕土主令經云太陰之至其脈沉秋分至十月小雪為五之氣陽明燥金主令經曰陽明之至短而澀小雪至十二月大寒為六之氣太陽寒水主令經曰太陽之至大而長以平治之紀為例若太過之紀其氣未至而至從節前十三日為度不及之紀其氣至而未至從節後十三日為度太過之歲從左尺浮分起立春不及之歲從左關中分起立春依次而推之此六氣至理而方書所未發者必於平旦陰氣未散陽氣未動飲食未進言語未吐之時清心調息逐部細究則時令之病可以前知診得六部俱平則已若有獨大獨小獨浮獨沉獨長獨短與各部不同依圖斷之無不驗者假如左關中候獨弦大已知雨水後驚蟄邊有風熱之病蓋弦主風而大主熱也且左關又為風木之令故也如右尺沉分脈獨緩滯而實大已知芒種後夏至邊有濕熱之病蓋緩滯主濕實大主熱也若緩滯虛大乃濕熱相火為患蓋緩滯為濕而虛大為相火也且在沉分沉亦主濕又在相火之位故也久病之人六脈俱濁滯惟右寸中候脈得從容和緩清淨無滯已知霜降後立冬邊必愈其餘仿此而推之百不一失也夫按政運者所以明不應之脈蓋不應者沉細也反其疹則見矣凡值此不應乃歲運合宜不必求治若誤治之反伐天和土運為南政土位居中面南行令故也其餘四運以臣事之北面受令故為北政甲己二年為土運南政如運少陰司天則兩寸不應厥陰司天則右寸不應太陰司天則左寸不應少陰在泉則兩尺不應厥陰在泉則右尺不應太陰在泉則左尺不應乙丙丁戊庚辛壬癸八年皆為北政如遇少陰司天則兩盡不應厥陰司天則右尺不應太陰司天則左尺不應少陰在泉則兩寸不應厥陰在泉則右寸不應太陰在泉則左寸不應如尺當不應而反浮大寸當浮大而反沉細寸當不應而反浮大尺當浮大而反沉細是謂尺寸反經曰尺寸反者死如右當應而反浮大左當浮大而反沉細左當不應而反浮大右當浮大而反沉是謂左右交經曰左右交者死真臟者所以明不治之脈蓋人以胃氣為本胃氣脈者應手中和意思欣欣難以名狀是也太過不及者病但得真臟脈不得胃氣者死經曰真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死真脾脈至弱而乍疏乍數色黃青不澤毛折乃死真肺脈至大而虛如以毛羽中人膚色白赤不澤毛折乃死真腎脈至搏而絶如指彈石辟辟然色黃黑不澤毛折乃死七絶脈一曰彈石如指彈石在筋肉間辟辟然硬尋即散者腎絶也二曰雀喙如雀喙食連連搏指忽然止絶良久復來肝絶也三曰屋漏如屋殘漏下良久一滴胃絶也四曰解索如索之解指下散亂無復次序乍疏乍數脾絶也五曰蝦游如蝦之遊在於皮膚始則冉冉不動少焉而去久之忽然一躍大腸絶也六曰魚翔如魚之翔本不動而末強搖似有似無心絶也七曰釜沸如釜湯沸在於皮膚有出無入湧湧如羹上波肺絶也宣藥論第七附七方十劑慨自用藥之弊也始於執流而忘源信方而遺理將有劑已大謬猶懸懸而計效方或偶當反忽忽而自疑病已藥傷尚嫌處劑之輕功本將臻乃欲更端以治泥成方之驗不解隨人活潑膠章句之跡未能廣會靈通如斯愚昧皆由格理之功疏而尋源之學淺也王太僕曰粗工褊淺學未精深以熱攻寒以寒療熱治熱未已而冷疾已生攻寒日深而熱病更起熱起而中寒尚在寒生而外熱不除欲攻寒則懼熱不前欲療熱則思寒又止豈知臟腑之源有寒熱溫涼之主哉夫藥有君臣佐使逆從反正厚薄輕重畏惡相反未得靈通而慢然施療許學士所謂獵不知兔廣絡原野術亦疏矣君為主臣為輔佐為助使為用制方之原也逆則攻從則順反則異正則宜治病之法也必熱必寒必散必收者君之主也不宣不明不受不行者臣之輔也能受能令能合能公者佐之助也或擊或發或劫或開者使之用也破寒必熱逐熱必寒去燥必濡除濕必泄者逆則攻也治驚須平治損須溫治留須收治堅須潰者從則順也熱病用寒藥而導寒攻熱者必熱如陽明病發熱大便硬者大承氣湯酒製大黃熱服之類也寒病用熱藥而導熱去寒者必寒如少陰病下利服附子乾薑不止者白通湯加人尿豬膽之類也塞病用通藥而導通除塞者必塞如胸滿煩驚小便不利者柴胡加龍骨牡蠣之類也通病用塞藥而導塞止通者必通如太陽中風下利心下痞硬者十棗湯之類也反則異也治遠以大治近以小治主以緩治客以急正則宜也輕清成象重濁成形清陽發腠理濁陰走五臟清中清者榮養於神濁中濁者堅強骨髓辛甘發散為陽酸苦湧泄為陰氣為陽氣厚為陽中之陽氣薄為陽中之陰薄則發泄厚則發熱味為陰味厚為陰中之陰味薄為陰中之陽薄則疏通厚則滋泄親上親下各從其類也畏者畏其制我不得自縱惡者惡其異我不得自如畏惡之中亦可相成在因病制方輕重多寡之間也至於相反兩仇不共然大毒之病又須大毒之藥以劫之雖相反之中亦有相成之妙而謂神化在是顧良工用之耳然非以博洽之才運其神靈之識將見驚眩妄錯靡知統宗匪肆即拘曷中款會夫然後智盡能索只計蓄方若曰方非吾方上古聖人之方異人祕密之方人即不信醫能不信聖人與異人哉至有祕而不宣雖父子不相受籲何其愚也不知天有不同者運氣異也地有不同者方宜異也人有不同者稟畀異也時有不同者風會異也境有不同者貴賤異也病有不同者標本異也方果可執乎哉奈何舍至靈至變之理而就不靈不變之方也此無他初得之聞而神奇過告繼試之用而功效偶臻遂以為無逾其右獨不計方果若斯之奇則上古聖賢千言萬卷只為贅余而今之學者神聖工巧一切可廢矣不知方之為言仿也仿病而有方也其將立也因是病而後成融通不滯其既立也非是病則勿用確然難移是以素問無方雖經亦無方非無方也謂仿為活法也漢世才有方為備於仿也令奇方療疾可以發無不中則昔者軒岐扁倉神靈之智慈濟之仁豈不及此何不每一病隻立一方使後之人彰明顯者用無不當而乃廣為昭析多立交詞使後人紛賾難窮效無十全哉雖然方不可泥亦不可遺倘藉口變通而古法未諳有心立異而審症未詳去拘方之失未有以大相懸也而其過有五夫子母虛實鬼邪微正治病之本也明此之故病在上而治反在下病在下而治反在上病同而藥異病異而藥同症端蜂起而線索並然變現多危而執持不亂此旨未達逐症尋求既治其上又攻其下既療其彼復顧其此本之不揣藥無精一如著百家衣為識者笑救頭救腳之譏所不免已過一也氣血虛實寒熱邪正灼然明辨則益心之陽寒亦通行強腎之陰熱之猶可發舒陽氣以生陰精滋養陰精以化陽氣或養正而邪自除或驅邪而正始復或因攻為補或借補為攻苟臨症狐疑則進退交戰姑以輕和之劑冀有萬一之功非有直入之兵收其捷得之效則兩騎之誚所不免已過二也或讀本草類方刻意求簡以為精專不知制之小者君一臣二制之大者君一臣三佐九聖人初無從簡之心惟是合宜以治耳仲景東垣共稱醫聖而用多用寡兩不相侔王節齊謂東垣如韓信將兵多多益善丹溪不過能捋十萬不敢效其多是以多寡分優劣也將置仲景於何地耶故得其要者多亦不雜不得其要少亦不專不究確然之理而以品味多寡為衡是崇末而遺本已過三也未能宏博炫然自矜好為奇僻不可一世原其立異之初心不過思假此以要尊信耳究也治而弗績反深深困其尊信果安在哉過四也仲景云觀今之醫各承家技終始順舊省疾問病務在口給相對斯須使處湯劑動數發息不滿五十明堂闕庭盡不見察夫欲視死別生實為難矣如斯鹵莽且圖速效則寒熱溫涼行散補瀉能無當乎不知藥無次序猶兵無紀律雖有勇健適足僨事已過五也省此五過務圖去之惟當尚友千古毋多自遜以阻進則天地之理得而見垣非難爾顧天下惕然於生死之故慨然為窮原之學則四家可五而軒岐且至今存矣七方大小緩急奇偶復大方之說有二病有兼症不可以一二味治者宜君一臣三佐九品味數多故曰大病有在身半以下而遠者處劑宜多而品味宜少以分兩數多故亦曰大小方之說有二病有在心肺以上而近者宜分兩微而徐徐呷之病有無兼症可以一二味治者宜君一臣二之小方緩方之說有六病有在胸膈宜甘以緩之有緩則治其本治本者優遊漸漬不可責效旦夕有丸以緩之之緩蓋比湯散氣力難化而宜行遲也有品味衆多之緩蓋藥味衆則各不得自騁如萬病丸七八十味互相拘制有無毒治病之緩蓋性無毒則功自緩有氣味薄之緩蓋氣味薄則主用在上治上者制以緩緩則氣味薄也急方之說有六心腹暴痛溲便不通用備急丹之類是也中風牙關緊閉漿粥不下用急風散之屬有湯散蕩滌之急蓋湯主蕩而散主散如風雨之疾迅也有藥性有毒之急蓋有毒則能上湧下泄可以奪病之大勢也有氣味厚之急蓋氣味厚則直走於下也有治標之急擇其甚者急救之也奇方之說有二有獨用一物之奇有一三五七九之奇如君一臣三亦奇制也故宜下不宜汗偶方之說有三有兩味相配之偶有兩方相合之偶有二四六八十之偶如君二臣四亦偶制也故宜汗不宜下復方之說有三有二方三方相合之復如桂枝二越婢一湯有分兩勻平之復如胃風湯各等分也十劑宣通補瀉輕重滑澀燥濕宣者升而上也內經曰高者因而越之即湧劑也通者流通之義也凡壅滯閉結非通劑弗愈補者五臟各有補法夫虛有六者表裡上下陰陽也經曰形不足者補之以氣精不足者補之以味須達症之所起分經療為善瀉之義與通仿但不專主於下如黃芩瀉肺黃連瀉心黃柏瀉腎龍膽瀉肝石膏瀉脾之類經曰實者瀉之凡清利之劑總名曰瀉輕者言藥之性也如風寒之邪始自表入頭痛身熱腰脊強內經曰宜輕劑以揚之本草曰輕可去實宜麻黃葛根升麻之屬重者亦藥之性也如久病咳嗽痰涎不利形羸不可峻攻用硃砂金箔水銀沉香之屬內經曰重者減之貴其漸也滑者取其潤也周禮曰滑以養竅如麻仁郁李仁冬葵子滑石之類澀者收之義也如牡蠣白礬龍骨粟殼之屬燥者取其去濕也如久瀉澄清宜姜附以燥之虛濕宜用黃連大黃燥之濕者與滑義相類而少有不同滑兼通意而濕則但於濡經曰血主濡之當歸地黃之屬運氣論第八當讀內經至天元紀論七篇推申運氣玄蘊難窺未當不廢書三嘆也夫是天地之綱紀變化之淵源非通於大易洪範曆元律法之說者其敢橫心以解矢口而談哉無惑乎當今之人置而弗講久矣先哲有言曰不明五運六氣檢遍方書何濟故弗醫則可業已志醫反掌生殺能不猛畏博學多聞沉思力索神將通我幸勿憚焉然知天知地先於知人丹溪曰先識病機變化處治純攻運氣恐流於馬宗素之徒妄謂某生人於某日病於其經用其藥某日當瘥某日當危悖亂經旨涉於怪僻茲特撮其大綱提其切要令學者欣其簡便為行遠登高之自至於窮神達變則內經而下代有發明其可以是為畫耶五運者金木水火士也六氣者風寒暑濕燥火也合十干為五運如甲己合為土運乙庚合為金運丙辛合為水運丁壬合為木運戊癸合為火運是也對十二支為六氣如子與午對俱為君火醜與未對俱為濕土寅與申對俱為相火卯與酉對俱為燥金辰與戊對俱為寒水巳與亥對俱為風木是也運乃五年一周氣則六期環會五運有太過有不及有平運有大運有主運有客運太過者甲丙戊庚壬五陽干也不及者乙丁己辛癸五陰乾也太過之年大寒前十三日交名曰先天不及之年大寒後十三日交名曰後天平運者司天與運同氣也或太過而司天克氣或不及而年支相合謂之歲會或月干與之相符或交初氣日乾時干與之相合謂之干德符值之者物生脈應無相後先皆平運也正大寒日交名曰齊天大運者本年年干也主運者每年皆以木運從大寒日始以次相生至水而終每運各主七十二日零五刻逐歲變遷者也六氣有司天有在泉有正化有對化有主氣有客氣正化者午未寅酉辰亥之年也對化者子醜申卯戌巳之年也正司化令之實對司化令之虛又以子午卯酉為一律子午君火司天則必卯酉燥金在泉卯酉燥金司天則必子午君火在泉寅申巳亥為一律辰戌丑未為一律例皆同也主氣者每年皆以木氣從大寒日始以次相生至水氣而終每氣各主六十日奇八十七刻半歲歲皆然者也客氣者從本年年支後第三支起運如子年子後第三支是戌戌屬水就以水氣從大寒日始為初之氣即在泉左間也木為二之氣即司天間也火為三之氣即司天火氣也土為四之氣即司天左間也金為五之氣即在泉燥金也水為終之氣即在泉右間也每氣各主六十日奇八十七刻半每年一易者也以客加主客勝主則從主勝客則逆凡司天主歲半以前在泉主歲半以後此客氣之大者加於主氣之上也司天居上在泉居下運氣居中或司天克運生運以上臨下為順順分生克之殊或運克司天生司天以下臨上為逆逆有大小之異其中有司天與運同者名曰天木符丁巳丁亥之類年支與運合者名曰歲會乙卯丙子之類在泉與運同者名曰同天金符庚子庚午之類運與在泉合者名曰同歲水會辛丑辛未之類司天與運與氣三合者名曰太乙天符戊午乙酉己未己丑之類天符為執法中執法者其病速而危歲會為行令中行令者其病徐而持太乙天符為貴人中貴人者其病暴而死嗟乎風寒暑濕燥火者天之陰陽三陰三陽上奉之木火土金水者地之陰陽生長化收藏下應之戊己土也然化氣必以五故申己化土而居其首土生金故乙庚次之金生水故丙辛次之水生木故丁壬次之木生火故戊癸次之此化氣之序也五行各一而火獨有君相二者上應天之六氣也蓋木旺於東火旺於南金旺於西水旺於北而土旺於四維戊附於戌而在乾巳附於辰而在巽未之封沖在醜而丑未屬坤艮之鄉故辰戌丑未寄旺之位也假如太角壬木之化為啓拆而變為摧拉太徵戊火之化為暄燠而變為炎烈正化之變也少角丁木木氣不足清勝而熱復少徵癸火火氣不足寒勝而雨復邪化之復也寒甚而陽焰為火鬱熱甚而悽清為金鬱抑而不伸也水鬱而發則為冰雹土鬱而發則為飄驟鬱而怒起也風淫所勝則克太陰熱淫所勝則克陽明侮其所勝也相火之下水氣承之濕土之下風氣承之亢則制也摧拉之變不應普天悉皆大風炎烈之變不應薄海悉皆燔灼清氣之勝不應宇宙無不明潔雨氣之復不應山澤無不蒸溽聖人反復諄諄蓋欲人法於陰陽和於術數勿為運氣所中也即使偶中亦知其受病之因不令妄投藥餌而有夭傷之嘆耳凡主客之氣皆能致疾下為主氣上為客氣經曰木位之主其瀉以酸其補以辛厥陰之客以辛補之以酸瀉之以甘緩之火位之主其瀉以甘其補以咸少陰之客以甘瀉之以痠軟之少陽之客以咸補之以甘瀉之以咸軟之土位之主其瀉以苦其補以甘太陰之客以甘補之以苦瀉之以甘緩之金位之主其瀉以辛其補以酸陽明之客以酸補之以辛瀉之以苦緩之水位之主其瀉以咸其補以苦太陽之客以苦補之以咸瀉之以苦堅之以辛潤之凡客勝瀉客補主主勝瀉主補客而本位更有六氣司天在泉淫勝之治法有司天在泉反勝之治法有歲運上下所宜藥食之治法而五運之中又必折其鬱氣先取化源啓玄子以為太陽司天取九月為水之源陽明司天取六月為金之源少陰少陽司天取三月為水之源太陰司天取五月為土之源厥陰司天取年前十二月為木之源經曰無先天信無逆氣宜無翼其勝無贊其復是謂聖治者此也夫人稟五行之氣而生亦從五行之數而盡故王冰曰蒼天布氣尚不越乎五行人在氣中豈不應乎天道隨氣運陰陽之盛衰理之有然也經曰不知年之所加氣之盛衰虛實之所起不可以為工矣雖然運氣之理亦有不可泥者如肝木素虛脾土太盛運值太角肝氣稍實脾氣方平五臟類然又內外兩因隨時感觸雖當太過之運亦有不足之時不及之運亦有多餘之患倘專泥運氣能無實實虛虛損不足而益有餘乎況歲氣之在天地亦有反常之時故冬有非時之溫夏有非時之寒春有非時之燥秋有非時之暖犯之者病又如春氣西行秋氣東行夏氣北行冬氣南行卑下之地春氣常存高阜之境冬氣常在天不足西北而多風地不滿東南而多濕又況百里之內晴雨不同千里之外寒暄各別方土不齊而病亦因之此皆法外之遣也善言運氣者隨機觀變方得古人未發之旨幸毋膠執而為程馬之續也按運氣之理在弗遣雖有微疴罔不由斯至本年時疫尤為吃緊即七情不齊亦皆默範自奧理微詞卒難解悟非纍功探索至靈慧者莫之能強況魯鈍窾綮寧敢窺其籓籬哉是篇刪其繁蕪為下學楷梯以免其浩汗之苦高博者有完義具於胸中視茲筌蹄幾同咀雪知我罪我其在斯乎六十年中紀運歌運克氣者為不和氣如生運名順化運被氣克天刑多小逆見之運生氣氣運合則天符過運氣相同名曰天符戊子戊午戊寅戊申運氣皆火丙辰丙戌運氣皆水己丑己未運氣皆土乙卯乙酉運氣皆金丁巳丁亥運氣皆木天氣生運名曰順化甲子甲午甲寅甲申火下生土壬辰壬戌水下生木乙丑乙未土下生金辛卯辛酉金下生水癸巳癸亥木下生火天氣克運名曰天刑庚子庚午庚寅庚申火下剋金戊辰戊戌水下剋火辛丑辛未土下剋水丁卯丁酉金下剋木己巳己亥木下剋土運生天氣名曰小逆子臨父位故云小逆壬子壬午壬寅壬申木上生火庚辰庚戌金上生水癸丑癸未火上生土己卯己酉土上生金辛巳辛亥水上生木運克天氣名曰不和丙子丙午丙寅丙申水上剋火甲辰甲戌土上剋水丁丑丁未木上剋土癸卯癸酉火上剋金乙巳乙亥金上剋木子午二年客氣定局熱化之圖丑未二年客氣定局濕化之圖寅申二年客氣定局火化之圖卯酉二年客氣定局燥化之圖辰戌二年客氣局寒化之圖己亥二年客氣定局風化之圖五音建運圖商強也象金性之堅強也羽舒也陽氣將復萬物舒生也角觸也象陽氣觸動而生也徵止也物盛則止也太過不及平運之圖發生委和敷和角赫曦伏明升明徵敦阜卑監備化宮流衍涸流靜順明堅成從革審平商太過不及平氣紀六氣正氣化對化之圖少陰正化午對化子太陰正化未對化醜少陽正化寅對化申陽明正化酉對化卯太陽正化戌對化辰厥陰正化亥對化巳四間氣之圖此以客氣論之司天為三氣在泉為終氣余為左右間丁天左為四氣右為二氣在泉左為初氣右為五氣
