body:
  text: 卷之四醫方論第二十二上古因證處方初無膠執故內經翻造化之玄機而不設方劑不欲以一定之迹應無窮之變也庸下者流苦其奧窔於是漢世以降方法繁興如奕之有勢不過略陳間架對局之變無窮吾亦與之俱無窮若執一定之勢以應千變之局其有不敗者幾希今名方俱在奕之勢也反正逆從勢之用也運氣不齊古今易轍風土異宜強弱異稟貴賤異境老少異軀新久異法內外異因局之變也先哲熟曉陰陽故其處方良有精理不解其理妄試之用是奕者執勢之故智也所以智者用方如支道人相馬略其玄黃取其神駿愚者用方如獵不知兔廣絡原野術亦疏矣用考名方最切要者計一百首令千載而下猶能見先哲之心不蹈執方之弊庶幾展博濟之仁耳丸方十八首丸者緩也緩則治其本也上焦宜細而鬆中焦宜細而堅下焦宜大而堅六味地黃丸治腎經不足發熱作渴小便淋祕氣壅痰嗽頭目暈眩眼花耳聾咽燥舌痛齒牙不固腰膝痿軟自汗盜汗諸血失音水泛為痰血虛煩躁下部瘡瘍足跟作痛等症熟地黃八兩酒煮杵膏山茱萸酒潤去核乾山藥炒各四兩牡丹皮酒洗微炒白茯苓去皮乳制澤瀉去毛焙各三兩上為末煉蜜丸如桐子大空心淡鹽湯下腎者水臟也水衰則龍雷之火無畏而亢上故啓玄曰壯水之主以制陽光地黃味厚為陰中之陰主補腎填精故以為君山茱萸味酸歸肝乙癸同治之義且腎主閉藏而酸斂之性與之宜也山藥味甘歸脾安水之仇故用為臣丹皮亦入肝其用主宣通所以佐茱萸之澀也茯苓亦入脾其用主通利所以佐山藥之滯也且色白屬金能培肺部又有虛則補母之義至於澤瀉有三功焉一曰利小便以清相火二曰行地黃之滯引諸藥速達腎經三曰有補有瀉無喜攻增氣之虞故用為使此方為益腎之聖藥而昧者薄其功緩蓋用藥者有四失也一則地黃非懷慶則力淺一則地黃非九蒸則不熟一則疑地黃之滯而減之則君主弱一則惡澤瀉之滲而減之則使者微蹈是四失而顧咎藥之無功毋乃愚乎七味地黃丸舊名加減八味丸治腎水不足虛火上炎發熱作渴口舌生瘡或牙齦潰爛咽喉作痛或形體憔悴寢汗發熱即六味丸加肉桂一兩去皮忌火腎水不足虛陽僭上必用此方引火歸原夫五志之火可以濕伏可以直折龍雷之火惟當從其性而伏之肉桂性熱與火同性雜在下焦壯水藥中能引無根虛火降而歸經此方以類聚之義也且肉桂之質在中半以下故其性專走腎經本乎地者親下之義也況相火寄於甲乙之間肝膽木旺則巽風動而烈火焰明古人謂北方不可瀉瀉肝即所以瀉腎本草曰木得桂而枯乃伐肝之要藥也經曰熱因熱用從治之妙法正與從其性而伏之之義相合或者畏其熱而遺之豈達造化升降之微乎黃柏知母治相火僅可施於壯實若虛火而誤用之則腎因瀉而愈虛愈虛而虛火愈熾矣素問氣增而勝久用寒涼反從火化之説獨不聞乎八味地黃丸治命門火衰不能生土以致脾胃虛寒飲食少思大便不實臍腹疼痛夜多漩溺或陰盛格陽內真寒而外假熱等症即七味丸加熟附子一兩如法詳制腎有兩枚皆屬於水雖有左右之分初無水火之別考之內經昭然可曉愚説已詳見辨妄篇仙經曰兩個一般無二樣中間一點是真精又曰兩腎中間一點明夫真精也明也即命門相火也命門乃穴名而其穴在兩腎中間蓋一陽生於二陰之間所以成乎坎而象天之北也經曰少火生氣人無此火生化之源或幾乎息矣非附子健悍不足以噓既稿之陽春王太僕曰益火之原以消陰翳此方是也金匱腎氣丸治脾胃大虛腰重腳重小便不利肚腹腫脹四肢浮腫喘急痰盛已成蠱證其效如神熟地黃四兩白茯苓三兩山茱萸去核乾山藥炒川牛膝酒炒牡丹皮酒洗炒車前子炒澤瀉炒肉桂去皮各一兩附子制熟五錢上為末煉蜜丸如桐子大空心白湯下先哲謂土為萬物之母水為萬物之源身中所最重者脾虛則土不能制水腎虛則水不能安位故逆行而泛濫於皮膚之間因而攻逐虛虛之禍殆不可言八味丸脾腎要藥佐以車前泄太陰之水佐以牛膝開少陰之竅故服之則小便如泉而脹可遄已又無損於真元之氣也枳朮丸治痞消食強胃健脾白朮二兩土蒸枳實一兩去穰麩炒上為細末荷葉煨陳米飯為丸如椒目大白湯下東垣曰白朮苦甘溫其苦味除胃中之濕熱其甘溫補脾家之元氣多於枳實一倍枳實味苦溫泄心下痞悶消胃中所傷此藥下胃所傷不能即去須一兩時許食乃消化先補虛而後化所傷則不峻利矣荷葉狀若仰盂於卦為震人感之生足少陽甲膽也飲食入胃營氣上行即甲膽之氣也荷葉空清而象風木此氣所感而胃氣有不上升者乎更以煨飯和藥與白朮協力滋養穀氣而補脾胃其利大矣若用食藥下之傳變諸症不可勝數木香枳朮丸破滯氣消飲食開胃強脾即枳朮丸加木香一兩忌火枳朮丸止主飲食自傷如鬱則氣阻不能下行怒則氣鼓因而逆上必賴木香之苦以下氣溫以和氣所以佐枳朮二味之不及平肺肝兩臟之有餘也況芳香之氣又脾所喜經曰塞者通之此方是已越鞠丸總治六郁胸膈痞悶吞酸嘔吐飲食不化香附炒梔子薑汁炒黑蒼朮泔浸炒神麯炒撫芎各等分上為末神麯糊為丸如川椒大空心白湯下如血鬱加桃仁紅花濕鬱加白芷熱鬱加青黛食鬱加山楂痰鬱加南星海石半夏氣鬱加木香夫人之有鬱氣猶天地之閉塞成冬也不有以開之則發育之令息矣人身中詎可一日見此象乎丹溪以香附主氣山梔主熱蒼朮主濕與痰神麯主食撫芎主血誠諸郁之總司也經曰木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之治各異法詎可執一途而取哉還少丹治脾腎虛寒飲食少思發熱盜汗遺精白濁真氣虧損肌體瘦弱等症肉蓯蓉遠志茴香巴戟山茱萸乾山藥枸杞熟地黃石菖蒲牛膝杜仲楮實五味子白茯苓上等分各另為末和勻用棗肉百枚並煉蜜丸桐子大每服五七十丸空心溫酒或鹽湯下日三服脾為後天根本腎為先天根本二本固則老可還少二本傷則少有老態蓯蓉地黃枸杞味之厚者也精不足者補之以味也茴香巴戟杜仲性之溫者也陽不足者益之以溫也遠志菖蒲辛以潤之也山茱萸五味子酸入東方是腎肝同治也牛膝杜仲直達少陰山藥茯苓兼通脾土此本腎藥腎足則少火熏蒸脾胃賴母以健運矣久服則筋骨強機關利精力充顏色變命曰還少不亦可乎天王補心丹主心血不足神志不寧津液枯竭健忘怔忡大便不利口舌生瘡等症人參去蘆白茯苓去皮玄參炒丹參炒遠志去木炒桔梗各五錢五味子烘當歸身酒洗麥門冬去心天門冬去心柏子仁炒酸棗仁炒各二兩生地黃四兩酒洗上為末煉蜜丸如椒目大白滾湯下心者神明之官也憂愁思慮則傷心神明受傷則主不明而十二官危故健忘怔忡心主血血燥則渾枯故大便不利舌為心之外候君火炎上故生瘡是方以生地為君者取其下入足少陰以滋水主水盛可以伏火況地黃為血分之要藥又能入手少陰也棗仁遠志柏仁養心神者也當歸丹參玄參生心血者也二冬助其津液五味收其耗散參苓補其虛氣以桔梗為使者欲載諸藥入心不使之速下耳班龍丸治諸虛百損髓竭精枯殊有奇效歌曰尾閭不禁滄海竭九轉靈丹都漫説惟有班龍頂上珠能補玉堂關下穴鹿茸酒炙鹿角膠炒成珠鹿角霜陽起石煅紅酒淬肉蓯蓉酒浸去甲酸棗仁炒柏子仁炒黃耆酒炙各一兩當歸酒炒黑附子炮熟地黃杵膏各八錢辰砂五錢上為細末酒糊丸如桐子大空心酒送下腎氣虛則督脈傷而精竭鹿性熱而淫得天地之陽氣最全故以鼻向尾能通督脈足於精者也茸膠霜三物同用蓋以陽氣在頭取其全耳陽起蓯蓉附子取其直入少陰酸棗柏子辰砂皆安神之品仙經曰神足則氣旺氣旺則精生也黃耆當歸和上下之氣血酒糊為丸通表裡之隧道且助添藥勢令諸品無微不達命曰班龍者龍配東方屬木為陽且取其雄矯此方為健陽而設故以名之如真陰下損元陽上乘者不宜輕投反濟其火虎潛丸治腎陰不足筋骨痿軟不能步履黃柏鹽酒炒知母鹽酒炒熟地黃杵膏各三兩虎脛骨一兩酥炙鎖陽當歸各一兩五錢陳皮去白白芍藥酒炒牛膝各二兩龜板四兩酥炙上為末煮羯羊肉搗為丸如桐子大淡鹽湯下人之一身陰氣在下陰不足則腎虛腎主骨故艱於步履龜屬北方得天地之陰氣最厚故用以為君虎屬西方得天地之陰氣最強故用以為臣獨取脛骨從類之義也用此二物者古人所謂草木之藥性偏難效氣血之屬異類有情也黃柏知母所以去骨中之熱也地黃歸芍所以滋下部之陰陰虛則陽氣泄越而上故加鎖陽以禁其上行加陳皮以導其下降精不足者補之以味故用羊肉為丸命曰虎潛者虎陰也潛藏也欲其封閉氣血而退藏於密也四神丸治脾腎俱虛子夜作瀉不思食不化食肉豆蔻二兩生用破故紙四兩炒五味子三兩吳茱萸五錢鹽湯泡過上為末紅棗四十九枚生薑四兩切用水煮棗熟去薑取棗肉和藥為丸如桐子大空心鹽湯下脾主水穀又主上升虛則不能消磨水穀而反行下降腎主二便又主閉藏虛則不能禁固二便而反為滲泄夫腎水受時於子弱土不能禁制故子後每瀉也肉豆蔻之辛溫可固滑而益脾吳茱萸之辛溫可散邪而補土五味子酸鹹可入腎而收斂破故紙辛溫可固本而益元土受溫補則燥能制水水受溫補則力能閉藏子後之瀉從可瘳矣香連丸治下痢赤白腹痛不快裡急後重黃連二十兩吳茱萸十兩同炒去吳茱萸用黃連木香四兩八錢不見火上為細末醋糊為丸如椒目大米湯下時至於夏天道南行屬火而熱在人身則心應之斯時也不能致謹多食生冷則腸胃之間寒熱相搏怫鬱成積不能宣通發而為痢火性急速故腹痛而後重裡急錢氏以黃連為君者取其苦寒直折心家之火恐其大寒之性凝而不行故以茱萸之辛溫制之以木香為佐者蓋以痢之為病只是火火之有餘只是氣得以通利三焦氣行而火降矣且能監製黃連無喜攻增氣之變夫是二物皆主直行而折經曰有餘者折之是也左金丸治肝經火實左脅滿痛黃連六兩炒吳茱萸一兩鹽湯泡上為細末水運為丸如椒目大白滾湯下吳氏曰肝木居於左肺金處於右左金者謂金令行於左而平肝木也黃連善瀉心火不使乘金則肺家清肅之令左行而肝木有制矣愚謂心者肝之子也實則瀉其子故以黃連為君然肝喜疏泄必佐以茱萸之辛使其條達宣通無怫鬱之患辛者金之味也辛以暢氣則治節收氣化之權而將軍無謀慮之失矣經曰佐以所利和以所宜左金丸之謂乎脾約丸治腸胃燥熱大便祕結麻仁二兩另研杏仁五兩五錢去皮尖炒枳實麩炒厚朴薑汁炒芍藥各八兩大黃一斤上為末蜜為丸如桐子大白滾湯下成氏曰約者約結之約又約束也經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行今胃強脾弱約束津液不得四布但輸膀胱小便數而大便硬故曰脾約麻仁甘平而潤杏仁甘溫而潤經曰脾欲緩急食甘以緩之本草曰潤可去枯是以麻仁為君杏仁為臣枳實苦寒厚朴苦溫破結者必以苦故以為佐芍藥酸寒大黃苦寒酸苦湧泄為陰故以為使丹溪曰既云脾約血枯火燔金受邪而津竭必竊脾之母氣以自救金衰則土受木邪脾失轉輸肺失傳化理宜滋陰降火金行清化脾土健旺津液既潤何祕之有此方惟熱甚而稟實者可用熱雖甚而虛者愈致其燥涸之苦矣化蟲丸治一切蟲病大者即下小者盡化為水鶴蝨去土胡粉炒苦楝根東引不出土者檳榔各一兩蕪荑使君子各五錢枯白礬二錢五分上為末水為丸麻子大上旬空心米飲下飲食入胃非濕與熱則不能腐化若酷嗜肥甘則濕熱愈甚積久生蟲歷家五月之令濕熱大行腐草為螢腸胃生蟲亦此義也蟲以濕熱為巢穴鶴蝨等七味皆有殺蟲之能且去濕熱能直搗其巢穴矣蟲類多種治各不同此方無所不宜蟲劑之總司也但服之有法無不神驗須初一至初十蟲頭向上宜先餓半日而使蟲飢次早五更用油煎肉一片嚼之蟲聞肉香頭皆向上隨以藥服之須臾或蔥湯或白水助藥力下行則蟲盡下矣礞石滾痰丸治實熱老痰非此不化功效若神大黃酒略蒸黃芩各八兩青礞石消煅一兩沉香五錢上為極細末水丸川椒大量人強弱用之痰不自動也因氣而動氣不自升也因火而升積之既久依附腸胃回薄曲折處以為棲泊之窠臼謂之老痰其變現之症種種怪異難以測識莫可名狀非尋常藥物可能療也隱君見及此故用大黃為君以開下行之路黃芩為臣以抑上僭之火礞石慓悍之性遊行腸胃踵其回薄曲折之處蕩而滌之幾於刮腸剖骨之神故以為佐奔馳於上中下三焦開飛門魄門之竅者沉香之力也故以為使然必服之得法則效如響應用水一口送過咽即便仰臥令藥在咽膈間徐徐而下半日不可飲水不可起身坐行言語直待藥氣除逐上焦痰滯然後動作大抵服罷喉間稠黏壅塞不利者乃痰氣泛上藥力相攻故也少頃藥力既勝自然寧貼大黃蟅蟲丸治五勞七傷內有乾血肌膚甲錯兩目黯黑大黃十兩酒蒸黃芩二兩炒甘草三兩桃仁去皮尖炒杏仁去皮尖炒芍藥各四兩炒乾地黃十兩乾漆一兩炒虻蟲一兩五錢去翅足炒水蛭百枚炙黃蠐螬一兩五錢炒蟅蟲一兩去頭足炒上為末蜜丸如小豆大酒服五丸日三服勞傷之症未有無瘀血者也瘀之日久則發而為熱熱涸其液則干黏於經絡之間愈干愈熱愈熱愈干而新血皆損人之充養百骸光華潤澤者止籍此血血傷則無以沃其膚故甲錯也目得血而能視營氣不貫於空竅故黯黑也仲景聖於醫者洞見此症補之不可涼之無益而立此方經曰血主濡之故以地黃為君經曰堅者削之故以大黃為臣統血者脾也經曰脾欲緩急食甘以緩之又曰酸苦湧泄為陰故以甘草桃杏芍藥為佐經曰咸走血苦勝血故以乾漆之苦四蟲之咸為使吳氏曰濁陰不降則清陽不升瘀血不去則新血不生今人一遇勞症便用滋陰服而不效坐以待斃嗚呼術豈止此邪煎方六十三首湯者蕩也蕩滌病之鋒鋭急則治標之法也有本而標之有標而本之有正治其本而亟欲取效亦用湯液大抵散利之劑宜生補養之劑宜熟是在學者臨症變通可耳四物湯治一切血虛日晡發熱當歸酒炒熟地黃各三錢白芍藥二錢川芎一錢五分上水煎服丹溪曰難成而易虧者陰血也不足則生熱經曰血主濡之四物皆濡潤之品故為血分主藥地黃甘溫走北方以沃血之源當歸辛溫入心脾而壯主血攝血之本芍藥酸寒入肝家而斂疏泄之血海川芎陰中之陽可上可下通入足三陰而行血中之氣吳氏曰失血太多者禁勿與之四物皆陰陰者天地閉塞之令非所以生萬物者也四君子湯治一切氣虛脾胃孱弱面色枯白言語輕微四肢無力脈來細軟人參去蘆白朮土炒茯苓各二錢去皮甘草一錢炙上薑三片棗肉二枚水煎服吳氏曰面色枯白望之而知其氣虛言語輕微聞之而知其氣虛四肢無力問之而知其氣虛脈來細軟切之而知其氣虛是方以人參補五臟之元氣白朮補五臟之母氣茯苓致五臟之清氣甘草調五臟之乖氣四藥皆甘溫甘得中之味溫得中之氣猶之不偏不倚之君子也愚按君子以陽明勝展布德澤以行春和之令南風解慍為國家培元氣者也經曰氣主煦之此方有焉六君子湯治氣虛脾弱食少痰多即四君子加半夏制熟陳皮各二錢上薑三片棗肉二枚水煎服半夏燥濕治痰之本陳皮利氣泄痰之標標本既得攻補互行補而不滯攻而不峻故曰六君子經曰壯者氣行則愈怯者著而為病六君子者庶幾壯其氣矣氣壯則升降自如精以奉上濁以歸下誰復有物停留以著其焦腑者乎加香附藿香砂仁名香砂六君子湯其用稍峻矣八珍湯治氣血俱虛惡寒發熱煩躁作渴大便不實飲食不進小腹脹痛眩暈昏憒等症四物湯四君子湯取二湯合用薑三片棗肉二枚水煎服氣為衛屬陽血為營屬陰此人身中之兩儀也純用四物則獨陰不長純用四君子則孤陽不生二方合用則氣血有調和之益而陰陽無偏勝之虞矣經曰氣血正平長有天命斯方也其庶幾焉十全大補湯治勞傷困倦虛症蜂起發熱作渴喉痛舌裂心神昏亂眩暈眼花寤而不寐食而不化人參二錢去蘆茯苓一錢去皮白朮二錢土炒甘草八分炙當歸一錢五分熟地黃二錢酒炒白芍藥八分灸川芎八分肉桂五分去皮黃耆三錢蜜炙水煎服丹溪曰實火可瀉芩連之屬虛火可補參耆之屬凡人根本受傷虛火遊行泄越於外若誤攻其熱變成危症多致難救此方以四物補血四君子補氣佐以黃耆充實腠理加以肉桂導火歸源薛立齋曰飲食勞倦五臟虧損一切熱症皆是無根虛火但服此湯固其根本諸症悉退金匱玉函曰虛者十補勿一瀉之此方是也二陳湯治肥壯之人濕痰為患喘嗽脹滿茯苓去皮三錢半夏熟三錢陳皮去白三錢甘草一錢上薑三片水煎服六君子可治虛痰若肥壯氣實之人未可驟補則姑去參朮以攻其標肥人多濕濕挾熱而生痰火載氣而逆上半夏之辛可以利二便而去濕陳皮之辛可以通三焦而理氣茯苓佐半夏共成燥濕之功甘草佐陳皮同致調和之力成無己曰半夏行水氣而潤腎燥經曰辛以潤之是也行水則土自燥非半夏之性燥也詳見藥性論中或曰有痰而渴宜去半夏代以貝母吳鶴皋曰渴而喜飲水者易之不能飲水雖渴宜半夏也此濕為本熱為標所謂濕極而兼勝己之化非真象也加枳殼砂仁即名枳砂二陳湯其性較急矣附子理中湯治脾胃虛寒飲食不化或手足厥冷腸鳴切痛或痰氣不利口舌生瘡或嘔逆吐瀉等症去附子即名人參理中湯人參去蘆白朮土炒乾薑炮甘草炙附子制熟各等分上每服八錢水煎服人有元陽命曰真火受氣於甲乙聽命於天君者也此火一衰則不能生土而資生之本大虛今以附子回少火乾薑暖中州而參朮甘草為之補氣屬陽氣旺則火足而脾土自能健運經曰氣主煦之又曰寒淫所勝平以辛熱即補火之説也夫心上腎下肝左肺右而脾獨居中中氣空虛四臟不能相生因而不平得此方以理之則萬物之母安而四臟皆平矣故曰理中湯去參術即名四逆湯為四肢厥逆者設也補中益氣湯治勞倦傷脾中氣不足懶於言事惡食溏泄或身熱而煩或氣高而喘或頭痛惡寒自汗或氣虛不能攝血脈洪大無力或微細軟弱或瘧痢等症因脾虛久不能愈或虛人感冒風寒不勝發表者宜以此代之黃耆一錢五分炙人參去蘆甘草炙歸身酒拌白朮土炒各一錢陳皮去白五分升麻柴胡各三分上薑三片棗二枚水煎服東垣自評曰勞倦傷脾心火乘土而肺金受邪脾胃一虛肺氣先絶故多用黃耆以益皮毛而閉腠理上喘氣短人參以補之心火乘脾炙草之甘以瀉火而補胃中元氣白朮甘溫除胃中熱利腰臍間血胃中清氣在下必升柴以引之氣亂於胸中為清濁相干用陳皮以理之脾胃氣虛為陰火傷其生髮之氣血中伏火日漸煎熬則心亂而煩加辛甘微溫之劑以生陽氣陽生則陰長經曰勞者溫之蓋溫能除大熱大忌苦寒之藥瀉胃土耳愚按脾為坤土以應地氣地氣升而發陳之令布地氣降而肅殺之令行勞倦傷脾土虛下陷經曰交通不表名木多死白露不下菀稿不榮此言肅殺成否之象人應之則變症百出未央絶滅東垣先生深達造化故立溫和之劑溫和者春氣之應養生之道也且以升麻提脾之右陷者從右而升柴胡提肝之左陷者從左而升地既上升天必下降二氣交通乃成雨露此氣行而生氣不竭矣治勞傷者不當如是耶升陽散火湯治四肢困倦肌膚大熱升麻葛根獨活羌活白芍藥炒人參各一錢去蘆柴胡六分防風五分甘草四分上水煎服忌食寒涼之物東垣自評曰四肢屬脾脾者土也熱伏地中多因血虛而得又有胃虛過食冷物郁遏陽氣於脾土之中者並宜服此愚按經曰火鬱則發之升柴羌獨防葛皆味之薄者陰中之陽故足以發無光之火而顯揚於上人參助其上升而固衛氣芍藥防其發散而斂榮氣甘草以緩之勿使風藥太過而元氣反傷也東垣此方非洞曉陰陽孰能與於斯歸脾湯治思慮傷脾不能攝血或健忘怔忡驚悸盜汗寤而不寐或心脾作痛嗜臥少食大便不調或肢體重痛月經不調赤白帶下等症人參去蘆白朮土炒茯苓去皮龍眼肉去核酸棗仁炒各二錢遠志去木當歸身各一錢木香生用甘草炙各五分黃耆炙一錢五分上薑三片水煎服心藏神而主血脾藏意而統血思慮則兩臟受傷而血不歸經心血不足故健忘怔忡驚悸不寐脾血不足故嗜臥少食體重便病過甚則氣鬱而心脾作痛在女則帶下而月經不調治以金石腸胃傷而真元不復治以寒涼氣血損而病本日深茲取參苓耆朮炙草甘溫可以補脾龍眼棗仁歸身遠志濡潤可以養心佐以木香者蓋思慮所傷三焦氣阻藉其宣暢則氣和而血和且平肝可以實脾血之散於外者悉歸中州而聽太陰所攝矣故命之曰歸脾湯人參養榮湯治脾肺氣虛發熱惡寒面黃肌瘦倦怠短氣食少作瀉白芍藥一錢五分酒炒人參去蘆陳皮黃耆蜜炙桂心當歸酒炒白朮土炒甘草炙各一錢熟地黃薑汁炒茯苓去皮各七分半五味子炒杵遠志去木各五分上薑三片棗肉二枚水煎服陽春至而物榮肅殺行而物稿脾為坤土肺屬乾金經曰脾氣散精上輸於肺地氣上升也肺主治節通調水道下輸膀胱天氣下降也於象為泰脾肺氣虛則上下不交陰陽否隔故面黃肌瘦亦猶天物之稿也人參五味溫其肺耆朮甘苓溫其脾陳皮芍藥溫其肝地黃桂心溫其腎當歸遠志溫其心溫者陽春之氣也春氣行而一身之中有不欣欣向榮者乎故曰養榮湯薛立齋曰氣血虛而變現諸症莫能名狀勿論其病勿論其脈但用此湯諸症悉退可謂有回春之識矣加味逍遙散治血虛倦怠發熱口乾自汗盜汗或月經不調腹痛重墜水道澀痛等症當歸酒拌白芍藥酒炒白茯苓去皮白朮土炒柴胡各一錢甘草炙牡丹皮便炒梔子薑汁炒黑各五分上水煎服去丹皮梔子即逍遙散原方藏血者肝也一有拂逆則將軍之官謀慮不決而血海為之動搖經曰暴怒傷陰散為血虛諸症婦人尤甚此以白朮茯苓固其脾恐木旺則土衰經所謂不治已病治未病之法也經曰肝苦急急食甘以緩之故用甘草經曰以辛散之故用當歸經曰以酸瀉之故用芍藥柴胡氣涼散其怒火山梔味苦抑其下行丹皮和血通經所以導血中之氣而無壅塞之虞繇是而察其平肝補血之法可謂婉而至矣當歸補血湯治氣血虛熱面赤煩渴脈大而虛黃耆炙一兩當歸酒洗二錢上水煎空心服之東垣曰經云脈虛血虛又云血虛發熱此多得於飢飽勞役症類白虎惟脈不長實為辨耳誤服白虎湯必死愚按陰陽對峙一勝則一負陰既不足陽必有餘故熱而渴也黃耆乃甘溫補氣之劑此本血虛何反用之為君耶經曰治病必求於本又曰陽生陰長故血虛補氣治其本也佐以當歸之潤正與陰血相投二物並行則上下表里無處不到故名補血湯清心蓮子飲治熱在氣分夜安晝甚口渴便濁或口舌生瘡咽乾煩躁小便赤淋遇勞即發黃芩炒麥門冬去心地骨皮車前子炒甘草各一錢五分石蓮肉白茯苓黃耆人參各一錢去蘆上水煎服心臟主火火者元氣之賊勢不兩立者也小腸與心實為表裡心火妄動小便必澀故以門冬石蓮寧其天君毋使有自焚之憂以黃芩茯苓清其至高毋使有銷鑠之患參耆之用助氣化以達州都車前之功開決瀆以供盛受甘草一味可上可下調和諸藥共底成功若小便既通則心清而諸火自息竟宜治本不必兼標矣萆薢分清飲治膏濁頻數漩白如油名曰膏淋川萆薢石菖蒲烏藥益智仁各三錢上水煎服經曰雨氣之復不應山澤無不蒸溽小便膏濁者濕氣盛行蒸溽之象也水性就下故淋瀝不已燥可去濕故用菖蒲烏藥以平濕土之敦阜益智入腎可納氣歸源腎水得令則自能閉藏而小便有節至於使水道轉入大腸分清泌濁者獨萆薢之力也故曰萆薢分清飲茵陳五苓散治酒積黃疸小便不利清熱去濕茵陳豬苓茯苓澤瀉白朮土炒各一錢桂三分上水煎服去茵陳即五苓散原方土虛則受濕濕生熱濕熱乘脾中央之黃色乃見酒亦濕熱故並治之茵陳專理濕熱發黃者所必用也佐以豬苓澤瀉則水液分於膀胱佐以白朮茯苓則土旺可以勝濕桂之為用能令諸藥直達熱所蓋嚮導之兵也龍膽瀉肝湯治肝熱膽溢火實口苦柴胡一錢黃芩炒七分五味子九粒生甘草山梔炒黑知母去毛鹽酒炒天門冬去心麥門冬去心黃連炒人參去蘆龍膽草各五分上水煎服肝為將軍之官性急而暴不有以直折之則火之發也必烈柴胡輕清上升能順木性而使之條達故為君山梔龍膽味苦性寒直入肝膽以平其亢甚黃連降心火實則瀉其子也金盛可以平木故加五味門冬木旺將以賊土故加人參甘草腎肝同治故用知母古人立方之意其深奧如此當歸六黃湯治盜汗發熱火實陰虛黃耆二錢當歸生地黃熟地黃各一錢黃芩黃連黃柏各五分上水煎服盜汗者乘人之睡而出有如盜也陰虛而睡則衛外之陽乘虛陷入陰中表液失其固衛故濈濈然汗出覺則陽氣用事衛氣復出於表汗即止矣當歸地黃滋陰之藥也芩連黃柏降火之藥也盜汗之餘腠理不固故以黃耆補表愚謂既曰陰虛則元氣有降而無升肅殺之氣方深而復用肅殺之劑毋乃犯虛虛之戒乎惟火實氣強者不得已而暫用之不然寒涼損胃禍彌深耳三子養親湯治氣喘痰盛紫蘇子沉水者淘淨白芥子蘿蔔子各三錢上水煎服丹溪曰氣有餘便是火火載痰升氣高而喘茲以蘇子降氣芥子開氣卜子利氣氣下則火清而痰自己吳鶴皋曰治痰先理氣此治標之法耳不若二陳有去濕治本之妙也愚謂治病先攻其甚氣實而喘則氣反為本痰反為標是在智者神而明之不可以一端泥也然氣稍近於虛便非所宜矣橘皮竹茹湯治久病虛羸嘔逆不已橘皮竹茹各一錢五分人參去蘆生薑煨甘草各一錢大棗二枚去核上水煎服久病而虛肺金失下降之令心火肆炎上之權嘔逆所時有也茲以生薑橘皮之辛溫導其下降竹茹生草之甘寒禁其上炎人參大棗所以強胃扶脾而安其轉輸之職嘔必自止矣如因於寒者以丁香代竹茹毋守株而不變也丁香柿蒂湯治久病厄逆因於寒者柿蒂丁香各二錢人參去蘆一錢生薑五片上水煎服嘔為火氣上衝厄為寒氣阻塞亦有中氣不續而厄者潔古老人以丁薑之辛溫正治以柿蒂之澀寒從治人參為佐使真氣得以展布耳厄在中焦穀氣不運其聲短小得食乃發厄在下焦真氣不足其聲長大不食亦然臨症者不可以不辨也溫膽湯治膽虛不眠夢中驚悸嘔吐痰涎竹茹枳實麩炒半夏制甘草陳皮生薑上水煎服聖惠方云膽虛不眠寒也經曰寒者溫之故以生薑陳皮之辛溫為君枳實半夏之苦溫為臣甘草所以和中竹茹所以嚮導膽溫則土得其平嘔吐自止脾主四肢又主困倦故能睡也如元氣不足心血有虧者以歸脾湯主之如實痰滯膈而不得睡者以素問半夏湯主之是在圓機者變通耳內經半夏湯治痰盛夜不得寐秫米一升即小米之糯者半夏五合上用千里水八升揚之萬遍取清五升煮沸入前藥煮一升半每服一杯日進三服以知為度病新發者覆杯即臥汗出則已久者三服而已岐伯曰衛氣行於陽陽氣滿不得入於陰陰氣虛故目不得瞑愚按陽者動也闢也陰者靜也合也故行於陽則動而醒行於陰則靜而臥陽光亢上則氣有餘而膈有痰經曰合夜至雞鳴天之陰陰中之陰也氣行於陰而陰不足則陽愈狂而陰乃格靜反為動合反為闢神氣散而不守故目不得瞑秫米甘平益陰氣而利大腸半夏辛溫通痰竅而泄小便二便俱通氣可立降陽不乘陰臥可立至經曰陽強不能密陰氣乃絶陰平陽祕精神乃治此之謂也生脈散治熱傷元氣氣短倦怠口乾出汗人參去蘆五錢五味子杵麥門冬去心各三錢上水煎服火氣赫曦則金為所制而絶寒水生化之源故氣短倦怠出汗者皆手太陰本經症也人參補氣為君所謂損其肺者益其氣也五味子酸斂收肺家耗散之金麥門冬甘寒濡肺經燥枯之液三者皆扶其不勝使火邪不能為害也司天屬火之年時令濕熱之際尤為要緊清暑益氣湯治濕熱困倦胸滿氣促肢節疼痛或小便黃數大便溏滑或瘧痢等症人參去蘆白朮土炒陳皮去白神麯炒澤瀉各五分黃耆炙蒼朮制升麻各一錢甘草乾葛各三分五味子九粒杵上水煎服熱傷元氣清濁不分經曰清氣在下則生飧泄濁氣在上則生䐜脹故見症如前黃耆二術為元氣之保障人參五味為治節之藩籬升麻乾葛引清氣上升神麯澤瀉分濁氣下降根本充實清濁不淆雖有濕熱之邪無所容矣故曰清暑益氣湯十味香薷飲治伏暑昏倦頭重吐痢香薷用穗二錢人參去蘆陳皮黃耆蜜炙白朮土炒扁豆甘草炒厚朴炒茯苓木瓜各一錢上水煎服溽暑之時濕熱交作濕因火蒸逆乘於頭故頭重而昏經曰壯火食氣脾氣受傷重之以濕又其所惡中黃失令則陰陽不能分利清濁不能泌別吐痢之所由來也以參耆保肺扶不勝之金以苓術扶脾壯資生之本陳皮厚朴祛逆上之炎蒸扁豆甘草和乖亂之神氣香薷之用清散暑邪善除濕熱木瓜之加為中宮制賊邪不使肝木乘虛來犯夫如是則脾胃治而水精四布五經並行濕熱皆消而吐痢盡止矣百合固金湯治肺傷咽痛喘咳痰血百合去心一錢麥門冬去心一錢五分細甘草生用一錢芍藥一錢炒懷生地二錢懷熟地三錢黑玄參去蘆八分桔梗去蘆八分貝母去心一錢二分當歸一錢五分上水煎服元陰不足則腎先絶水不制火愈爍其陰熟地黃大補五臟之陰故用為君生地黃滋陰退熱百合保肺安神歸芍補血門冬潤燥玄參壯水之主貝母去肺之痰細甘草生用能清神中之火可代黃柏知母桔梗載諸藥於至高以成固金之功趙蕺峰此方不欲以苦寒傷生髮之氣故以甘寒主之殊有卓見愚謂陰虛則足太陰必虛而金位無母姑用此方清金之後亟宜顧其母氣方為至治若專事於肺而不取化源則不惟土氣難強即金氣亦終不可足也滋陰者其詳審之清脾飲治壯盛人瘧疾熱多寒少小便澀脈弦數青皮去穰炒厚朴薑汁炒白朮土炒黃芩炒半夏制柴胡去蘆茯苓去皮草果甘草上薑三片水煎服瘧症之因多是太陰受傷濕生痰痰生熱熱生風故脈見弦數也吳氏曰清脾非清涼之謂乃攻其邪而脾部為之一清也愚謂半夏除濕化痰開氣散表佐以草果厚朴則中州之垢肅清然瘧脈自弦肝風必鼓柴胡青皮可以散厥陰之邪木旺必乘脾白朮茯苓可以固太陰之主黃芩清其火甘草緩其急而瘧邪可解矣雖然此為壯實者設也用之太過反深沉痼必致綿延難愈甚而變成他症卒難救藥有司命之責者其可不惕然慎耶紫菀湯治癆熱久嗽吐血吐痰紫菀洗淨炒阿膠蛤粉炒成珠知母炮去毛忌鐵貝母去心各一錢桔梗去蘆人參去蘆茯苓去皮甘草各五分五味子十二粒杵上水煎食後服癆而久嗽肺虛可知即有熱症皆虛火也海藏以保肺為君故用紫菀阿膠以清火為臣故用知母貝母以參苓為佐者扶土以生金以甘桔為使者載藥以入肺五味子滋腎經不足之水收肺家耗散之金久嗽者所必收也導氣湯治寒疝疼痛木香三錢忌火茴香二錢吳茱萸一錢半湯泡川楝子四錢上用長流水煎服巢氏曰陰氣積於內復為寒氣所加榮衛不調故成疝疝者控引睪丸而痛也川楝入肝暢氣舒筋則無攣急之苦故以為君木香破氣善調榮衛故以為臣茴香接諸藥入小腸且開任脈故以為佐茱萸之性徹上徹下心腹俱通故以為使三焦一氣得炅則宣遇寒斯阻故以溫劑宣之所以勝寒氣而開魄門之路水用長流取其源遠而通引氣下行耳故名導氣湯此乃疝之通劑也然其病多端古有厥微寒盤氣附狼之七名子和分寒水筋血氣狐㿗之七種須熟察其源通變處劑斯萬舉萬全矣香蘇飲主四時感冒風邪頭疼發熱紫蘇香附炒各三錢陳皮去白一錢二分甘草七分上薑三片蔥一莖煎服吳氏曰南方風氣柔弱傷於風寒俗稱感冒乃受邪膚淺之名也經曰卑下之地春氣常存故東南之民感風之症居多而六經之症不顯其感也由鼻而入惟頭痛發熱而已香蘇以芬芳之氣疏肌表之邪是以蘇為君附為臣陳皮甘草和膈里之氣而輔正是以為佐表裡互治微邪立解黃連解毒湯治陽毒上竅出血黃連炒黃芩炒黃柏炒山梔炒各三錢上水煎服為末為丸即名三黃金花丸吳氏曰治病必求其本陽毒上竅出血則熱為本血為標能去其熱則血不治而自歸經矣故以黃連為君佐以芩柏梔子四物皆苦苦者直行而泄共走南方平其亢甚若陰虛之火則降多亡陰反從火化出血愈甚不可不知秦艽升麻湯治風寒客胃口眼喎斜惡見風寒四肢拘急脈浮而緊升麻乾葛甘草芍藥人參各一錢秦艽白芷防風桂枝各三錢蔥白連須二根上水煎服至哉坤元為五臟之主木勝風淫則倉廩之官承製脾主四肢故痿痹也口為土之外候眼為木之外候故俱病也升麻白芷皆陽明本藥故用為直入之兵人參桂枝固其衛氣芍藥秦艽和其榮血防風卑賤之卒隨令而行蔥根發汗之需無微不達又藉甘草以和之而邪有不散者乎桂枝湯仲景曰太陽中風頭痛陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔本方主之桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩大棗十二枚去核水七升微火煮取三升服一升覆令微汗不可令如水流漓病必不除若一服汗出病瘥不必盡劑若不汗更服至二三劑成氏曰陽脈浮者衛中風也陰脈弱者榮氣弱也風並於衛衛實而榮虛故發熱汗出衛虛則惡風榮虛則惡寒榮弱衛強惡寒復惡風者以汗出則腠理疏亦惡風也翕翕者若合羽所覆熱在表也鼻鳴乾嘔者風壅氣逆也與桂枝湯和榮衛而散風邪桂味辛熱用以為君者桂猶圭也宣通諸藥為之先聘辛甘發散為陽之意也芍藥味苦酸寒甘草甘平用以為臣佐者經曰風淫所勝平以辛佐以苦以甘緩之以酸收之也生薑辛溫大棗甘溫二物為使者經曰風淫於內以甘緩之以辛散之也薑棗固能發散此又不特發散之用專行脾之津液而和榮衛者也麻黃湯不用薑棗專於發汗則不待行化而津液得通矣愚按衛屬陽陽氣者不能衛外而為固則有汗成云衛實何耶蓋邪氣盛則實非正氣也既曰邪實則熱在表矣其惡風又何耶蓋汗能開腠故也既曰熱在表則汗出而腠開亦宜解矣乃不解者又何耶趙嗣真所謂惟臟腑可分表裡皮膚骨髓但分浮淺深沉俱屬於表若以皮膚為表骨髓為里則麻黃湯症骨節疼痛其可謂有表復有里耶然則不解者骨髓之邪自在正與嗇嗇惡寒之義相合所謂熱在皮膚寒在骨髓也如骨髓無寒則桂枝不宜與矣論曰桂枝下咽陽盛則斃其此之謂乎麻黃湯仲景曰太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之麻黃三兩去節桂枝二兩去皮甘草二兩炙杏仁七十枚去皮尖水九升先煮麻黃減二升去沫納諸藥煮取二升半溫服八合覆取微汗足太陽膀胱之脈起於目內眥上額交巔入絡腦下項循肩膊挾脊抵腰中貫臀入膕循髀下合膕中貫腨內故所過無不疼痛也成氏曰寒則傷榮太陽經榮血不利也經曰風寒客於人使人毫毛畢直皮膚閉而為熱者寒在表也寒並於榮榮實而衛虛無汗而惡風也榮強衛弱故氣逆而喘麻黃甘苦為君者以輕劑專主發散也桂枝為臣者表實腠密非桂枝所能散必專麻黃以發汗經曰寒淫於內治以甘熱佐以苦辛是也甘草甘平杏仁甘溫用為佐使者經曰肝苦急急食甘以緩之肝者榮之主也榮勝衛固血脈不利宜甘草杏仁甘以緩之且桂枝湯主風傷衛風邪並於衛則衛實而榮弱故佐以芍藥用和榮也麻黃湯主寒傷榮寒邪並於榮則榮實而衛虛經曰氣之所併為血虛血之所併為氣虛者是已治之以杏仁用利氣也愚按審系真寒太陽無汗非麻黃湯莫可代者前哲謂冬不用麻黃夏不用桂枝蓋以冬令主閉藏不應疏泄夏令本炎熱不可辛溫經所謂必先歲氣毋伐天和之説也又曰麻黃惟冬月寒邪在表腠密無汗者必用是何與前説相反耶戒不用者明時令之常慮輕用也勸必用者發病機之理慮遺用也或舍時從症或舍症從時臨症變通存乎其人倘一概疑懼惟以輕和之劑代之必有陰受其夭折而莫之覺者該通君子其熟察之大青龍湯仲景曰太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍主之麻黃六兩去節桂枝二兩去皮甘草一兩炙杏仁四十枚去皮尖生薑三兩切大棗十枚去核石膏如雞子大碎水九升先煮麻黃減二升去上沫納諸藥煮取三升溫服一升取微汗一服汗者停後服汗多亡陽遂虛惡風煩躁不得眠也成氏曰此中風見寒脈也浮則為風風則傷衛緊則為寒寒則傷榮榮衛俱病故發熱惡寒身疼痛也風並於衛者為榮弱衛強寒並於榮者為榮強衛弱今風寒兩傷則榮衛俱實故不汗出而煩躁也青龍者東方甲乙木神也專主生髮之令萬物出甲開甲則有兩歧肝有兩葉以應之所以謂之青龍中風脈浮緊為中風見寒脈傷寒脈浮緩為傷寒見風脈是風寒兩傷也桂枝湯解肌以祛風而不能已其寒麻黃湯發汗以散寒而不能去其風故特取大青龍以兩解之麻黃甘溫桂枝辛熱寒則傷榮以甘緩之風則傷衛以辛散之故麻黃為君桂枝為臣也甘草甘平杏仁甘苦苦甘為助佐麻黃以發表大棗甘溫生薑辛溫辛甘相合佐桂枝以解肌石膏辛甘微寒夫風陽邪也寒陰邪也風傷陽寒傷陰陰陽兩傷非輕劑所能獨散也必須輕重之藥同散之是以石膏為使而專達肌表也陶氏曰此湯險峻須風寒俱甚又加煩躁方可與之不如桂枝麻黃各半湯為穩愚按龍者至神至雄主行雨者也今用以發風木之邪而行其汗有速效之神有莫御之雄且經曰陽之汗以天地之雨名之故命曰青龍湯白虎湯主傷寒傳入於胃脈大而長仲景曰浮滑表裡俱熱煩渴知母六兩石膏一斤打碎甘草二兩炙粳米六合水一斗煮米熟湯成溫服一升日三服傳胃則邪入里矣仲景言浮滑以邪亦未解也成氏曰白虎湯解內外之邪白虎西方金神應秋而歸肺熱甚於內者以寒下之熱甚於外者以涼解之中外俱熱內不得泄外不得發非此湯不能解也夏熱秋涼湯名白虎言秋氣至而熱去也知母苦寒經曰熱淫所勝佐以苦甘又曰熱淫於內以苦發之故以知母為君石膏甘寒熱則傷氣寒以勝之甘以緩之故以石膏為臣甘草粳米味皆甘平脾欲緩急食甘以緩之故以甘草粳米為使太陽中暍得此頓除熱見白虎而盡矣立秋後不可服服則不能食多成虛羸愚按知母之寒不及石膏況知母但主內熱不能解肌況止用六兩恐非君也宜作臣石膏入肺屬金其色又白其性又雄正與白虎之義相合且用一斤恐非臣也宜作君珍珠囊論石膏之性而謂仲景有白虎之名因名責實則豈非此方之君主耶大承氣湯傷寒寒邪入里痞滿燥實四症俱全枳實炙五枚厚朴半斤炙去皮芒硝三合大黃四兩酒洗水一斗先煮枳朴取五升去渣納大黃煮取二升去滓納芒硝微火一二沸分溫再服成氏曰承順也邪入胃者鬱滯糟粕祕結壅實氣不得順也本草云通可去滯泄可去閉氣得以順故曰承氣王冰曰宜下必以苦故以枳實為君經曰燥淫於內治以苦溫泄滿除燥苦溫為輔是以厚朴為臣經曰熱淫於內治以鹹寒傷寒則熱故以芒硝為佐經曰燥淫所勝以苦下之故以大黃為使大滿大實有燥屎乃可投也如非大滿則生寒症而為結胸痞氣之屬矣愚按調胃承氣不用枳朴以其不作燥滿恐傷上焦虛無氤氳之氣也小承氣不用芒硝以其雖實未堅恐傷下焦真陰之分也此則上中下三焦皆病痞滿燥實四症俱全故以本方主之仲景曰欲行大承氣先與小承氣腹中轉失氣者有燥屎也可以大承氣湯攻之不轉失氣慎不可攻大柴胡湯治陽邪入里表症未除里症又急柴胡八兩黃芩三兩枳實四枚炙芍藥三兩生薑五兩切半夏半升洗大棗十二枚去核大黃二兩生用酒洗水一斗二升煮六升去滓再煎服一升日三服成氏曰大滿大實則有承氣湯如不大堅滿惟熱甚而須攻下者必須輕緩之劑乃大柴胡也傷寒可下則為熱折熱必以苦故以柴胡為君黃芩為臣經曰酸苦湧泄為陰泄實折熱必以酸苦故以芍藥枳實為佐辛者散也散逆氣者必以辛甘者緩也緩正氣者必以甘故用半夏薑棗為使也加大黃功專蕩滌不加恐難攻下應以為使也愚按表症未除者寒熱往來脅痛口苦尚在也里症又急者大便難而燥實也此為兩解之劑小柴胡湯主傷寒五六日往來寒熱胸脅苦滿脅痛耳聾默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹痛或脅下痞或心下悸小便不利或不渴身有微熱或咳者此邪在少陽經半表半裡之症也柴胡八兩黃芩三兩人參三兩甘草炙三兩半夏半升洗生薑三兩切大棗十二枚去核水一斗二升煮取六升去滓再煎取三升溫服一升日進三服成氏曰邪在表則寒在裡則熱半表半裡故寒熱往來在表則不滿在裡則脹滿止言胸脅苦滿知在表裡之間少陽行身之側胸脅為少陽之部其脈循脅絡於耳故胸脅痛而耳聾在表則呻吟在裡則煩亂經曰陰入之陰則靜默默者在表裡之間也在表則能食在裡則不能食不欲飲食者邪在表裡之間未至於不能食也在表則不煩嘔在裡則煩嘔心煩喜嘔者邪在表方傳裡也經曰熱淫於內以苦發之柴芩之苦以發傳邪之熱里不足者以甘緩之參草之甘以緩中和之氣邪半入里則裡氣逆辛以散之半夏以除煩嘔邪在半表則榮衛爭之辛甘解之薑棗以和榮衛仲景曰胸煩不嘔去半夏人參加栝蔞實一枚渴者去半夏更加人參一兩五錢栝蔞根四兩腹痛者去芩加芍藥三兩脅下痞去大棗加牡蠣四兩心悸小便不利去芩加茯苓四兩不渴外有微熱去參加桂枝三兩溫覆取微汗咳者去參薑棗加五味子半升乾薑二兩愚按近世治傷寒不分表裡陰陽概用此方去參投之取其平穩不知此為半表半裡之劑太陽經之表熱陽明經之標熱皆不能解也若夫陽氣虛寒面赤發熱脈沉足冷者服之立至危殆可不慎哉即大便不實脈息小弱者皆在所禁信乎用方不當皆可殺人不獨峻劑也大陷胸湯傷寒下之早從心下至少腹硬滿而痛手不可近者大結胸也此方主之甘遂一錢芒硝一升大黃六兩去皮水六升先煮大黃取二升去滓納芒硝煮一二沸納甘遂末溫服一升得快利止後服三陽經表症未解用承氣以攻裡者下之早也下早則裡虛表邪乘之而入三焦皆實故心下至少腹痛不可近也成氏曰諸陽受氣於胸中邪氣與陽氣相結不可分解高者陷之故曰陷胸陷胸破結非苦寒直達者不能是以甘遂為君經曰鹹味湧泄為陰又曰咸以軟之是以芒硝為臣蕩滌邪寇將軍之職也是以大黃為使傷寒錯惡結胸為甚非此駃劑不能通利小陷胸湯下早熱結胸中按之則痛小結胸也半夏湯洗半升黃連一兩栝蔞實大者一枚水六升先煮栝蔞取三升去滓納諸藥煮取二升分溫三服止在胸中不及於腹按之則痛不按猶未痛也故曰小結胸經曰苦以泄之辛以散之黃連泄胸中之熱栝蔞泄胸中之氣半夏散胸中之痰一服未能即和再服微解下黃涎便安也半夏瀉心湯主傷寒下早心滿而不痛者為痞半夏半升洗黃芩乾薑人參去蘆甘草炙以上各三兩大棗十二枚去核水一斗煮六升去滓煎取三升溫服一升日三服加甘草一兩即甘草瀉心湯治痞硬吐利加生薑四兩即生薑瀉心湯治痞硬噫氣成氏曰結而不散壅而不通為結胸陷胸湯為直達之劑塞而不通否而不分為痞瀉心湯為分解之劑痞與結胸有高下焉邪結在胸中故曰陷胸湯留邪在心下故曰瀉心湯黃連黃芩皆苦寒經曰苦先入心以苦泄之是以黃連為君黃芩為臣以降陽而升陰也半夏辛溫乾薑辛熱經曰辛走氣辛以散之故以半夏乾薑為佐以分陰而行陽也甘草甘平參棗甘溫陰陽不交為痞上下不通為滿欲通上下交陰陽必平其中中者脾胃也脾不足者以甘補之故用參棗甘草為使上下得通水升火降則痞熱自消矣真武湯太陽病發汗過多心悸有水頭眩筋惕身瞤動振振欲劈地者此方主之茯苓三兩白朮二兩芍藥生薑各三兩附子制一枚水八升煮三升溫服七合日三服經曰陽氣者精則養神柔則養筋汗多而心悸有水此心亡津液腎水反上而凌心虛邪內動筋內失養故跳動也成氏曰真武北方水神屬腎應水水在心下外帶表而屬陽必應發散故治以真武湯茯苓甘平白朮甘溫脾惡濕腹有水氣則脾不治脾欲緩急食甘以緩之故以茯苓為君白朮為臣芍藥酸寒生薑辛溫經曰濕淫所勝佐以酸辛故以為佐附子辛熱經曰寒淫所勝平以辛熱故以為使今之汗多而成瞤動之症者多矣醫者畏附而不投病者亦甘斃而不悟於是夭折者多矣古人惓惓立方之意其謂之何建中湯主傷寒腹中急痛膠飴一升甘草一兩炙桂枝三兩去皮芍藥六兩大棗十二枚去核生薑三兩切水七升煮三升去滓納膠飴微火消解溫服一升日三服嘔家不用建中以甜故也邪氣入里與正氣搏則腹痛太陽腹不痛少陽有胸脅痛而無腹痛陽明腹滿痛此為裡實宜下之三陰下痢而腹痛者裡寒也宜溫之陽氣傳太陰而痛其症有二腹滿便閉按之痛者實也宜下之腸鳴泄利而痛者虛也宜與建中湯成氏曰脾應中央一有不調則榮衛失所育津液失所行必以此湯溫建中臟故建中名焉膠飴甘溫甘草甘平脾欲緩急食甘以緩之故以飴為君甘草為臣桂枝辛熱辛散也潤也榮衛不足潤而散之芍藥酸寒酸收也泄也津液不逮收而行之是以桂枝芍藥為佐生薑辛溫大棗甘溫胃者衛之源脾者榮之本黃帝針經曰榮出中焦衛出上焦是已衛為陽益之必以辛榮為陰補之必以甘辛甘相合脾胃健而榮衛通是以薑棗為使梔子豉湯主汗吐下後心煩不得眠心中懊憹梔子十四枚香豉四臺綿裹水四升先取梔子取二升半去滓納豉更煮取一升半分二服溫進一服得快吐者止後服成氏曰經曰其高者因而越之其下者引而竭之中滿者瀉之於內其有邪者漬形以為汗其在皮者汗而發之治傷寒之妙雖有變通終不越此數法也邪氣自表傳裡留於胸中為邪在高分則可吐之所吐之症亦自不同如不經汗下邪氣蘊鬱於膈謂之膈實應以瓜蒂散吐之若汗吐下後邪氣乘虛留於胸中謂之虛煩應以梔子豉湯吐之梔子苦寒經曰酸苦湧泄為陰湧者吐也是以梔子為君煩為熱勝湧熱者必以苦勝熱者必以寒香豉苦寒是以為臣經曰氣有高下病有遠近證有中外治有輕重適其所以為治依而行之所謂良矣愚按心中懊憹若無燥屎大便軟者吐症也若有燥屎不大便者下症也毫釐疑似之間關人生死奈何不悚然懼耶抵當湯主身黃如狂屎黑喜忘皆有蓄血症也水蛭三十個熬虻蟲三十個去足翅熬桃仁三十個去皮尖大黃三兩酒浸水五升煮取三升溫服一升未利再服成氏曰血蓄於下非大毒駃劑不能抵當故曰抵當湯經曰咸勝血故以水蛭鹹寒為君苦走血血結不行必以苦為助故以虻蟲苦寒為臣肝者血之源血聚則肝燥肝苦急急食甘以緩之散血緩肝故以桃仁苦甘為佐濕氣在下以苦泄之血亦濕類也是以大黃苦寒為使九味羌活湯主兩感傷寒及四時不正之氣憎寒壯熱頭疼身痛口渴人人相似者羌活二錢防風一錢五分蒼朮一錢細辛三分川芎一錢三分白芷一錢黃芩一錢甘草三分生地黃一錢上生薑三片蔥一莖水煎服出汗用熱止汗用溫兩感為死症其人壯盛者猶可活百中之一黃芩生地為裡熱之藥羌活細辛為解表之藥乃和平表里之輕劑耳吳昆曰非其時而有其氣長幼之病多相似藥之辛者得天地之金氣於人則義故能匡正而黜邪羌活蒼細芎芷皆辛物也邪在太陽治以羌活邪在陽明治以白芷邪在少陽治以黃芩邪在太陰治以蒼朮邪在少陰治以細辛邪在厥陰治以川芎防風為諸藥之卒徒生地去血熱甘草和諸藥而除氣中之熱易老自序云冬可治寒夏可治熱春可治溫秋可治燥是諸路之應兵也但陰虛氣弱之人非所宜與清燥湯治元氣不足濕熱乘之遍身痠痛或肺受火邪腎無所養小便赤少大便不調腰腿痿軟口乾作渴體重麻木頭目暈眩飲食少思自汗盜汗肢體倦怠胸滿氣促黃耆一錢五分五味子九粒黃連炒神麯炒豬苓柴胡甘草炙各二分蒼朮炒白朮炒麥門冬去心陳皮生地黃澤瀉白茯苓去皮人參去蘆當歸升麻各三分黃柏酒拌一分上水煎服金者水之母也氣者水之源也肺被火傷真氣不足絶寒水生化之源則水液衰涸金燥轉增而諸症作矣黃耆甘溫益元氣而實皮毛用以為君人參茯苓麥冬五味扶其不勝之金地黃當歸黃柏澤瀉救其衰微之水二術補金宮之母升柴法春令之升黃連神麯陳皮甘草豬苓滲中州之濕熱亦顧母救子之法也濕去熱清燥金獲潤則水出高源何疾不瘳哉葛花解酲湯專治酒積上中下分消白豆蔻砂仁葛花各一錢木香一分青皮六分陳皮白茯苓豬苓人參各二分白朮炒神麯炒澤瀉乾薑各四分水二盅煎一盅服曲糵之積令人腹痛蓋中州受傷氣逆而濕鬱也豆蔻砂仁推逆氣有功且兼辛散之力葛花獨入陽明令濕熱之毒從肌肉而解故以三味為君解上焦之酲也茯苓豬苓澤瀉令濕熱之毒從小便而出故以三味為臣解下焦之酲也參朮木香二皮乾薑中氣賴以調和濕熱搗其巢穴解中焦之酲也人參安胃湯治脾胃虛熱嘔吐或泄瀉不食人參一錢黃耆二錢炒生甘草五分炙甘草五分白芍藥七分白茯苓四分陳皮三分黃連二分炒上水煎服脾胃虛傷補中益氣或四君子異功散可也此獨於甘溫劑中加芍藥之酸寒黃連之苦寒蓋因乍虛而內有燥熱故暫用以伐其標也白朮為補胃正藥何不用乎此名安胃與補胃不同胃氣純虛術為要品今雖虛而有燥熱則胃不安也故不用術者懼其燥耳以三錢之參耆投以二分之炒連與世俗之肆用苦寒者自有別也竹葉黃耆湯治胃虛火盛而作渴竹葉二錢黃耆生地黃麥門冬當歸川芎甘草黃芩炒石膏煅芍藥人參各一錢上水煎服夫胃氣大虛苦寒甘寒皆在禁例此云胃虛者其人居恆胃虛而又為火邪迫之則水精不能上輸乃為煩渴是非中暑之餘殃即是傷寒之遺害以竹葉清心用為主劑石膏甘草直入陽明而滌熱黃芩麥冬直入太陰以清燥火甚則血液不榮用地黃芎歸潤澤之品者血主濡之也胃虛則氣道不充用人參黃耆甘溫之品者氣主煦之也芍藥瀉東方安胃土之仇讎也心肺俱清肝脾俱治則水精四布五經並行何煩渴之不痊哉竹葉石膏湯治胃實火盛而作渴竹葉石膏煅桔梗木通薄荷甘草各一錢上水煎服陽明外實柴葛解肌陽明內實承氣攻滌此云胃實非有稽留但多陽焰耳火實則南方必盛以竹葉瀉之火亢則西方必囚以桔梗救之薄荷清其上木通清其下石膏甘草直入戊土而清其中三焦之火皆平則水精上輸於肺水道下輸膀胱燔蒸若掃而津液自充矣四七湯治七情鬱結心腹絞痛或為膨脹人參官桂半夏各一錢甘草炙五分上薑三片水煎服夫七情過極皆傷其氣怒則氣上喜則氣緩悲則氣消恐則氣下驚則氣亂思則氣結丹溪以越鞠丸主之而此獨異者蓋郁久則濁氣不通為閉塞成冬之象而清氣日以薄矣故心腹雖痛胸膈雖臌而不與木香厚朴但用人參以壯主氣之臟官桂以制謀慮之官久郁生痰半夏為之祛逐久郁不和國老為之調停況桂性辛溫疏氣甚捷譬如陽春至而閉塞通鬱結者還而為和暢矣湯名四七者以四味治七情也犀角地黃湯治血虛火盛吐衄妄行溺血便血犀角鎊末生地黃白芍藥牡丹皮各一錢五分上水煎去渣入犀角末服之如因忿怒致血者加山梔柴胡血陰位也主乎靜定者也陽火擾之則不得安其靜定之常或從口鼻或從二便妄行而不止法當急治之稟陰氣至純者莫過於犀角得濁陰下降者莫過於地黃白芍酸收丹皮清降涼血止血之要品瀉南實北之神方也因於怒者氣必逆上故加山梔以屈曲下行肝喜疏泄故加柴胡以達其木鬱本用四味獨名犀角地黃者所重在二味白芍丹皮不過佐助耳地黃飲子治腎氣虛弱語言蹇澀足膝痿廢熟地黃巴戟去心山茱萸肉蓯蓉去甲附子炮五味子石斛白茯苓石菖蒲遠志去心肉桂麥門冬上各一錢入薄荷少許薑三片棗二枚煎服腎之脈出然谷循內踝上踹及股故虛則足痿不能行其直者挾舌本故虛則舌蹇不能言地黃巴戟茱萸蓯蓉精不足者補之以味也附子官桂陽不足者溫之以氣也遠志菖蒲使心氣下交也麥冬五味壯水之上源也茯苓石斛走水穀之府化榮衛而潤宗筋者也不及肝者腎肝同治也諸臟各得其職則筋骨強而機關利蹇澀痿廢失復何虞清胃湯治膏粱之變曲糵之災唇齒作痛或潰爛生瘡甚而頭面頸項俱痛黃連炒一錢五分當歸生地各一錢牡丹皮一錢升麻二錢上水二盅煎一盅服胃者水穀之海一切飲食之毒陽明先受之口齒者胃之應也內毒醞釀積熱熏蒸則病顯於外故口齒瘡潰而疼痛不已諸痛屬實也升麻為陽明之引經且症在上者尤為相宜也用以為君黃連之苦本歸丙丁得升麻則引而入胃矣況諸瘡痛癢皆屬於心火故用以為臣歸地益陰殺其亢烈之威丹皮下行開其一面之路而倉廩之官獲有寧宇矣加犀角連翹甘草無非瀉其南方為症深者設也調中益氣湯治勞傷元氣肢體倦怠脾肺虛弱自汗盜汗內熱作渴等症黃耆一錢人參甘草炙當歸白朮各五分白芍藥柴胡升麻各三分陳皮二分五味子十五粒水二盅煎至一盅去渣溫服此方但於補中益氣加白芍五味而已補中益氣純用甘溫但行春升之令此加酸斂兼持秋肅之權氣虛多汗散而不收如夏氣之蒸溽也金商一奏而炎歊如失矣蓋有升有降能發能收則天地交通菀藁生遂此東垣先生別行一路以廣補中之妙者乎桃仁承氣湯治蓄血中焦腹中急結下利膿血桃仁五個桂心舊誤桂枝芒硝甘草各二錢大黃四錢水二碗煎一碗去渣內芒硝待沸溫服腹中急結緩以桃仁之甘中焦蓄血散以官桂之辛蓋甘以緩之辛以散之也熱甚血凝或干閉或下膿血非硝黃不足以徹其籓籬入甘草者欲其委曲搜剔不欲其一往而盡耳按犀角地黃湯治上焦之血抵當湯治下焦之血此治中焦之血宜用桂心舊本誤作桂枝成氏隨文順釋不足據也今改正之升麻葛根湯治脾臟發咳咳而右脅痛痛引肩背甚則不可以動及無汗惡寒陽明發斑欲出未出以此發之升麻白芍藥甘草各二錢葛根三錢上水二盅煎一盅服右脅者脾胃之鄉也肩者手陽明之脈也斑繇胃熱胃主肌肉用升麻葛根直入陽明而逐其邪熱佐之以芍藥使之以甘草和其營也俾無伏匿之邪也其治發斑此宜於將出者若已出而用之重虛其表反增斑爛矣升麻六物湯治赤斑口瘡赤爛升麻梔子各一錢五分大青杏仁黃芩各一錢蔥白三莖水二盅煎一盅溫服斑者肌肉之症應在陽明或失汗或失下或下早或下遲或陽症誤溫則熱甚傷血裡實表虛皆為斑症口亦陽明之應熱上蒸迫故瘡赤而爛也以升麻為嚮導之兵以青梔為解紛之客杏仁佐升麻黃芩佐梔子皆引邪外出自肌肉而達於皮毛也毒氣外宣火威下抑中州之禍吾知免夫大黃黃連瀉心湯治心下痞按之濡關上脈浮大黃五錢黃連二錢五分上取沸湯泡須臾去渣溫服仲景曰心下痞明明在胃脘矣用大黃黃連瀉胃中濕熱非瀉心也病發於陰而下之則痞滿乃寒傷營血邪氣乘虛結於胃脘胃之上脘正當心下故名瀉心實則瀉胃也詳見大黃條下不用煎煮但取湯漬者瀉虛熱者宜氣薄也四逆湯治陰症脈沉身痛太陰自利不渴附子三錢甘草乾薑各一錢五分水盅半煎八分服脾為太陰而主四肢四肢厥冷繇於真火無光無氣以布也寒傷營衛則身痛幽門氣衰則不禁有水無火故不渴非附子斬關之將將有噬臍之悔矣得乾薑則達中州貫至高而陽氣可回耳偏於燥熱恐有喜攻之害甘草以緩之赫曦轉為青帝矣散方十二首散者散也主於散去病邪較丸散則功速較煎劑則功緩補劑亦有散者則又以燥濕為義往往為脾胃之方也瓜蒂散主胸中多痰氣上衝咽喉不得息瓜蒂炒黃赤小豆各等分上為細末取一錢用豉一合湯七合煮作稀糜去滓取汁和散頓服之不吐少少加得吐乃止諸亡血虛家不可與服華他曰四日在胸可吐之迎而奪之之法也千金方曰氣浮上部胸中滿者吐之經曰濕氣在上以苦吐之瓜蒂苦寒是以為君經曰酸苦湧泄為陰赤小豆味酸是以為臣香豉苦寒苦以湧泄寒以勝熱是以為使吐中駃劑重亡津液之藥也稀涎散主中風暴僕痰涎壅盛此藥取吐牙皂四條去皮弦炙白礬二兩枯共為末每進三字水下經曰邪風之至疾如風雨又曰暴氣象雷又曰陽氣者閉塞又曰徇蒙招尤目冥耳聾皆言陽氣之乘人以明症之急且重也吳氏曰清陽在上濁陰在下天冠地履無暴僕也若濁邪逆湧清陽失位故暴僕而多痰耳經曰病發而不足標而本之先治其標後治其本故不與疏風補虛而先吐其痰涎白礬酸苦經曰酸苦湧泄故以為君皂角辛鹹經曰辛以散之咸以軟之故以為佐此固奪門之兵也咽喉疏通能進湯液便止若攻盡其痰則無液以養筋令人攣急偏枯此大戒也平胃散治脾濕痰飲痞隔或嵐氣霧露不服水土蒼朮泔浸七日五斤陳皮去白厚朴薑汁炒各三斤甘草炙三十兩共為末白滾湯點服濕土太過謂之敦阜腎挾肝邪侮所不勝土不能制留於中焦故痞隔也嵐霧之毒水土之症陽明虛者受之蒼朮甘燥甘則入脾燥則勝濕故以為君厚朴苦溫溫能益脾苦可下氣故以為臣佐以陳皮之辛正下行之令和以炙草之甘為嚮導之兵濕氣分消敦阜以平所以有平胃之名也參苓白朮散治脾胃虛弱不進飲食或瀉或嘔人參去蘆茯苓去皮白朮土炒甘草炙山藥炒扁豆去殼炒各四兩砂仁炒去衣桔梗炒去蘆薏苡仁炒蓮肉去衣及心各二兩上共為末薑棗湯調服脾胃屬土土為萬物之母故東垣曰脾胃虛則百病生然則調理中州其首務也脾悅甘故用人參甘草苡仁脾喜燥故用白朮茯苓脾喜香故用砂仁心生脾故用蓮子治心土惡水故用山藥治腎桔梗入肺能升能降所以通天氣於地道而無否塞之憂也玉屏風散主氣虛表弱自汗不已易感風寒黃耆炙防風各一兩白朮二兩土炒共為末每服三錢白湯下衛氣虛薄則玄府不閉陽不能固自汗乃出黃耆甘溫專充肉分是以為君防風入肺貫徹皮毛故東垣曰黃耆得防風而功愈大是以為臣白朮甘溫入脾脾主肌肉故以為佐以其善補衛外足為吾身之倚庇故玉屏風之名立焉六一散主中暑身熱煩渴小便不利滑石六兩白膩者水飛細甘草一兩上為末每用五錢新汲水調服身熱煩渴陽明症也小便不利太陽症也滑石味甘淡甘入中央淡則五臟無歸專入太陽利便滑則利竅不獨小便也故以為君然石性大寒能傷中州太滑能滲真氣經曰以甘緩之故用甘草為佐經曰治溫以清涼而行之故用新汲水調夫天一生水地六成之此太陽寒水之數也經曰寒勝熱此方專主丙丁故有取於六一之數焉二妙散主濕熱為患腰膝疼痛不能行動黃柏乳潤一宿蒼朮泔浸七宿上二味等分為末空心酒服三錢溫性有就下之義故其病在中半以下濕則生熱溫熱相搏其痛乃作黃柏味苦苦勝熱且能下行故以為君蒼朮性燥燥勝濕且能辛散故以為臣黃柏可去熱中之濕蒼朮可去濕中之熱兩者相綰各有妙用故曰二妙十灰散治嘔血吐血咯血嗽血先用此方止之大薊小薊柏葉荷葉茅根茜根大黃梔子丹皮棕櫚皮各等分上燒灰存性研細碗蓋地上一夕出火毒用時先將藕汁或蘿蔔汁磨京墨半碗調服五錢血屬陰反從火化故其色赤為陽所動則血菀於上使人薄厥黑屬壬癸見黑則止者火見水而伏也故用灰與墨汁苦澀之味聚而用者苦能勝火澀可固脫更得童便引之下行尤盡折伏之妙勝於蘿蔔藕汁也藿香正氣散治外感風寒內傷飲食頭痛寒熱或霍亂泄瀉或作瘧疾桔梗大腹皮厚朴制升麻茯苓各一錢甘草炙五分藿香一錢五分紫蘇一錢上薑三片棗一枚煎熱服正氣旺則皮毛充固外無感冒之虞脾胃健行內無停食之患正氣稍有不足外感內傷交作以甘桔紫蘇辛甘發散其外邪厚朴大腹苦辛宣通其內滯更以藿香為君主內可和中外可解表統領諸劑成功正氣賴以復矣故名藿香正氣不換金正氣散治脾氣虛弱寒邪相搏痰停胸膈寒熱為瘧厚朴薑製藿香半夏蒼朮泔浸粳炒陳皮各一錢甘草炙五分上薑三片棗一枚水煎熱服正氣指中氣也中氣不和水濕不行則痰生為患蒼朴陳甘平胃散也所以助胃土之敦阜而使之平也佐以藿香一身之滯氣皆宣助以半夏滿腹之痰涎盡化俾正氣得以轉輸邪氣無繇乘襲可貴孰甚焉雖有黃金吾不與易矣故名霹靂散治陰盛隔陽身熱脈浮煩躁欲水附子一隻炮用冷灰埋之取出細研入真臘茶一錢同研分二服每服水一盅煎六分入蜜一匙冷服陰寒太盛隔陽於外此即內真寒而外假熱也無根之虛陽在外故脈浮而大按之如無非表邪也煩躁者陰寒發躁水極似火之象欲水者欲坐井中為外有虛熱故也此寒極反見勝己之化譬如冬月嚴寒水泉冰堅堅為陽象反於極寒乃見也若誤以為熱輕與寒涼須臾之頃便入幽泉矣可不謹諸方名霹靂者即所謂一聲雷破臘萬象盡回春之義也紫雪散治腳氣及暑中三陽所患必熱煩躁發斑等症升麻六錢黃金十兩寒水石石膏各四兩八錢犀角羚羊角各一兩玄參一兩六錢沉香木香丁香各五錢甘草八錢水五碗煮金至三碗去金入諸藥再煎至一盅去渣投朴硝二兩二錢微火煎柳條勿停手攪候欲凝入盆中更下硃砂麝香各三錢急攪令勻候冷凝成雪每服一錢細細咽之煩躁發斑症在陽明大青升麻用而下效其毒深矣草木無功進求金石黃金稟中央陰巳之氣合西方從革之行且能鎮定可肅妄炎二石有冰霜之度二角有凜冽之風玄參補其北硃砂瀉其南制以四香無增氣之虞君以朴硝有隆冬之象群陰並集賴升麻以導入陽明雖有苛毒行且冰消矣方名紫雪者取其色喻其功也膏方六首膏者膏也虛則重補其脂膏又肺經之藥不厭頻而少既取其便於頻又取其潤也地黃膏主滋陰降火養血清肝生地黃一斤酒洗當歸身三兩酒洗白芍藥一兩五錢炒甘枸杞六錢牡丹皮二錢便炒知母鹽酒多炒地骨皮炒人參去蘆甘草各五錢水二斗煎一斗去滓熬煉成膏夫陰虛者未有不火動苦寒直泄之藥惟病端初起元氣未虛勢方蘊隆脈鼓而數者暫取治標稍久涉虛便不可服王太僕曰治熱未已而中寒更起且足太陰傷而絶肺金孕育之原矣茲以地黃為君知母為臣壯天一之水以制丙丁不與之直爭也當歸芍藥以沃厥陰腎肝同治之法也水衰則火旺是以二皮為鈐制火盛則金衰是以二冬為屏障人參蓮子補金位之母甘草生用所以奉令承使奔走贊成者也若火勢既平而中宮虛弱者亟進參朮膏以壯倉廩之官參朮膏治虛勞之人脾胃虧損或脹或瀉人參去蘆白朮土炒各八兩薏苡仁四兩炒蓮肉三兩去皮及心黃耆二兩蜜炙茯苓二兩去皮神麯一兩炒澤瀉炒甘草炙各三錢水二斗熬一斗去滓再熬成膏經曰清氣在下則生飧泄濁氣在上則生䐜脹此皆土虛並金亦薄遂失其升降之常耳經曰脾欲緩急食甘以緩之以苦泄之白朮苦甘是以為君東垣曰脾胃虛則氣不足人參甘溫補氣是以為臣氣不足者肉分不充故佐以黃耆土虛則不能生金故佐以苡仁虛則補其母故佐以蓮子土惡濕虛則水寡於畏故佐以茯苓澤瀉土虛則不善散精輸肺故佐以神麯通五方之氣於太陰和諸藥之性而無忤者甘草為使之力也人參固本膏治腎虛肺熱喘嗽煩渴人參二兩天門冬去心麥門冬去心生地黃酒洗熟地黃各四兩上以二冬二地熬成膏以人參細末和勻時時挑少許置口中噙化天一生水故腎為萬物之元人身之本自伐其元則本不固而勞熱作矣熱則火刑金而喘嗽生焉取二地以補腎為君精不足者補之以味也取二冬以保肺為臣虛則補其母也火刑金而肺氣衰非人參莫可救援東垣所謂無陽則陰無以生也倘泥肺熱傷肺之説則孤陰不長不幾於坐而待斃耶瓊玉膏治虛勞乾咳生地黃四斤白茯苓十三兩白蜜二斤人參六兩上以地黃汁同蜜熬沸攪勻用絹濾過將參苓為細末和勻前汁入磁瓶用綿紙十數層加箬封札瓶口入砂鍋內以長流水煮沒瓶頸用桑柴火煮三晝夜取出換油紙扎口以蠟封固懸井中一日取起仍煮半日白湯點服乾咳者有聲無痰火來乘金金極而鳴也此本元之病非悠遊漸漬難責成功若誤用苦寒只傷脾土金反無母故丹溪以地黃為君令水盛則火自息也損其肺者益其氣故用人參以鼓生髮之元虛則補其母故用茯苓以培萬物之本白蜜為百花之精味甘歸脾性潤悅肺且緩燥急之火四者皆溫良和厚之品誠堪寶重郭機曰起吾沉瘵珍賽瓊瑤故有瓊玉之名示人知所珍也五味子膏治夢遺精滑及火嗽極效北五味子一斤水浸一宿去核入砂鍋煎之去渣入蜜三斤共熬成膏須微火為妙上每服二三匙空心白湯下北方之令主閉藏神氣虛怯則不能收固五味子味酸酸者束而收斂能固耗散之精有金水相生之妙況酸味正入厥陰厥陰偏喜疏泄乃圍魏救趙之法也一物單行功專力鋭更無監製故為效神速不可多服久服必有偏勝之患龜鹿二仙膠大補精髓益氣養神鹿角血取者十斤龜板自敗者五斤枸杞子甘州者三十兩人參清河者去蘆十五兩上用鉛壇如法熬膠初服酒化一錢五分漸加至三錢空心下人有三奇精氣神生生之本也精傷無以生氣氣傷無以生神故曰天一生水水為萬物之元精不足者補之以味故鹿角為君龜板為臣鹿得天地之陽氣最全善通督脈足於精者故能多淫而壽龜得天地之陰氣最厚善通任脈足於氣者故能伏息而壽二物氣血之屬又得造化之玄微異類有情竹破竹補之法也人參為陽補氣中之怯枸杞為陰清神中之火故以為佐是方也一陰一陽無偏攻之憂入氣入血有和平之美繇是精生而氣旺氣旺而神昌庶幾享龜鹿之年矣故曰二仙白朮膏補胃健脾和中進食白朮十斤取於潛出者先煮粥湯待冷浸一宿刮去皮淨切片用山黃土蒸之曬乾再以米粉蒸之曬乾聽用上用水百碗桑柴火煎取三十碗加白蜜二斤熬成膏每服一酒杯淡薑湯點服太陰主生化之元其性喜燥其味喜甘其氣喜溫白朮備此三者故為中宮要藥配以白蜜和其燥也且甘味重則歸脾速陶氏頌云緑葉抽條紫花標色百邪外御六府內充木榮火謝盡採擷之難啓且移申窮淋漉之劑味重金漿芳逾玉液夫豈無故而得此隆譽哉醫案論第二十三醫典極博茫如望洋自非有恆未有不廢然返者夫醫之難非處常之難處變之難也毫釐疑似之間判若千里之隔苟無確然之見而拘於常其不夭人之年者鮮矣余儒者也鉛槧是攻而又與知醫寧免挂漏之譏然沉心綜考之餘冰兢倍謹愚而自用矢不敢為繆辱知信往往取驗其療處常之症不敢贅録摘一二治之變者謹述如下知我者其惟此案乎罪我者其惟此案乎吏部少宰蔣恬庵署禮部時患手足麻痹目中睹一成兩服補血藥不應改服脾藥痰藥精神困倦余診得寸口脈大兩尺獨澀此心腎不交水泛為痰之故也乃取地黃丸料作煎劑倍用澤瀉茯苓入青鹽少許凡六劑而岐視遂收乃兼進參耆安神之劑一月而康復如常屯田孫待御瀟湘夫人久痢不止口乾發熱飲食不進猶服香連等藥完穀不化尚謂邪熱不殺穀欲進芩連數日不食熱甚危迫余診之脈大而數按之極微詢之小便仍利腹痛而喜手按此火衰不能生土內真寒而外假熱也小便利則不熱可知腹喜按則虛寒立辨亟進附子理中湯待冷與一劑而痛止連進一十餘劑兼服八味丸而康徽州太學方魯儒精神痕倦腰膝異痛不可忍醫者皆曰腎主腰膝乃用桂附之劑綿延兩月愈覺四肢痿軟腰膝寒冷遂恣服熱藥了無疑懼比余視之脈伏於下極重按之振指有力因思陽盛格陰乃火熱過極反兼勝己之化欲用苦寒之藥駭而弗從又半月而寒愈甚復來求治余曰寒勢日增乃熱毒愈甚也小便當赤必畏沸湯詢之果然方能信悅余以黃柏三錢龍膽草二錢芩連梔子各一錢五分加生薑七片為之嚮導乘熱頓飲移時便覺腰間暢快三劑而痛若失矣用人參固本丸日服二兩一月而痊安孟太宗師胃脘痛甚狀若感冒因而廢食用木香豆蔻陳皮枳殼理氣之劑痛勢不減心脾兩部緩而且澀此內傷不足之候也法當峻補而原醫者曰痛無補法通則不痛矣寧敢用此反劑耶余曰此固正劑也若再進攻伐之藥請勿復敢見矣乃進參耆各三錢歸朮陳皮各二錢酸棗仁一錢服之是夕能食痛勢頓減調補數日而瘥同邑郡守張三星脾胃不和久患泄瀉用分利燥濕之劑不效診其脈右手寸關滑甚與二陳滾痰之藥再服而瀉止未幾感冒發熱惡寒困倦之甚診得六部大而無力人迎與氣口亦略相當遂與補中益氣湯連服一月而安同邑社友俞敬敷飲食不均遠行勞倦發熱煩悶症類傷寒乃禁食不與比余視之言語輕微手背不熱六脈數而軟此真氣不足非有外邪也力勉其進粥乃與甘溫大補之劑恪服數日熱退而安同邑吳君明患傷寒至六日譫語狂笑不大便衆皆欲用大承氣湯下之余見其小便清因思仲景曰傷寒不大便六七日頭痛有熱小便清知不在裡仍在表也欲用桂枝湯群然誹謗以為此陽盛之症桂枝到口必斃矣余曰汗多亡陽故發譫語雖不大便腹無所苦和其榮衛必自愈耳遂違衆用之及夜而笑語皆止明日大便亦通故知病變多端不可膠執向使狐疑而用下藥禍不旋踵給諫晏懷泉如夫人時當盛暑心腹大痛自汗甚多清火行氣之藥遍服弗效診其左寸澀右寸濡此氣弱不行血因以阻耳乃進參耆薑桂桃仁歸尾玄胡索之劑二劑而痊調理年餘再妊生子盛暑而用薑桂舍時從症也江右太學李明奇素雄壯忽患左脅痛手不可近用左金丸瀉肝湯至月餘痛處漸大右脅亦痛不能行動神氣如癡惚惚若有所失面色黃兩關脈促此蓄血已深非快劑不下也用桃仁承氣湯一服不動再加乾漆生大黃五錢下血塊十餘枚痛未全減又下數枚如雞子大者痛遂止神乃爽然惟見困倦先與獨參湯再用八珍湯調理三月而康南都許輪所孫女十八歲患痰嗽夏月診之太陰搏指少陰如爛綿其為水衰而火乘金瞭然可見余曰金以火為仇今不浮澀而反洪大賊脈見矣腎水又不能救秋金之令可憂至八月初五日診之忽見肺之洪者變而為細腎之軟者變而為大余曰歲在戊午少陰司天法當兩尺不應今尺當不應而反大寸當浮大而反細余曰尺寸反者死況肺部如絲懸懸欲絶經曰肺脈懸絶十二日死計其期當死於十六日然而安穀者過期不安穀者不及期以飲食不減故當逾期況十六十六二日皆金助其旺氣安得遽絶十八日交寒露節又屬火日經曰手太陰氣絶丙日篤丁日死言火日也寅時乃氣血注肺之時不能注則絶必死於十八日寅時矣輪所聽之潸然淚下自謂能食猶不肯信果至十八日未曉而終閩中太學張仲輝喜食瓜果縱飲無度忽患大瀉先用分利不應再用燥濕反加沉困余見其六脈皆浮因思經曰春傷於風夏生飧泄非汗不解以麻黃三錢人參白朮各二錢甘草升麻各一錢與之有醫者笑曰書生好奇妄用險峻傷寒且不輕用麻黃此何病也而以殺之耶仲輝惑之既而困甚嘆曰吾已將死姑服此藥以幸萬一遂煎服之覆取大汗泄瀉頓止以四君子調治而痊遺書謝曰璵以放縱蒙此奇疴藥劑雜投無益反害夙世有緣得兄手援而庸夫讒阻幾至敗亡天未絶弟於沉困之中結肝膈之信一匕才投病邪立解麻黃人參人視之如鴆毒兄用之如弄丸竟救餘生以有今日淪肌沁骨之感永劫難忘敢忘報耶海寧刑部主政許同生令嬡痢疾腹痛脈微而軟余曰此氣虛不能運化其窘迫後重乃下陷耳用升陽散火湯一劑繼用補中益氣湯數劑而愈同邑業師吳玄水如夫人吐血發熱上氣咳嗽其脈大而虛心部尤甚此氣虛不能攝血忌用降火之藥遂用歸脾湯加乾薑數服血止熱退而安五家嫂發熱煩渴胸腹痛甚肢節皆疼服理氣降火和血之藥不效余診其脈緊而非數乃中有痼冷也遂用八味丸料加人參服之數劑而霍然江西學憲黃貞父患腸風下血久用四物湯芩連槐花之屬屢發不止而色頗黃診其脈惟脾部浮而緩此土虛而風濕交乘也遂用蒼朮三錢茯苓人參黃耆升麻柴胡防風各一錢進四劑而血止改服十全大補湯調養而愈同邑社友宋敬夫患心腹大痛遂不敢食服行氣消食溫中諸藥不效診其左寸滑而急視其氣不能以息偶得一咳痛楚難支余曰此為心疝無疑非有食也亟進米粥以小茴香吳茱萸玄胡索木通川楝甘草煎成加食鹽少許一劑而痛止數劑而安嘉善孝廉葉行可腹脹而瀉腸風下血用涼血行氣之劑反深不快用黃柏知母胃氣愈傷飲食減少余曰此土氣虛甚因而下陷不能攝血也以異功散加升麻乾薑數十劑而痊浙江太學俞望之鬱熱嘔吐余授以方曰四劑可止用竹茹山梔各三錢陳皮茯苓各二錢甘草一錢煎成加薑汁五匙和勻熱服望之曰昨得一方與此相類服而不效何也余曰熱甚而嘔口有冷氣此火極似水之象須涼藥熱飲方得素問之旨前所服必不甚熱耳第熱飲之必當速愈已而果驗同邑張少椿女以喪子悲傷忽當雷雨交作大恐苦無所避旦日或泣或笑或自語或罵詈如中鬼祟診其心脈浮滑余皆沉細此氣血兩虧憂恐傷心心傷則熱熱積生風也以滾痰丸用桔梗玄胡索陳皮杏仁煎湯送下出痰積甚多而愈兵尊高懸圃老公祖患兩足痠軟神氣不足向服安神壯骨之藥不效改服滋腎牛膝苡仁二妙散之屬又不效純用血藥脾胃不實召余診之脈皆沖和按之亦不甚虛惟脾部重取之澀而無力此土虛下陷不能制水則濕氣墜於下焦故膝脛為患耳進補中益氣倍用升柴數日即愈夫脾虛下陷之症若誤用牛膝等下行之劑則愈陷此前藥之所以無功也邑宰夏儀仲太夫人年已八秩戊寅新夏儀仲遠任閩邑憂思不已偶因暑浴遂患發熱頭痛醫者以為傷寒禁其食而肆行解散越三日氣高而喘汗出如洗昏冒發厥業已治凶事始問治於余余診其脈大而無力乃為之辨曰外感發熱手背為甚內傷發熱手心為甚外感頭痛常痛不休內傷頭痛時作時止今頭痛無定而手背不熱是與虛也與外邪無涉即進食補中猶懼或失之反禁食攻表安得不敗乎遂用人參黃耆各五錢白朮半夏各二錢橘紅一錢甘草六分原醫者為之咻曰喘為氣逆此藥到咽即不可救舉家驚疑不決余百口陳辨甫投一劑喘汗減半更倍用參術二劑症減七八惟飲食不進耳余曰火衰不能生土但於原方加附子一錢五分乾薑一錢十劑而食進調理三月計用參二斤而安新安吳修豫令侄煩躁發熱肌體骨立目不得瞑已三年矣大江以南迎醫幾遍非清熱養陰即化痰安神藥劑及千求一刻安臥不能也時寓嘉定盧店典中迎余視之肝脈獨沉而搏此怒久久伏木鬱宜達也用柴胡四錢白芍藥二錢丹皮山梔各二錢五分甘草五分桂枝四分日晡進劑未及黃昏而鼾齁熟寐達旦未寤伊兄里伯大為憂惶余曰臥則魂歸於肝三歲不歸疲勞已極譬如久熱得涼樂而忘返無足懼者至午方蘇喜不自禁從床褥叩首曰積患沉深自揣必斃三年之病一朝而起之人非土木感極涕零索余丸方惟逍遙散加人參而已一月之後頓復康和楚中中翰林秦五梅奉旨祭葬董玄宰昏倦發熱頭痛惡風郡候方公相命余診之余曰中氣大虛元氣下陷陽氣不充而頭痛形氣衰少而內熱用調中益氣加葛根一劑而愈再煎而起更制脾腎兩丸俾服逾月而健旺倍常矣翰林掌院楊方壺夫人怒後飲食停滯作痛每用枳朴楂芽七日無功商治於余遂以六君子湯加玄明粉投之宿垢頓下滯痛雖除昏倦不能進食稍得食便泄瀉困乏難狀日用人參一兩熟附三錢黃耆白朮肉果各二錢甘草六分半夏一錢間以六君子補中湯調理參必一兩附必三錢百日之內未嘗少間越五月服人參至八斤薑附至二斤方復居處之常太學姚三省膈噎嘔吐或與清火或與疏通或與化痰或與散郁居半載而愈甚余曰氣口無力兩尺遲難脾腎交虛之診也脾虛則升降失職而痰起中焦腎虛則真火衰微食難運化與白朮五錢炒令焦色半夏二錢炮薑二錢沉香一錢一劑而嘔吐減半再劑而食進凡二十日而善啖如湯沃雪余亦不意其速效至此相國楊文老歷吾郡督兌時與余有生平垂顧就診極言痰氣作楚喘急而不能食遍體作痛服清氣化痰無異服水何也余曰豈止無益翻受害矣肥人氣居於表中氣必虛脾弱不能勝濕氣虛不能健運是以多痰而喘盍用四君子加星夏佐以薑汁可數劑已也遂恪服之計下車至起行凡七日而痰喘果平文學金伯含三年吐血計二冬二母四物之類不啻五百劑形容憔悴面色痿黃咳嗽喘急每歲必吐血數次漸至一月而吐五六次苦不可支悉簡所服方案專來商治余細診之沉而不浮尺小於寸右弱於左色夭而血黯不覺喟然嘆曰此陽氣本虛寒涼復傷之肅殺之氣色脈並告矣夫復何疑遂用生脈散加肉桂一錢熟附子一錢甘草五分一劑而安然再劑而嗽減伯含曰溫劑若不相宜助火速於桴鼓兩投而勢減對症可知而今而後甫有生機矣連進十劑血果不來喘嗽頓止更以八味丸理中丸交進半載而瘳學師楊龍友如夫人發熱頭疼昏倦煩悶六日之後忽見紅點衆皆以為發癍用升麻犀角之類五日以來轉增煩悶紅點不退迎余視之脈浮而大皆有頭粒此太陰之疹非陽明之斑也斑為熱毒蘊於肌肉法當清火疹為風邪客於皮毛法當宣揚一表一里奚啻天淵乃用防風二錢荊芥一錢前胡桔梗蟬殼甘草治之一劑而點多三劑而疹透調理半月而安夫疹為陽邪大忌苦寒遏其宣發誤作斑治適與相反其不斃者幸而免耳武林俞玉士年甫三旬怒後發渴飲水過多旦日肢體俱腫腹脹異常乞診於余余因年方壯而病發於驟脈方實而藥不厭攻若不急於疏通積久必成大患以胃苓散加牛膝車前三進而不為少動是病深藥淺也更以舟車神祐丸再進而小便泉湧肢體漸收仍舉胃苓湯加白朮椒仁十五日而痊薛曇孚之內余之甥也未出閣時患腹痛食少而黃體瘦幼科多以退熱消積治之女科多以通經行血治之大方以為虛而議補俱不效比余視之脈大而尺獨數肌膚甲錯為小腸有癰膿已成而將潰矣亟與葵根一兩皂刺二錢銀花三錢甘草節一錢陳皮二錢再劑而膿血大潰更以太乙膏同參耆治之一月始安感應論第二十四醫以活人為心當念人身疾苦與我無異凡有招者急去無違或止求藥宜即發付勿問貴賤勿擇貧富勿論風雨勿拘遠近盡心拯濟惟日不足冥中自有佑之者倘乘人之急設巧求財輕言談笑亂説是非危言駭德邪説惑人以不我信因循坐視萬一痊安己冒其功一旦淪亡人分其咎冥中自有禍之者若險症瀕危惟峻重之法尚可救百中之一二但醫者重惜名譽雖有一線生機知而不為己真心救濟者豈若是乎至於儔輩勝己者師之不若己者佐之毋道人短毋恃己長寧人謗吾毋吾謗人謹此數者庶幾有恆嗟乎善惡之報如影隨形前古及今昭昭不爽搜集十則以告同志用徵天鑑不遠人亦奈何而不為善也哉許叔微少嘗以登科為禱夢神人告曰汝欲登科須憑陰德叔微自念家貧無力惟醫乃可奮志方書久乃通妙人無高下皆急赴之活人甚多復夢神人曰藥有陰功陳樓間處堂上呼盧喝五作六遂中第六名上一名陳祖言下一名樓材如第五名授官與夢中之言無一字差出醫説陳獲富陽人也偶授數方自矜神妙貪利善妒逞舌致富忽患齒疼湯飲俱廢夢神告曰必某治之可救耳不得已求治尋愈二三年問諸疾雜發凡千金皆以酬醫金盡而卒困學卮言儀州聶從志治邑丞妻李氏病愈他日李偽稱疾邀至語曰幾入鬼録賴君復生願以身奉枕席聶拒而出及夜李復就之聶絶袖脫去後儀州推官黃靖國陰吏逮入冥且還見獄吏捽一婦剖其腸旁有僧曰此汝同官邑丞之妻欲與聶通聶不從可謂善士其人壽止六十今延一紀賜其子孫官靖國既蘇密訪之聶驚曰方私語時無一人知者君安得聞靖具以告聶死子孫果以官顯出夷堅志宣城符助教能治癰疽摻心無狀病者瘡不毒反用藥發之以為謀利之法夢黃衣持片紙示之曰陰司追汝以藤杖點其背符大叫痛黃衣曰汝元來也痛隨手成一大疽呼號七晝夜而死季明醫説張彥明善醫貧者求藥不受錢反濟之有召者雖貧必往即富者持錢求藥不計多寡期於必效病雖不可治亦多與好藥以安其心城中火災四面焚𬋖獨存其居里中牛災其莊獨全子登魁薦孫二三人皆龐厚俊爽天之福善信矣季明醫説王居安患痔聞蕭山有善治者力不能致命舟自烏程走錢塘就醫醫者欣然曰五日除根先以一藥放下大腸又以一藥洗之及放下大腸遂議報謝病者知命懸其手盡許行囊為酬方肯為治後醫者貧頓無聊餓而死出泊宅編宣和間有士人抱病經年百治不瘥聞何澄善醫其妻召至告曰良人久疾無以供醫願以身酬澄正色曰但當調治不可相汙未幾疾愈澄夢判官語曰醫藥有功不於艱急之際以色為貪上帝賜錢五萬貫官一員後東宮疾國醫不能治詔草澤醫澄應詔進劑而愈賜錢五萬貫與官季明醫説宜興段成務善醫然性貪非大勢力不能致適一富人病求醫段曰非五百金為謝不可許以半拂衣而起如其請然後與治別奉五十金為藥費段求益至百兩數日病愈載所獲歸夢朱衣語之曰上帝以爾為醫而厚取貨賂殊無濟物之心命脊杖二十既醒覺脊痛杖痕宛在還家而卒出辛志張琰精於醫視人疾苦淚不能禁忘寢忘食必期全效乃能釋然嗣後慕者日益衆琰旦暮憂人之憂忽成脹疾床褥間聞人言曰仁者五臟第得薑粥便好如言立愈後子嗣繁衍五世貴顯困學卮言婁思孝遇症多為兩歧之語處方專用平藥意欲待病自痊不求功於藥也夢父告之曰冥中最重財貨無故取人一文亦必登算汝以醫起家上帝謂汝僥幸取賂將逮治矣速散之可免思孝散其半余則不忍一日與老者偕出老者失足死疑其加害訟於公坐以罪盡出所有賂而免北澤瑣言
